cation for enema reduction of an intussusception (4m baby)?", "a": "Perforation / peritonitis / free air / shock", "c": "abdomen", "qa": 1, "e": "穿孔・腹膜炎・ショックでは整復禁忌。", "src": "radpp", "o": []}, {"id": "RP55", "t": "術後合併症", "q": "Which can be complications after operation?", "a": "Ileus from adhesion / abscess / stress ulcer / insufficient suture", "c": "abdomen", "qa": 1, "e": "複数解答。", "src": "radpp", "o": []}, {"id": "RP56", "t": "脊柱管内腫瘍の分類", "q": "Tumors within spinal canal may be classified as", "a": "Intramedullary / extradural / intradural-extramedullary", "c": "neuro", "qa": 1, "e": "髄内・硬膜外・硬膜内髄外の3区分。", "src": "radpp", "o": []}, {"id": "RP57", "t": "モダリティ選択の指針", "q": "Which are guiding principles when choosing a modality to diagnose a disease?", "a": "High specificity / least invasive / available / most cost-effective", "c": "physics", "qa": 1, "e": "複数解答。", "src": "radpp", "o": []}, {"id": "RP58", "t": "病的骨折とは", "q": "Pharmacological/pathological fracture?", "a": "Fracture of bone weakened by tumor/inflammation/cyst, or fracture due to osteoporosis", "c": "msk", "qa": 1, "e": "脆弱化した骨の骨折。", "src": "radpp", "o": []}, {"id": "RP59", "t": "電子密度とX線描出の正誤文", "q": "Lower electron-density regions (such as air) stop very few x-rays, therefore they are rendered dark on the film", "a": "True and correlates（正しく相関する）", "c": "physics", "qa": 1, "e": "空気はX線をほぼ止めず黒く写る。", "src": "radpp", "o": []}, {"id": "RP60", "t": "音響界面と高エコーの正誤文", "q": "Structures with many acoustic interfaces … termed hyperechoic/echogenic and viewed as bright areas", "a": "Only the second statement is correct（第2文のみ正）", "c": "us", "qa": 1, "e": "高エコー=明るいは正。第1文『反射しない』は誤り。", "src": "radpp", "o": []}, {"id": "PI01", "t": "後縦隔の異常軟部腫瘤", "q": "An abnormal soft tissue mass is seen in the posterior mediastinum. Which of the following pathologies can it be?", "o": ["a. teratoma", "b. thymoma", "c. goiter", "d. achalasia"], "a": "d. achalasia", "c": "chest", "k": "d", "e": "奇形腫・胸腺腫・甲状腺腫は前縦隔。後縦隔は神経原性腫瘍や食道病変（拡張食道＝アカラシア）、下行大動脈。", "src": "imgpp"}, {"id": "PI02", "t": "マンモグラフィの基本撮影方向", "q": "Which are the basic views in mammography?", "o": ["a. cranio-caudal (CC) + medio-lateral oblique (MLO)", "b. cranio-caudal (CC) + latero-lateral (ML/LM)", "c. craniocaudal (CC) + latero-medial oblique (LMO)", "d. Cleopatra view + Eklund view"], "a": "a. cranio-caudal (CC) + medio-lateral oblique (MLO)", "c": "breast", "k": "a", "e": "標準2方向はCCとMLO。Eklund法は豊胸患者用の追加手技。", "src": "imgpp", "trap": 1}, {"id": "PI03", "t": "ダイナミック動脈相の用途", "q": "Arterial phase of dynamic CT/MRI is used for the visualization of:", "o": ["a. urinary collecting system", "b. metallic foreign body", "c. hypervascular liver tumors", "d. hypovascular liver tumors"], "a": "c. hypervascular liver tumors", "c": "abdomen", "k": "c", "e": "HCCなど多血性腫瘍は動脈相で強く濃染。乏血性転移は門脈相〜平衡相で評価。", "src": "imgpp", "trap": 1}, {"id": "PI04", "t": "乳腺微小石灰化の第一選択", "q": "Which one is the first-line imaging method for depiction and analysis of microcalcifications in breast lesions?", "o": ["a. ultrasound", "b. mammography", "c. MR", "d. scintigraphy"], "a": "b. mammography", "c": "breast", "k": "b", "e": "微小石灰化はマンモが最も鋭敏。USは嚢胞/充実の鑑別向き。", "src": "imgpp"}, {"id": "PI05", "t": "硬膜外血腫の典型的特徴", "q": "What is the typical characteristic of an epidural hemorrhage?", "o": ["a. Crescent-shaped mass, which cannot cross the midline", "b. Hypodense on CT if acute", "c. Lens-shaped mass at the convexity, causing mass effect", "d. none of these"], "a": "c. Lens-shaped mass at the convexity, causing mass effect", "c": "neuro", "k": "c", "e": "動脈性（中硬膜動脈）、縫合線を越えない凸レンズ型。三日月型は硬膜下血腫。", "src": "imgpp", "trap": 1}, {"id": "PI06", "t": "気胸の古典的X線サイン", "q": "Classic radiological sign of pneumothorax:", "o": ["a. lung markings disappear in the area of the pneumothorax", "b. parietal pleura is shown as a thin line", "c. homogenous decreased transparency", "d. all of the above"], "a": "a. lung markings disappear in the area of the pneumothorax", "c": "chest", "k": "a", "e": "臓側胸膜が線状に見え、その外側は無血管の透亮域（肺紋理消失）。", "src": "imgpp"}, {"id": "PI07", "t": "肺の透過性亢進を示す病態", "q": "Decreased lung opacity on chest X-ray is seen in the following pathology:", "o": ["a. subcutaneous emphysema", "b. pneumomediastinum", "c. pneumothorax", "d. pneumonia"], "a": "c. pneumothorax", "c": "chest", "k": "c", "e": "空気＝黒く写る＝透過性亢進。肺炎は逆にopacity増加。", "src": "imgpp"}, {"id": "PI08", "t": "腹部・骨盤US準備で誤り", "q": "How should the patient arrive for abdominal and pelvic ultrasound? Mark the FALSE answer.", "o": ["a. After at least 6 hours of fasting", "b. With full bladder", "c. With kidney function result not older than one week", "d. With previous ultrasound reports"], "a": "c. With kidney function result not older than one week", "c": "abdomen", "k": "c", "e": "単純USは造影剤を使わないので腎機能結果は不要（これが誤った要件）。", "src": "imgpp"}, {"id": "PI11", "t": "MRI信号強度で正しい記述", "q": "Which statement is TRUE for MRI signal intensity?", "o": ["a. fat is hyperintense on both T1W and T2W MRI", "b. fluid containing spaces (e.g. urinary bladder) are hypointense on both T1W and T2W MRI", "c. gadolinium contrast agent is visible on postcontrast T2W MRI", "d. SWI is useful in revealing changes in diffusion of water molecules"], "a": "a. fat is hyperintense on both T1W and T2W MRI", "c": "mri", "k": "a", "e": "脂肪はT1・T2とも高信号。液体はT1低・T2高。", "src": "imgpp", "trap": 1}, {"id": "PI12", "t": "緊急時の遊離腹腔内液の検出", "q": "In case of emergency, which modality should be chosen to detect free abdominal fluid?", "o": ["a. FAST and eFAST", "b. Erect abdominal X-ray", "c. Supine abdominal X-ray", "d. Abdominal CT scan"], "a": "a. FAST and eFAST", "c": "abdomen", "k": "a", "e": "外傷初期評価のベッドサイドUS。迅速・非侵襲。", "src": "imgpp", "trap": 1}, {"id": "PI13", "t": "心筋血流シンチの適応", "q": "What can be an indication for myocardial perfusion scintigraphy?", "o": ["a. Ischemic heart disease", "b. Arrhythmia", "c. Diagnosis of organic heart defects", "d. All of these"], "a": "a. Ischemic heart disease", "c": "nuclear", "k": "a", "e": "心筋虚血・viabilityの評価。", "src": "imgpp"}, {"id": "PI14", "t": "経皮的腎瘻の適応", "q": "Which of the following is an indication for percutaneous nephrostomy?", "o": ["a. obstructive uropathy", "b. diminished kidney function", "c. both", "d. none"], "a": "a. obstructive uropathy", "c": "gu", "k": "a", "e": "閉塞による水腎症の減圧・尿路ドレナージ。", "src": "imgpp"}, {"id": "PI15", "t": "核医学について正しい記述", "q": "Which of the following statement is true?", "o": ["a. With nuclear medicine investigations we can observe the function of organs, tissues, and subcellular structures", "b. Nuclear medicine investigations have higher spatial resolution than radiologic investigations", "c. Nuclear medicine investigations are specific", "d. The radiopharmaceutical is usually administered per os"], "a": "a. With nuclear medicine investigations we can observe the function of organs, tissues, and subcellular structures", "c": "nuclear", "k": "a", "e": "核医学＝機能画像。空間分解能は低く、感度は高いが特異度は限定的。放射性医薬品は通常静注（per osでない）。", "src": "imgpp"}, {"id": "PI16", "t": "臨床USで誤り（FALSE）", "q": "Which statement is FALSE about clinical ultrasound examinations?", "o": ["a. Convex transducers have a larger field-of-view compared to linear transducers", "b. Suitable for evaluation of flow dynamics", "c. Deeper layers are examined by using a higher frequency transducer", "d. Vascularization can be visualized using iv. contrast agent (microbubbles)"], "a": "c. Deeper layers are examined by using a higher frequency transducer", "c": "us", "k": "c", "e": "深部は逆に低周波（深達度が高い）。高周波は浅部・高分解能用。", "src": "imgpp"}, {"id": "PI17", "t": "急性膵炎の画像で正しい記述", "q": "True for imaging of acute pancreatitis:", "o": ["a. radiological study is necessary to set up the diagnosis", "b. necrotic area of the pancreas enhances avidly after iv. contrast agent administration", "c. CT is performed if complication is suspected", "d. plain radiograph is often diagnostic"], "a": "c. CT is performed if complication is suspected", "c": "abdomen", "k": "c", "e": "壊死部は造影で濃染しない（B誤）。単純X線は診断的でない。造影CTで壊死・合併症を評価。", "src": "imgpp"}, {"id": "PI18", "t": "腫瘍アブレーションで正しい記述", "q": "True statement about tumor ablation techniques:", "o": ["a. thermal ablation can be performed both by heating and cooling of the tumor tissue", "b. can replace surgery", "c. can be useful in a patient with renal cell carcinoma of a solitary kidney", "d. all"], "a": "a. thermal ablation can be performed both by heating and cooling of the tumor tissue", "c": "abdomen", "k": "a", "e": "熱アブレーション＝加熱（RFA/マイクロ波）＋冷却（cryo）。非熱＝化学的。単腎RCCの機能温存にも有用。", "src": "imgpp"}, {"id": "PI19", "t": "プラナーガンマカメラの画像", "q": "What kind of images are recorded by the planar gamma camera?", "o": ["a. 2-dimensional summation images", "b. Cross-sectional images", "c. 3-dimensional reconstructed images", "d. none of these"], "a": "a. 2-dimensional summation images", "c": "nuclear", "k": "a", "e": "プラナー＝2D投影像。断層はSPECT。", "src": "imgpp"}, {"id": "PI20", "t": "腫瘍画像でのMRIの役割", "q": "The main role of MRI in oncologic imaging is:", "o": ["a. assessment of local tumor staging and regional lymph nodes", "b. to overview of organ systems in short examination time", "c. to follow-up all distant metastases", "d. to search for pulmonary metastases"], "a": "a. assessment of local tumor staging and regional lymph nodes", "c": "mri", "k": "a", "e": "軟部コントラストに優れ局所進展評価に強い。", "src": "imgpp"}, {"id": "PI21", "t": "HU値の昇順配列", "q": "Choose the correct sequence in increasing order of Hounsfield-units:", "o": ["a. Extraluminal blood < air < water < adipose tissue < bone", "b. Water < adipose tissue < extraluminal blood < bone < air", "c. Adipose tissue < water < bone < air < extraluminal blood", "d. Air < adipose tissue < water < extraluminal blood < bone"], "a": "d. Air < adipose tissue < water < extraluminal blood < bone", "c": "ct", "k": "d", "e": "空気−1000 < 脂肪−100 < 水0 < 血液+50前後 < 骨+1000。", "src": "imgpp", "trap": 1}, {"id": "PI22", "t": "iv造影が不要なCT適応", "q": "In which of the following CT indications is NOT necessary to administer iv. contrast media?", "o": ["a. assessment of pulmonary embolism", "b. assessment of kidney stone", "c. staging of chest and abdominal regions in an oncologic patient", "d. assessment of focal liver lesion of unknown dignity"], "a": "b. assessment of kidney stone", "c": "ct", "k": "b", "e": "尿路結石は単純CTで描出可。PE・staging・肝病変は造影が必要。", "src": "imgpp"}, {"id": "PI23", "t": "急性脳卒中の画像で正しい記述", "q": "True for acute stroke imaging:", "o": ["a. The posterior scala / brainstem stroke lesion can only be detected reliably by CT", "b. CT scan cannot be performed in case of aneurysmal clip", "c. Small hemorrhages cannot be detected by MRI", "d. MR helps to distinguish between acute hemorrhage and a chronic hematoma"], "a": "d. MR helps to distinguish between acute hemorrhage and a chronic hematoma", "c": "neuro", "k": "d", "e": "脳幹病変はMRIが優れる、クリップでもCT可、MRI/SWIで微小出血も検出可。", "src": "imgpp"}, {"id": "PI24", "t": "triple-rule-out CTで診断されない疾患", "q": "The following disorder is NOT diagnosed by triple-rule-out CT:", "o": ["a. deep vein thrombosis", "b. coronary stenosis", "c. aortic dissection", "d. pulmonary embolism"], "a": "a. deep vein thrombosis", "c": "cardiovascular", "k": "a", "e": "triple-rule-out＝冠動脈狭窄＋大動脈解離＋肺塞栓。DVTは対象外。", "src": "imgpp"}, {"id": "PI25", "t": "RUSHプロトコルの適応", "q": "What is the clinical indication of performing RUSH protocol?", "o": ["a. ultrasound-guided drainage of pleural effusion", "b. bedside ultrasound examination in hemodynamic shock", "c. ultrasound-guided central venous line placement", "d. bedside ultrasound examination in myocardial infarction"], "a": "b. bedside ultrasound examination in hemodynamic shock", "c": "us", "k": "b", "e": "RUSH＝Rapid Ultrasound in SHock/hypotension。ショック・低血圧の原因検索。", "src": "imgpp", "trap": 1}, {"id": "PI26", "t": "充実性vs嚢胞性乳腺病変の鑑別", "q": "Method that can differentiate the most accurately between solid and cystic breast lesions is:", "o": ["a. mammography", "b. ultrasound", "c. PET-CT", "d. none of above"], "a": "b. ultrasound", "c": "breast", "k": "b", "e": "USで嚢胞（無エコー）と充実腫瘤を鑑別。", "src": "imgpp"}, {"id": "PI27", "t": "造影剤の有害事象リスクが高い患者", "q": "There is a higher risk of adverse effects after iv. administration of CT contrast material:", "o": ["a. in patients with impaired liver function", "b. in dehydrated patients", "c. in patients above the age of 45 years", "d. in patients with severe hypothyreosis"], "a": "b. in dehydrated patients", "c": "safety", "k": "b", "e": "脱水は造影剤腎症のリスクを上げる。投与前の補水が重要。", "src": "imgpp"}, {"id": "PI28", "t": "カラードプラでプローブに向かう色", "q": "In the case of Color Doppler, what color indicates the flow towards the transducer?", "o": ["a. black", "b. red", "c. blue", "d. white"], "a": "b. red", "c": "us", "k": "b", "e": "BART: Blue Away（遠ざかる＝青）、Red Toward（近づく＝赤）。", "src": "imgpp"}, {"id": "PI29", "t": "肺癌スクリーニング", "q": "Lung cancer screening can be efficiently achieved by:", "o": ["a. 1-view Chest X-ray", "b. 2-view Chest X-ray", "c. Chest fluoroscopy", "d. Chest CT"], "a": "d. Chest CT", "c": "chest", "k": "d", "e": "低線量胸部CTが標準。胸部X線は早期肺癌の感度が低い。", "src": "imgpp", "trap": 1}, {"id": "PI30", "t": "HRCTについて正しい記述", "q": "True for High-Resolution CT (HRCT) examination:", "o": ["a. important modality in pulmonary tumor characterization", "b. not used for bony structures", "c. an important tool to diagnose interstitial lung disease", "d. iv. iodine-based contrast agent is necessary"], "a": "c. an important tool to diagnose interstitial lung disease", "c": "chest", "k": "c", "e": "HRCTはILDの評価に有用。造影は通常不要。", "src": "imgpp"}, {"id": "EP01", "t": "乳癌の最好発部位", "q": "Most frequent localization of breast carcinoma:", "o": ["a. upper-outer quadrant", "b. upper-inner quadrant", "c. lower-outer quadrant", "d. lower-inner quadrant"], "a": "a. upper-outer quadrant", "c": "breast", "k": "a", "e": "乳腺組織が最も多い外側上方（UOQ）。腋窩リンパ流とも関連。", "src": "exampp", "trap": 1}, {"id": "EP02", "t": "X線画像で暗く写る構造", "q": "Appears as dark region on a radiological image:", "o": ["a. dense structures on X-Ray (e.g. calcified structures)", "b. normal arteries on 3D TOF", const LS_KEY = "medimg_quiz_progress_v1";
const labels = DATA.labels, order = DATA.order, ALL = DATA.items;
const sources = DATA.sources || {};
ALL.forEach((x,i)=>{ x._i=i; if(!x.src) x.src="pp"; });

let storageOK = true;
function loadProg(){
  try { return JSON.parse(localStorage.getItem(LS_KEY) || "{}"); }
  catch(e){ storageOK = false; return {}; }
}
let prog = loadProg();
function save(){
  try { localStorage.setItem(LS_KEY, JSON.stringify(prog)); }
  catch(e){ if(storageOK){ storageOK = false; warnStorage(); } }
}
function warnStorage(){
  const w = document.getElementById("storageWarn");
  if(w) w.style.display = "block";
}
function rec(id){ return prog[id] || (prog[id]={r:0,w:0,seen:0,mastered:false}); }
// 解いた順の正誤を記録（1=正解, 0=不正解）。直近50件まで保持
function logHist(id, ok){
  const r = rec(id);
  if(!Array.isArray(r.h)) r.h = [];
  r.h.push(ok?1:0);
  if(r.h.length>50) r.h = r.h.slice(-50);
}
// 正誤の軌跡を●で表示（左=古い 右=新しい、直近20件）
function histHtml(r){
  const h = (r && Array.isArray(r.h)) ? r.h : [];
  if(!h.length) return "";
  const shown = h.slice(-20);
  const more = h.length>20 ? '<span class="hmore">…</span>' : '';
  const marks = shown.map(v=> v? '<span class="hok">●</span>' : '<span class="hng">●</span>').join("");
  const ok=h.filter(v=>v).length;
  return `<span class="hist" title="解いた順の正誤（左=古い・右=新しい）  通算 ○${ok} ×${h.length-ok}">${more}${marks}</span>`;
}

let state = { src:"all", cat:"all", mode:"flash", weak:false, unseen:false, chk:false, trap:false, deck:[], pos:0, revealed:false, answered:false };

function inSrc(x){ return state.src==="all" || x.src===state.src; }

function buildSources(){
  const el = document.getElementById("srcRow");
  const keys = Object.keys(sources);
  if(keys.length<=1){ el.innerHTML=""; return; }
  const counts={}; ALL.forEach(x=>counts[x.src]=(counts[x.src]||0)+1);
  let html = `<span class="lbl">出典:</span>`;
  html += `<span class="chip src ${state.src==='all'?'active':''}" data-src="all">すべて<span class="n">${ALL.length}</span></span>`;
  keys.forEach(k=> html += `<span class="chip src ${state.src===k?'active':''}" data-src="${k}">${sources[k]}<span class="n">${counts[k]||0}</span></span>`);
  el.innerHTML = html;
  el.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{ state.src=c.dataset.src; state.cat="all"; buildSources(); buildCats(); buildDeck(); });
}

function buildCats(){
  const el = document.getElementById("cats");
  const counts = {}; ALL.filter(inSrc).forEach(x=>counts[x.c]=(counts[x.c]||0)+1);
  let html = `<span class="chip ${state.cat==='all'?'active':''}" data-cat="all">全分野<span class="n">${ALL.filter(inSrc).length}</span></span>`;
  order.forEach(k=>{ if(counts[k]) html += `<span class="chip ${state.cat===k?'active':''}" data-cat="${k}">${labels[k]}<span class="n">${counts[k]}</span></span>`; });
  el.innerHTML = html;
  el.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{ state.cat=c.dataset.cat; buildCats(); buildDeck(); });
  document.getElementById("totalCount").textContent = `（全${ALL.length}問）`;
}

function buildDeck(){
  let deck = ALL.filter(x=> inSrc(x) && (state.cat==="all" || x.c===state.cat));
  if(state.chk) deck = deck.filter(x=> x.chk);
  if(state.trap) deck = deck.filter(x=> x.trap);
  if(state.unseen) deck = deck.filter(x=> (rec(x.id).seen||0)===0 && !rec(x.id).mastered);
  if(state.weak){
    deck = deck.slice().sort((a,b)=>{
      const ra=rec(a.id), rb=rec(b.id);
      const sa=(ra.mastered?100:0) + (ra.r - ra.w*2) + (ra.seen===0?-50:0);
      const sb=(rb.mastered?100:0) + (rb.r - rb.w*2) + (rb.seen===0?-50:0);
      return sa - sb;
    });
  }
  state.deck = deck; state.pos = 0;
  render();
}

function curr(){ return state.deck[state.pos]; }

function refreshStats(){
  updateBar();
  if(document.getElementById("statsPanel").dataset.open==="1") renderStats();
}
function render(){
  const view = document.getElementById("view");
  if(state.deck.length===0){
    view.innerHTML = `<div class="card"><div class="empty">該当する問題がありません。<br>フィルタを変えてください。</div></div>`;
    document.getElementById("position").textContent=""; updateBar(); return;
  }
  const x = curr(); const r = rec(x.id);
  state.revealed=false; state.answered=false;
  document.getElementById("position").textContent = `${state.pos+1} / ${state.deck.length}`;
  let badge = r.mastered ? `<span class="badge" style="background:var(--okbg);color:var(--ok)">覚えた</span>`
    : (r.seen? `<span class="badge" style="background:var(--panel2)">○${r.r} ×${r.w}</span>` : `<span class="badge" style="background:var(--panel2)">未</span>`);
  let srcb = sources[x.src] ? `<span class="srcbadge">${sources[x.src]}</span>` : "";
  let chkb = x.chk ? `<span class="badge" style="background:#5a4a1d;color:#ffe08a" title="正解が医学的に確定していない設問">⚠ 要確認</span>` : "";
  let trapb = x.trap ? `<span class="badge" style="background:#4a2d1d;color:#ffb88a" title="選択肢が紛らわしい。早とちり注意">🪤 紛らわしい</span>` : "";
  let opts = (x.o||[]).map((o,idx)=>{
    const letter = (o.match(/^([a-e])[\.\)]/)||[])[1] || String.fromCharCode(97+idx);
    return `<button class="opt" data-letter="${letter}" data-idx="${idx}">${escapeHtml(o)}</button>`;
  }).join("");
  const isWarn = !x.k && !x.qa;
  view.innerHTML = `
    <div class="card">
      <div class="qid">${x.id} · ${labels[x.c]} ${badge}${chkb}${trapb}${srcb}${histHtml(r)}</div>
      <div class="qtitle">${escapeHtml(x.t)}</div>
      <div class="q">${qHtml(x.q)}</div>
      <div id="opts">${opts}</div>
      <div class="reveal" id="reveal">
        <div class="ans ${isWarn?'warn':''}">正解: ${escapeHtml(x.a)}</div>
        <div class="expl">${escapeHtml(x.e)}</div>
      </div>
    </div>`;
  view.querySelectorAll(".opt").forEach(b=> b.onclick=()=>pickOption(b));
  r.seen = (r.seen||0)+1; save();
  refreshStats();
  document.getElementById("judge").style.display = "none";
  document.getElementById("revealBtn").textContent = (state.mode==="quiz")?"答え/解説 (Space)":"答えを見る (Space)";
}

function pickOption(btn){
  const x = curr();
  if(state.mode==="flash"){ revealAnswer(); return; }
  if(state.answered) return;
  state.answered=true;
  const chosen = btn.dataset.letter;
  document.querySelectorAll(".opt").forEach(b=>{
    b.classList.add("disabled");
    if(x.k && b.dataset.letter===x.k) b.classList.add("correct");
  });
  if(x.k){
    const ok = chosen===x.k;
    if(ok){ rec(x.id).r++; }
    else { btn.classList.add("wrong"); rec(x.id).w++; }
    logHist(x.id, ok);
  }
  save();
  refreshStats();
  revealAnswer(true);
}

function revealAnswer(fromPick){
  state.revealed=true;
  document.getElementById("reveal").classList.add("show");
  document.getElementById("judge").style.display = "flex";
  if(!fromPick && curr() && curr().k){
    document.querySelectorAll(".opt").forEach(b=>{
      if(b.dataset.letter===curr().k) b.classList.add("correct");
    });
  }
}

function judge(got){
  const x = curr(); const r = rec(x.id);
  r.mastered = got;
  if(got){ if(!state.answered) r.r++; } else { if(!state.answered) r.w++; r.mastered=false; }
  // 選択肢で採点できない問題（短答ノート・複数正解など）は自己採点を履歴に記録。
  // 通常のMCQ（選択肢+正解キーあり）はpickOptionのクリックで記録済みなので二重記録しない。
  const scoreable = (x.o && x.o.length) && x.k;
  if(!state.answered && !scoreable) logHist(x.id, got);
  save();
  next();
}

function next(){ if(state.pos<state.deck.length-1){ state.pos++; render(); } else { render(); } }
function prev(){ if(state.pos>0){ state.pos--; render(); } }

function updateBar(){
  const pool = ALL.filter(x=> inSrc(x) && (state.cat==="all" || x.c===state.cat));
  const mastered = pool.filter(x=>rec(x.id).mastered).length;
  const pct = pool.length? Math.round(mastered/pool.length*100):0;
  document.getElementById("catbar").style.width = pct+"%";
  document.getElementById("deckInfo").textContent = `この範囲: ${mastered}/${pool.length} 習得 (${pct}%)`;
}

function renderStats(){
  const p = document.getElementById("statsPanel");
  const pool0 = ALL.filter(inSrc);
  const counts={}; pool0.forEach(x=>counts[x.c]=(counts[x.c]||0)+1);
  let totMaster=0, totSeen=0;
  let rows = order.filter(k=>counts[k]).map(k=>{
    const pool=pool0.filter(x=>x.c===k);
    const m=pool.filter(x=>rec(x.id).mastered).length;
    const s=pool.filter(x=>rec(x.id).seen).length;
    totMaster+=m; totSeen+=s;
    const pct=Math.round(m/pool.length*100);
    return `<tr><td>${labels[k]}</td><td>${m}/${pool.length} 習得・${s} 着手</td>
      <td><span class="badge" style="background:${pct>=80?'var(--okbg)':'var(--panel2)'};color:${pct>=80?'var(--ok)':'var(--txt)'}">${pct}%</span></td></tr>`;
  }).join("");
  const totPct=Math.round(totMaster/pool0.length*100);
  const srcName = state.src==="all" ? "全出典" : (sources[state.src]||state.src);
  p.innerHTML = `<div style="margin-bottom:6px">${srcName}: <b>${totMaster}/${pool0.length}</b> 習得 (${totPct}%)・${totSeen} 着手</div>
    <table>${rows}</table>`;
}

function escapeHtml(s){ return (s||"").replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
// 設問文をエスケープしたうえで否定・例外語を強調（早とちり防止）
function qHtml(s){
  let h = escapeHtml(s);
  // 大文字の否定語・「誤っているもの／正しくないもの／〜でないもの」を強調
  h = h.replace(/\b(NOT|EXCEPT|FALSE|INCORRECT|LEAST|NEVER|CANNOT|NONE|UNLIKELY)\b/g, '<span class="neg">$1</span>');
  h = h.replace(/(誤(っているもの|り|っている)|正しくない|適切でない|〜?でないもの|当てはまらない|含まれない|最も.{0,4}くい|除外)/g, '<span class="neg">$1</span>');
  return h;
}

document.getElementById("modeBtn").onclick=function(){
  state.mode = state.mode==="flash"?"quiz":"flash";
  this.textContent = "モード: " + (state.mode==="flash"?"フラッシュカード":"演習(選択)");
  this.classList.toggle("active", state.mode==="quiz");
  render();
};
document.getElementById("weakBtn").onclick=function(){
  state.weak=!state.weak; this.textContent="苦手優先 "+(state.weak?"ON":"OFF");
  this.classList.toggle("active",state.weak); buildDeck();
};
document.getElementById("unseenBtn").onclick=function(){
  state.unseen=!state.unseen; this.textContent="未学習のみ "+(state.unseen?"ON":"OFF");
  this.classList.toggle("active",state.unseen); buildDeck();
};
document.getElementById("chkBtn").onclick=function(){
  state.chk=!state.chk; this.textContent="⚠ 要確認のみ "+(state.chk?"ON":"OFF");
  this.classList.toggle("active",state.chk); buildDeck();
};
document.getElementById("trapBtn").onclick=function(){
  state.trap=!state.trap; this.textContent="🪤 ひっかけのみ "+(state.trap?"ON":"OFF");
  this.classList.toggle("active",state.trap); buildDeck();
};
document.getElementById("exportBtn").onclick=()=>{
  const blob=new Blob([JSON.stringify({app:"medimg_quiz",ver:1,exportedAt:new Date().toISOString(),progress:prog},null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="medimg_足跡_"+new Date().toISOString().slice(0,10)+".json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
};
document.getElementById("importBtn").onclick=()=>document.getElementById("importFile").click();
document.getElementById("importFile").onchange=function(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const data=JSON.parse(reader.result);
      const incoming = data.progress || data;
      if(typeof incoming!=="object") throw new Error("形式が不正です");
      const mode = confirm("読み込み方法を選択:\n[OK] 現在の記録に統合（良い方を残す）\n[キャンセル] 現在の記録を破棄して置き換え");
      if(mode){
        for(const id in incoming){
          const a=prog[id]||{r:0,w:0,seen:0,mastered:false};
          const b=incoming[id]||{};
          const ah=Array.isArray(a.h)?a.h:[], bh=Array.isArray(b.h)?b.h:[];
          prog[id]={r:Math.max(a.r||0,b.r||0),w:Math.max(a.w||0,b.w||0),seen:Math.max(a.seen||0,b.seen||0),mastered:!!(a.mastered||b.mastered),h:(ah.length>=bh.length?ah:bh)};
        }
      } else { prog=incoming; }
      save(); buildDeck();
      if(document.getElementById("statsPanel").dataset.open==="1") renderStats();
      alert("足跡を読み込みました（"+Object.keys(incoming).length+"件）。");
    }catch(err){ alert("読み込みに失敗しました: "+err.message); }
    e.target.value="";
  };
  reader.readAsText(file);
};
document.getElementById("shuffleBtn").onclick=()=>{
  for(let i=state.deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[state.deck[i],state.deck[j]]=[state.deck[j],state.deck[i]];}
  state.pos=0; render();
};
document.getElementById("statsBtn").onclick=function(){
  const p=document.getElementById("statsPanel");
  const open=p.dataset.open==="1";
  p.dataset.open=open?"0":"1"; p.style.display=open?"none":"block";
  if(!open) renderStats();
};
document.getElementById("resetBtn").onclick=()=>{
  if(confirm("学習の足跡（正誤・習得記録）を全て消去します。よろしいですか？")){
    prog={}; save(); buildDeck();
    if(document.getElementById("statsPanel").dataset.open==="1") renderStats();
  }
};
document.getElementById("revealBtn").onclick=()=>{ if(!state.revealed) revealAnswer(); else next(); };
document.getElementById("nextBtn").onclick=next;
document.getElementById("prevBtn").onclick=prev;
document.getElementById("gotBtn").onclick=()=>judge(true);
document.getElementById("againBtn").onclick=()=>judge(false);

document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT") return;
  if(e.code==="Space"){ e.preventDefault(); if(!state.revealed) revealAnswer(); else next(); }
  else if(e.key==="ArrowRight") next();
  else if(e.key==="ArrowLeft") prev();
  else if(e.key>="1"&&e.key<="5"){ const b=document.querySelectorAll(".opt")[+e.key-1]; if(b) b.click(); }
  else if(e.key==="g"||e.key==="G"){ if(state.revealed) judge(true); }
  else if(e.key==="a"||e.key==="A"){ if(state.revealed) judge(false); }
});

buildSources(); buildCats(); buildDeck();
if(!storageOK) warnStorage();
</script>
