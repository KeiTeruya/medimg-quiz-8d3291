e; d. Extrauterine gravidity", "c": "abdomen", "k": "b", "e": "虫垂切除後（虫垂炎ではない）で回盲部痛を訴える若年女性では、回盲部を好発部位とするクローン病 (Crohn's disease) と、若年女性で鑑別が必須の子宮外妊娠 (extrauterine gravidity / ectopic pregnancy) を疑う。本スライドではbとdが正解とされている。S状結腸憩室炎は左下腹部痛、消化性潰瘍は心窩部痛が典型で部位が合わない。", "src": "pp"}, {"id": "099-7", "t": "緊張性気胸で緊急処置を要する胸部X線所見", "q": "Tension ptx is present, which requires emergent treatment if cxr shows", "o": ["a. Mediastinal shift to the pathological side", "b. Mediastinal shift to the normal side", "c. Superiors displacement of the diaphragm on the normal side", "d. Inferior displacement of the diaphragm on the pathological side"], "a": "b. Mediastinal shift to the normal side; d. Inferior displacement of the diaphragm on the pathological side", "c": "chest", "k": "b", "e": "緊張性気胸 (tension pneumothorax) では患側胸腔内の圧が上昇し、縦隔が健側（正常側）へ偏位 (mediastinal shift to the normal side) し、患側の横隔膜が下方へ押し下げられる (inferior displacement of the diaphragm on the pathological side)。これらは循環虚脱を招く緊急所見であり、本スライドではbとdが正解とされている。", "src": "pp", "trap": 1}, {"id": "100-1", "t": "MRIでT1強調像とT2強調像を見分ける指標", "q": "To differentiate a T1 and T2 weighted image in MRI, look for:", "o": ["a. Bones", "b. Muscles", "c. Aorta", "d. Water"], "a": "d. Water", "c": "mri", "k": "d", "e": "MRIではT1強調像とT2強調像の鑑別に水 (water、脳脊髄液など) の信号を見るのが最も確実である。水はT1強調像では低信号（暗く）、T2強調像では高信号（明るく）を示す。骨や筋肉は両者で類似した信号を示すことが多く鑑別の目印にはなりにくい。", "src": "pp"}, {"id": "100-2", "t": "モダリティ選択の指導原則", "q": "Which are the guiding principles when it comes to choosing a modality to diagnose a disease?", "o": ["a. Modality having a high specificity", "b. Least invasive modality", "c. Available modality", "d. Most cost-effective modality"], "a": "a, b, c, d（すべて）", "c": "physics", "k": "", "e": "診断モダリティを選択する際の指導原則には、高い特異度 (high specificity)、最も低侵襲 (least invasive)、利用可能性 (available)、最も費用対効果が高い (most cost-effective) ことがすべて含まれる。本スライドでは全選択肢が正解としてハイライトされている。実臨床では患者の安全・有用性・実現可能性・経済性を総合して選択する。", "src": "pp"}, {"id": "102-1", "t": "高分解能CT（HRCT）が適切でない選択", "q": "High resolution CT (HRCT) is not the reasonable choice in the following case:", "o": ["A. structure of the lungs- restrictive pulmonary disease, fibrosis", "B. Cerebellopontine angle - vestibular Schwannoma (acoustic neurinoma)", "C. Structure of the middle ear - conductive hearing loss?", "D. Bone structure of femur - Osterei osteoma?"], "a": "B. Cerebellopontine angle - vestibular Schwannoma (acoustic neurinoma)", "c": "ct", "k": "b", "e": "HRCTは肺の微細構造（拘束性肺疾患・線維症）、中耳・側頭骨の骨構造、骨腫瘍などの高分解能描出に適する。一方、小脳橋角部 (cerebellopontine angle) の前庭神経鞘腫（聴神経腫瘍, vestibular schwannoma）は軟部組織腫瘍であり、MRI（造影T1強調像）が描出に優れるためHRCTは適さない。", "src": "pp"}, {"id": "102-2", "t": "血管内インターベンション前に必要な準備（例外）", "q": "the following preparations are necessary before a vascular interventional radiological procedure, EXCEPT for:", "o": ["A. checking the INR", "B. check for the existence of a metal foreign body", "C. Providing sufficient hydration", "D. Checking the GFR value"], "a": "B. check for the existence of a metal foreign body", "c": "cardiovascular", "k": "b", "e": "血管内インターベンション前には、出血リスク評価のためのINR確認、造影剤腎症予防の十分な補液 (hydration)、腎機能評価のGFR確認が必要である。金属異物の有無の確認 (metal foreign body) はMRI検査前の安全確認であり、血管造影手技の準備としては不要なため「EXCEPT」の答えとなる。", "src": "pp", "trap": 1}, {"id": "102-3", "t": "食道穿孔疑い時の造影剤に関する正しい記述", "q": "In the suspicion of esophageal perforation which of the following statements is correct regarding contrast media application?", "o": ["A. Barium-based contrast materials are not contraindicated", "B. Both types of contrast material could be used", "C. Both types of contrast materials are contraindicated", "D. Water-soluble contrast material should be used"], "a": "D. Water-soluble contrast material should be used", "c": "safety", "k": "d", "e": "食道穿孔 (esophageal perforation) が疑われる場合、バリウム (barium) が縦隔へ漏出すると重篤な縦隔炎 (mediastinitis) を引き起こすため禁忌である。代わりに水溶性造影剤 (water-soluble contrast material) を用いるべきで、漏出しても吸収される。よってDが正しい。", "src": "pp", "trap": 1}, {"id": "102-4", "t": "動的腎シンチグラフィについて誤った記述", "q": "Which of the following statements is FALSE about dynamic renal scintigraphy?", "o": ["A. The secretion of the kidneys can be compared with each other", "B. Can be used for the diagnosis of renal tumors", "C. The parameters of urinary drainage (and possible obstruction) can be determined", "D. The functional performance of renal parenchyma can be determined"], "a": "B. Can be used for the diagnosis of renal tumors", "c": "nuclear", "k": "b", "e": "動的腎シンチグラフィ (dynamic renal scintigraphy) は左右腎の分腎機能の比較、尿排泄・閉塞 (urinary drainage/obstruction) の評価、腎実質の機能評価が可能である。しかし空間分解能が低く腎腫瘍 (renal tumor) の診断には用いられないため、Bが誤った記述（=FALSEの答え）である。腫瘍診断には造影CT/MRIや超音波を用いる。", "src": "pp"}, {"id": "102-5", "t": "腫瘍学で最も多く用いられるPET放射性医薬品", "q": "Which PET-radiopharmaceutical is used most often in oncology?", "o": ["A. 18F-Fludeoxyglucose (18F-FDG)", "B. 99m-Tc-Hydroxymethylene-Diphosphonate (99m-Tc-HDP)", "C. 11C-Cholin", "D. 18F-Sodium-Fluoride (18F-NaF)"], "a": "A. 18F-Fludeoxyglucose (18F-FDG)", "c": "nuclear", "k": "a", "e": "腫瘍学で最も広く用いられるPET放射性医薬品はフルオロデオキシグルコース (18F-FDG) であり、腫瘍細胞のグルコース代謝亢進を反映して集積する。99m-Tc-HDPや18F-NaFは骨シンチ・骨転移評価用、11C-Cholinは前立腺癌など特定用途に限られる。", "src": "pp"}, {"id": "102-6", "t": "成人の標準腹部超音波で用いるプローブ", "q": "What type of probe is used for a standard abdominal ultrasound examination in an adult patient?", "o": ["A. 3-5 MHz linear", "B. 7-12 MHz convex", "C. 3-5 MHz convex", "D. 7-12 MHz linear"], "a": "C. 3-5 MHz convex", "c": "us", "k": "c", "e": "成人の腹部超音波 (abdominal ultrasound) では、深部到達性を確保するため低周波数 (3-5 MHz) のコンベックス（凸面）プローブ (convex probe) を用いる。低周波は深達度に優れ、コンベックス型は広い視野を得られる。リニアプローブや高周波プローブは表在組織用で深部腹部臓器には適さない。", "src": "pp", "trap": 1}, {"id": "102-7", "t": "乳房超音波で悪性を示唆する所見", "q": "During ultrasound examination, the following finding suggests a potential malignancy in the breast:", "o": ["A. Calcifications due to fat necrosis", "B. Encapsulated fluid collection", "C. Hypoechoic, irregular structure with lobulated contour", "D. Microscopic calcifications"], "a": "C. Hypoechoic, irregular structure with lobulated contour", "c": "breast", "k": "c", "e": "乳房超音波で悪性 (malignancy) を示唆するのは、低エコー (hypoechoic) で辺縁不整・分葉状 (irregular, lobulated) の腫瘤である。これらは浸潤性増殖を反映する。脂肪壊死の石灰化や被包化された液体貯留（嚢胞）は良性所見で、微小石灰化はマンモグラフィでの所見であり超音波では検出困難である。", "src": "pp"}, {"id": "103-1", "t": "乳房の充実性と嚢胞性を鑑別できる画像モダリティ", "q": "Which image modality is capable to differentiate between solid and cystic breast masses?", "o": ["A. Ultrasonography", "B. Galactography", "C. Mammography", "D. PET-CT"], "a": "A. Ultrasonography", "c": "breast", "k": "a", "e": "超音波 (ultrasonography) は乳房腫瘤が充実性 (solid) か嚢胞性 (cystic) かを鑑別する最良のモダリティである。嚢胞は無エコーで後方エコー増強を伴い、充実性腫瘤は内部エコーを有する。マンモグラフィは石灰化検出に優れるが充実/嚢胞の鑑別は困難で、乳管造影やPET-CTはこの目的に適さない。", "src": "pp"}, {"id": "103-2", "t": "IV CT造影剤投与に影響する条件（例外）", "q": "The following conditions can affect the administration of IV CT contrast media, EXCEPT FOR:", "o": ["A. coughing, epiphora, sense of palpitation and appearance of urticaria on chest and back following the administration of a certain type and concentration of IV contrast media", "B. Latest eGFR 28 ml/min/1.73m2", "C. \"Iodine allergy\" indicated on the referal - rash appearing after using antiseptic agent on skin", "D. Diabetes, chronic kidney disease patients who are not on dialysis, intake of metformin containing drugs on the day of examination"], "a": "C. \"Iodine allergy\" indicated on the referal - rash appearing after using antiseptic agent on skin", "c": "safety", "k": "c", "e": "過去の造影剤による咳・流涙・動悸・蕁麻疹（既往のアレルギー反応）、低eGFR（腎機能低下）、糖尿病・慢性腎臓病患者のメトホルミン服用はいずれも造影剤投与に影響する。一方、消毒薬（ヨード系皮膚消毒）による皮膚の発疹は静注ヨード造影剤に対するアレルギーを意味せず、いわゆる「ヨードアレルギー」は造影剤禁忌の根拠にならないため、Cが例外（=影響しない）の答えである。", "src": "pp"}, {"id": "103-3", "t": "電離放射線を使用しない画像法", "q": "Which of the following image methods do not use ionizing radiation?", "o": ["A. Ultrasound and MRI", "B. CT and MRI", "C. Xrays and Ultrasound", "D. Fluoroscopy and ultrasound"], "a": "A. Ultrasound and MRI", "c": "physics", "k": "a", "e": "超音波 (ultrasound) は音波、MRIは磁場と電磁波を利用し、いずれも電離放射線 (ionizing radiation) を使用しない。CT、単純X線 (X-rays)、透視 (fluoroscopy) はX線を用いるため電離放射線を伴う。よってAが正解。", "src": "pp", "trap": 1}, {"id": "103-5", "t": "壁在血腫（IMH）に関して正しい記述", "q": "TRUE regarding intramural hematoma (IMH)", "o": ["A. IMH is a type of acute aortic syndrome", "B. In suspicion of IMH non contrast phase has to be performed as well", "C. Both are correct", "D. Both are false"], "a": "C. Both are correct", "c": "cardiovascular", "k": "c", "e": "大動脈壁内血腫 (intramural hematoma, IMH) は急性大動脈症候群 (acute aortic syndrome) の一型である（Aは正しい）。また新鮮な血液は単純CTで高吸収を示すため、IMH疑いでは単純（非造影）相も撮影する必要がある（Bも正しい）。したがって両方とも正しく、Cが答えである。", "src": "pp"}, {"id": "103-6", "t": "急性胸痛で胸部X線が診断できない疾患（例外）", "q": "Chest X-Ray can diagnose the following pathologies in case of acute chest pain, except for:", "o": ["A. Aortic dissection", "B. Pneumonia", "C. Pneumothorax", "D. hydrothorax"], "a": "A. Aortic dissection", "c": "chest", "k": "a", "e": "胸部X線 (chest X-ray) は肺炎 (pneumonia)、気胸 (pneumothorax)、胸水 (hydrothorax) を診断できるが、大動脈解離 (aortic dissection) の確定診断はできない（縦隔拡大などの間接所見にとどまる）。解離の診断にはCT血管造影 (CT angiography) が必要なため、Aが例外の答えである。", "src": "pp"}, {"id": "103-7", "t": "腹部単純X線が陰性でも除外できないもの", "q": "Negative abdominal X-Ray rules out the following:", "o": ["A. Ileus", "B. Tumor", "C. Perforation of luminal organ", "D. None of the others"], "a": "D. None of the others", "c": "abdomen", "k": "d", "e": "腹部単純X線は感度が低く、陰性でもイレウス (ileus)、腫瘍 (tumor)、消化管穿孔 (perforation) のいずれも除外できない。早期や少量の所見は写らないことがあるため、これらを否定するにはCTなど他の検査が必要である。よって「いずれも除外できない=None of the others」が正解となる。", "src": "pp"}, {"id": "104-1", "t": "腹部・骨盤超音波での患者準備で誤った記述", "q": "How should the patient arrive for abdominal and pelvic ultrasound? Please mark the wrong answer", "o": ["A. With kidney function results not older than one week", "B. With full bladder", "C. After at least 4 hours of fasting", "D. With previous ultrasound reports"], "a": "A. With kidney function results not older than one week", "c": "us", "k": "a", "e": "腹部・骨盤超音波 (abdominal and pelvic ultrasound) では、骨盤臓器描出のための膀胱充満 (full bladder)、胆嚢・消化管ガス低減のための4時間以上の絶食 (fasting)、過去の超音波レポート持参が適切な準備である。腎機能結果は造影検査に必要なものであり、被曝も造影剤も用いない超音波では不要なため、Aが誤った記述（=wrong answer）である。", "src": "pp"}, {"id": "104-2", "t": "20歳女性の乳房痛での第一選択画像法", "q": "the Image method of Choice in a 20-year old female with breast pain:", "o": ["A. breast ultrasound", "B. Mammography", "C. CT", "D. MRI"], "a": "A. breast ultrasound", "c": "breast", "k": "a", "e": "若年女性（20歳）は乳腺密度が高くマンモグラフィの感度が低下し、被曝も避けたいため、乳房痛の評価には乳房超音波 (breast ultrasound) が第一選択となる。嚢胞や充実性腫瘤の鑑別にも優れる。マンモグラフィは通常40歳以降、CT・MRIは初期評価には不適である。", "src": "pp"}, {"id": "104-3", "t": "ガドリニウム造影剤について正しくない記述", "q": "not true for gadolinium based contrast agents:", "o": ["A. Low Risk intravenous contrast agents can be used cautiously in patients with advanced renal impairment (GFR 30ml/min/1.73m2)", "B. The risk of adverse reactions is the same as with iodinated contrast agents", "C. Since they have T1-shortening effect, they will be hyperintense on T1 weighted images", "D. Intravenous contrast agents with a high risk of causing nephrogenic systemic fibrosis (NSF) have been withdrawn from the market"], "a": "B. The risk of adverse reactions is the same as with iodinated contrast agents", "c": "safety", "k": "b", "e": "ガドリニウム造影剤 (gadolinium based contrast agents) はT1短縮効果によりT1強調像で高信号を示し、NSF高リスク製剤は市場から撤退している。有害反応の頻度はヨード造影剤 (iodinated contrast) よりも一般に低く、「同じ」とするBは誤りである。よってBが「正しくない」記述の答えとなる。", "src": "pp", "trap": 1}, {"id": "104-4", "t": "急性腹部X線で検出する所見（例外）", "q": "Acute abdominal X-ray is generally used in everyday clinic practice to detect the following, EXCEPT:", "o": ["A. kidney stone", "B. Foreign body", "C. Air-fluid Levels", "D. Free abdominal air"], "a": "A. kidney stone", "c": "abdomen", "k": "a", "e": "急性腹部単純X線は、異物 (foreign body)、鏡面像 (air-fluid levels、イレウスを示唆)、腹腔内遊離ガス (free abdominal air、穿孔を示唆) の検出に用いられる。尿路結石 (kidney stone) は腸管ガスや骨と重なって検出しにくく、評価には非造影CTが標準であるため、Aが例外の答えである。", "src": "pp"}, {"id": "104-5", "t": "AP像（前後方向撮影）の特徴", "q": "characteristic of the AP view:", "o": ["A. small amounts of pleural fluid is hard to notice on an APchest X-ray", "B. All of the above", "C. The cardiac silhouette is larger than on a PA view", "D. AP View is obtained for a spine chest radiograph"], "a": "B. All of the above", "c": "xray", "k": "b", "e": "AP像（前後方向, anteroposterior view）では、X線源から心臓までの距離が遠くなるため心陰影が拡大して見える (cardiac silhouette larger than PA)。また臥位で撮影されることが多く少量の胸水は気づきにくい。脊椎評価でもAP方向が用いられる。これらすべてが当てはまるため「All of the above」が正解。", "src": "pp"}, {"id": "104-6", "t": "胆道インターベンションの適応でないもの", "q": "Which is not an indication for Bile duct interventional radiological procedure:", "o": ["A. cholangitis", "B. Bile duct stenosis caused by malignant tumor", "C. Bile stone", "D. Portal hypertension"], "a": "A. cholangitis（本スライドの解答）", "c": "cardiovascular", "k": "a", "e": "本スライドでは解答列がAとなっている。胆道インターベンション（経皮経肝胆道ドレナージや胆管ステント留置）は、悪性腫瘍による胆管狭窄 (bile duct stenosis)、胆石 (bile stone) の処置に用いられる。門脈圧亢進症 (portal hypertension) は本来胆道系の適応ではなくTIPSなど別の血管インターベンションの対象である。胆管炎 (cholangitis) はむしろドレナージの適応となりうる病態であり、解答の妥当性には注意が必要（要確認）。", "src": "pp"}, {"id": "105-1", "t": "腎機能低下を伴う肺塞栓疑いでの診断戦略", "q": "chest pain, dyspnea, impaired renal function (GFR=38 ml/min/1.73m2) and d-dimer positivity in the laboratory, ECG. The patient is hemodynamically instable. Does the renal impairment change the diagnostic strategy?", "o": ["A) yes, prophylactic intravenous hydration should be performed first to avoid contrast induced acute kidney injury, then the pulmonary CT angiography may be performed.", "B) No, in this case chest X-ray should be performed first, and pulmonary CT angiography should only be considered upon a positive chest X-ray", "C) Yes, because of the severe renal impairment only a non-contrast chest CT should be performed.", "D) No, acute pulmonary CT angiography must be performed because of the life-threatening emergency, the consequential contrast induced acute kidney injury is of secondary concern."], "a": "D", "c": "cardiovascular", "k": "d", "e": "血行動態不安定 (hemodynamically unstable) で肺塞栓 (pulmonary embolism) が強く疑われる致死的緊急事態では、腎機能障害があっても診断を遅らせず直ちに造影CT肺動脈造影 (pulmonary CT angiography) を施行すべきである。造影剤腎症 (contrast induced AKI) のリスクは生命の危機に比べ二次的であるため、Dが正解となる。", "src": "pp", "trap": 1}, {"id": "105-2", "t": "下肢動脈狭窄・閉塞の第一治療選択", "q": "what is the primary treatment option in crural arterial stenosis/occlusion?", "o": ["A) hybrid operation", "B) Open surgery", "C) Endovascuar recanalisation", "D) Conservative management"], "a": "C) Endovascular recanalisation", "c": "cardiovascular", "k": "c", "e": "下腿動脈 (crural artery) の狭窄・閉塞に対する第一選択治療は、低侵襲な血管内再開通術 (endovascular recanalisation)（バルーン血管形成術やステント留置）である。開腹（開放）手術やハイブリッド手術はより侵襲的で、複雑例や血管内治療不成功例に限られる。保存的管理のみでは重症虚血の改善は得られない。", "src": "pp"}, {"id": "105-3", "t": "腹腔内遊離ガス（free peritoneal air）について", "q": "free peritoneal air:", "o": ["A) can be detected with the usage of barium contrast material", "B) It is always abnormal", "C) Is a sign of parenchyma organ perforation", "D) Is more sensitively detected with X-ray than CT"], "a": "B) It is always abnormal", "c": "abdomen", "k": "b", "e": "腹腔内遊離ガス (free peritoneal air) は通常、管腔臓器の穿孔 (perforation of a hollow organ) を示し、常に異常所見 (always abnormal) である（術後早期を除く）。実質臓器ではなく管腔臓器の穿孔の徴候であり、検出感度はX線よりCTのほうが高い。バリウムは穿孔疑いでは禁忌である。よってBが正しい。", "src": "pp"}, {"id": "105-4", "t": "AP像の特徴（再掲）", "q": "characteristic of AP view:", "o": ["A) small amounts of pleural fluid is hard to notice on an AP chest X-ray", "B) All of the above.", "C) The cardiac silhouette is larger than on PA view.", "D) AP View is obtained for a supine chest radiograph."], "a": "B) All of the above", "c": "xray", "k": "b", "e": "AP像（前後方向, anteroposterior）では心陰影が拡大し、臥位 (supine) 撮影が多く少量胸水が分かりにくく、臥位胸部撮影はAP方向で得られる。これらすべてが正しいため「All of the above」が正解となる。", "src": "pp"}, {"id": "105-5", "t": "くも膜下出血のCTでの典型的所見", "q": "what is the typical appearance of a subarachnoid hemorrhage on CT?", "o": ["A) hyperdense/ in basal cisterns, most commonly around the circle of Willis", "B) Hypodense/ in basal cisterns, most commonly around the circle of Willis", "C) Hypodense/ amorphous, within the brain", "D) Hyperdense/ amorphous, within the brain"], "a": "A) hyperdense/ in basal cisterns, most commonly around the circle of Willis", "c": "neuro", "k": "a", "e": "くも膜下出血 (subarachnoid hemorrhage, SAH) は急性期の単純CTで高吸収 (hyperdense) を示し、脳底槽 (basal cisterns)、特にウィリス動脈輪 (circle of Willis) 周囲のくも膜下腔に血液が分布する。脳実質内ではなくくも膜下腔・脳槽に沿って広がる点が特徴で、Aが正解。", "src": "pp", "trap": 1}, {"id": "105-6", "t": "ソノエラストグラフィの意味", "q": "what does sonoelastography mean?", "o": ["A) examination of blood flow parameters in the tissue", "B) Examination of flow by reflections of flowing particles", "C) Examination of tissue elasticity by ultrasonography", "D) Examination of tissue contrast enhancement using microbubbles"], "a": "C) Examination of tissue elasticity by ultrasonography", "c": "us", "k": "c", "e": "ソノエラストグラフィ (sonoelastography) は超音波を用いて組織の硬さ・弾性 (tissue elasticity) を評価する手法で、硬い組織（悪性腫瘍や線維化）と柔らかい組織を識別できる。血流評価はドプラ法、マイクロバブルを用いるのは造影超音波 (contrast enhanced US) であり、これらとは区別される。", "src": "pp"}, {"id": "105-7", "t": "腫瘍学的画像におけるMRIの主な役割", "q": "the main role of MRI in oncologic imaging is:", "o": ["A) local tumor staging", "B) Overview of organ system and local tumor staging in a short examination time"], "a": "A) local tumor staging", "c": "mri", "k": "a", "e": "腫瘍学的画像におけるMRIの主な役割は、優れた軟部組織コントラストを活かした局所腫瘍進展度の評価 (local tumor staging) である。全身の概観を短時間で得るのはCTやPET-CTの役割であり、MRIは撮影時間が長く全身スクリーニングには不向きなため、Aが正解。", "src": "pp"}, {"id": "106-1", "t": "多発外傷ケアアルゴリズムにおけるMRIの役割", "q": "what is the role of MRI in the poly trauma care algorithm?", "o": ["A) a cranial MRI scan is performed in each case.", "B) Detection of neurologic abnormalities, possible discoligamentous lesions and exclusion of intraspinal hematoma which cannot be otherwise explained by CT", "C) The first step in the diagnostic algorithm: whole body MRI", "D) Plays no role at all, CT and US are enough"], "a": "B) Detection of neurologic abnormalities, possible discoligamentous lesions and exclusion of intraspinal hematoma which cannot be otherwise explained by CT", "c": "neuro", "k": "b", "e": "多発外傷 (polytrauma) の初期評価では迅速で利用しやすい全身CTが第一選択であり、MRIは補助的役割を担う。具体的には、CTで説明できない神経学的異常、椎間板・靭帯損傷 (discoligamentous lesions)、脊柱管内血腫 (intraspinal hematoma) の検出・除外にMRIが用いられる。全例で頭部MRIを行うわけでも、第一段階で全身MRIを行うわけでもないため、Bが正解。", "src": "pp"}, {"id": "F01-1", "t": "MRIとペースメーカー患者の対応", "q": "A patient arrives for an MRI scan with the referral of a medical specialist. He tells that he has a cardiac pacemaker. What the radiographer/radiologist needs to do?", "o": ["a. non-contrast MRI can be performed, but intravenous contrast agents are contraindicated", "b. before the MRI scan can be performed, the radiographer/radiologist needs to check the written medical documentation of the patient to make sure that his pacemaker is MRI compatible (at the field strength of the scanner) and is set to MRI compatibility mode", "c. MRI can be performed, because the referring medical specialist is responsible for checking the contraindications", "d. MRI can be performed, because nowadays pacemakers are MR compatible"], "a": "b", "k": "b", "e": "心臓ペースメーカー (cardiac pacemaker) は強磁場・高周波 (RF) による加熱・誤作動・リード過熱のリスクがあるため、撮影前に「MRI条件付き対応 (MR conditional)」かを文書で確認し、対応磁場強度を満たした上でMRIモードに設定する必要がある。最終確認の責任は実施者（撮影者・放射線科医）にあるためcは誤り。全機種がMR対応ではないためdも誤り。MR非対応機では造影の有無に関わらず撮影自体が禁忌となり得るためaも不適切。", "src": "feb2021", "c": "safety"}, {"id": "F01-2", "t": "心筋シンチグラフィで評価する項目", "q": "What is determined by myocardial scintigraphy?", "o": ["a. ventricular function", "b. myocardial perfusion", "c. level of coronary stenosis", "d. valvular function"], "a": "b. myocardial perfusion", "k": "b", "e": "心筋シンチグラフィ (myocardial scintigraphy) は放射性トレーサーの心筋集積から心筋血流 (myocardial perfusion) と虚血・梗塞領域を評価する核医学検査。心室機能 (ventricular function) や弁機能 (valvular function) は心エコー・MRIで、冠動脈狭窄の程度は冠動脈造影・CT angiographyで評価するためa・c・dは誤り。", "src": "feb2021", "c": "nuclear", "trap": 1}, {"id": "F02-1", "t": "CT造影剤の副作用リスクが高い患者", "q": "There is a higher risk of adverse effects after iv. administration of CT contrast material:", "o": ["a. in patients with severe hypothyreosis", "b. in patients with impaired liver function", "c. in patients under the age of 70 years", "d. in dehydrated patients"], "a": "d. in dehydrated patients", "k": "d", "e": "ヨード造影剤 (iodinated contrast) は腎排泄されるため、脱水 (dehydration) 患者では造影剤腎症 (contrast-induced nephropathy) のリスクが上がる。事前の十分な補液 (hydration) が予防に重要。肝機能障害はヨード造影剤の主な禁忌ではなく（肝排泄ではない）b は誤り、高齢はリスク因子だが「70歳未満」は逆 (c)、甲状腺機能\"低下\"より\"亢進\"がヨードで問題となるため a も不適切。", "src": "feb2021", "c": "safety"}, {"id": "F02-2", "t": "T1強調像とT2強調像の見分け方", "q": "How can be differentiated a T1W MR image from a T2W MR image?", "o": ["a. „flow void\" can be recognized on T1W MRI, but not on T2W MRI", "b. can be determined only after iv. gadolinium administration, because gadolinium shortens the T1 time", "c. fat is hypointense on T1W MRI, but hyperintense on T2W MRI", "d. stationary fluid is hypointense on T1W MRI, but hyperintense on T2W MR"], "a": "d. stationary fluid is hypointense on T1W MRI, but hyperintense on T2W MR", "k": "d", "e": "静止液体（脳脊髄液 CSF・尿・胆汁など）はT1強調像で低信号 (hypointense)・T2強調像で高信号 (hyperintense) となり、これが両者を見分ける最も簡便な指標。脂肪 (fat) はT1で高信号なので c は逆で誤り。flow void は両シーケンスで見られ a は誤り。ガドリニウム投与は鑑別に必須ではないため b も誤り。", "src": "feb2021", "c": "mri", "trap": 1}, {"id": "F03-1", "t": "造影乳房MRIが使われない状況（EXCEPT）", "q": "Contrast-enhanced breast MRI is used in the following clinical situations, EXCEPT:", "o": ["a. to examine chest wall infiltration by breast cancer", "b. to detect breast implant rupture", "c. to assess multifocality", "d. to differentiate between scar tissue and recurrent tumor"], "a": "b. to detect breast implant rupture", "k": "b", "e": "インプラント破裂 (implant rupture) の評価には造影は不要で、シリコン専用の非造影シーケンス (silicone-sensitive, non-contrast sequences) を用いるため、「造影」乳房MRIの適応からは外れる（EXCEPT）。胸壁浸潤評価 (a)、多発性 (multifocality) 評価 (c)、瘢痕と再発腫瘍の鑑別 (d) はいずれも造影乳房MRIの代表的適応。", "src": "feb2021", "c": "breast"}, {"id": "F03-2", "t": "腫瘍画像におけるMRIの主な役割", "q": "The main role of MRI in oncologic imaging is:", "o": ["a. recognition of lung metastases", "b. to follow-up all distant metastases", "c. overview of organ systems in short examination time", "d. assessment of local tumor staging and regional lymph nodes"], "a": "d. assessment of local tumor staging and regional lymph nodes", "k": "d", "e": "MRIは高い軟部組織コントラスト (soft-tissue contrast) を活かし、局所の腫瘍進展 (local T-staging) と所属リンパ節 (regional lymph nodes) 評価に優れる。肺転移の検出はCTが優れ (a 誤り)、全身の遠隔転移フォローはPET-CT等が適し (b 誤り)、撮影時間はCTより長く「短時間で全身概観」は不適切 (c 誤り)。", "src": "feb2021", "c": "mri"}, {"id": "F04-1", "t": "遊離腹腔内ガス（free air）について正しいもの", "q": "TRUE for the imaging of free peritoneal air:", "o": ["a. it is a sign of GI tract perforation", "b. barium is contraindicated if it is visible on an abdominal radiograph", "c. it is more sensitively detected with CT than radiograph", "d. all of those are true"], "a": "d. all of those are true", "k": "d", "e": "遊離腹腔内ガス (free peritoneal air) は消化管穿孔 (GI perforation) のサイン (a)。穿孔が示唆される場合、バリウム (barium) は腹膜炎を起こすため禁忌で水溶性造影剤を用いる (b)。微量の遊離ガスは立位X線より CT の方が高感度に検出する (c)。よって全て正しく d が正解。", "src": "feb2021", "c": "abdomen"}, {"id": "F04-2", "t": "臨床放射線撮影について正しいもの", "q": "True for clinical radiography:", "o": ["a. 1 view is sufficient in bone fractures in most cases", "b. heart contour is magnified in AP chest film", "c. skull x-ray is mandatory in significant head trauma", "d. chest radiograph is always inspiratory"], "a": "b. heart contour is magnified in AP chest film", "k": "b", "e": "AP（前後方向）撮影では心臓が検出器から遠く（前方に位置）拡大投影されるため、心陰影が拡大して写る (b 正解)。骨折は最低2方向 (2 views) が原則で a は誤り。重症頭部外傷ではCTが第一選択で頭蓋単純X線は必須でない (c 誤り)。胸部X線は通常吸気で撮るが、気胸の評価などで呼気撮影もあり「always」は言い過ぎ (d 誤り)。", "src": "feb2021", "c": "xray"}, {"id": "F05-1", "t": "動的CT/MRIの動脈相で描出されるもの", "q": "Arterial phase of dynamic CT/MRI is used for the visualization of:", "o": ["a. biliary dilatation", "b. hypervascular liver tumors, e.g. HCC", "c. hypovascular liver tumors, e.g. colon adenocarcinoma metastases", "d. the pelvicalyceal system"], "a": "b. hypervascular liver tumors, e.g. HCC", "k": "b", "e": "動脈相 (arterial phase) は動脈血流が豊富な多血性腫瘍 (hypervascular tumor) を最も鋭敏に描出し、肝細胞癌 (HCC) が典型例。乏血性転移 (c) は門脈相〜平衡相で背景肝とのコントラストが明瞭になる。胆管拡張 (a) や腎盂腎杯 (pelvicalyceal system, d) は造影相のタイミングが異なる（後者は排泄相）。", "src": "feb2021", "c": "abdomen", "trap": 1}, {"id": "F05-2", "t": "急性脳梗塞のCT/MRI所見でないもの（EXCEPT）", "q": "Radiological sign of acute ischemic stroke on CT/MRI, EXCEPT:", "o": ["a. hyperdense media sign", "b. diffusion restriction on DW-MRI", "c. abnormal hypodensity in brain tissue", "d. abnormal hypointensity on FLAIR"], "a": "d. abnormal hypointensity on FLAIR", "k": "d", "e": "急性脳梗塞はFLAIRで「高信号 (hyperintensity)」を示すため、「低信号 (hypointensity)」は誤りで EXCEPT に該当 (d)。高吸収中大脳動脈サイン (hyperdense MCA sign, a)、拡散強調像での拡散制限 (diffusion restriction, b)、脳実質の低吸収化 (hypodensity, c) はいずれも急性期梗塞の正しい所見。", "src": "feb2021", "c": "neuro", "trap": 1}, {"id": "F06-1", "t": "胸部X線が適さない用途", "q": "Chest X-ray is NOT suitable for:", "o": ["a. the role of initial imaging modality in nearly all patients with thoracic disease", "b. checking the position of the tracheal tube", "c. recognition of small amount of pleural fluid (less than 100 ml)", "d. checking the position of a central venous line"], "a": "c. recognition of small amount of pleural fluid (less than 100 ml)", "k": "c", "e": "立位胸部X線では少量胸水（100 ml未満）は肋骨横隔膜角 (costophrenic angle) の鈍化として現れにくく検出困難。少量胸水の検出は超音波やCTが優れる。気管チューブ (b) や中心静脈カテーテル (d) の位置確認、胸部疾患の初期検査 (a) は胸部X線の代表的役割。", "src": "feb2021", "c": "chest", "trap": 1}, {"id": "F06-2", "t": "放射線科の造影剤について正しい記述", "q": "TRUE statement for contrast agents in radiology:", "o": ["a. a type of contrast agents is eliminated by the lungs", "b. iv. gadolinium increases density of the examined organ/region", "c. it serves to increase spatial resolution", "d. GFR assessment is mandatory before contrast agent administration of any type"], "a": "c. it serves to increase spatial resolution（スライドの●）／※下記要確認", "k": "c", "e": "スライドは c に●が付いているが、造影剤が高めるのは空間分解能 (spatial resolution) ではなく**コントラスト分解能 (contrast resolution)** であり、c は医学的には誤り。医学的に最も妥当なのは a（一部の造影剤＝ガス系などは肺から排出される）。ガドリニウムは「density（CT値）」ではなくMR信号を変えるため b は誤り、GFR評価は腎排泄性ヨード造影剤等で重要だが「any type（超音波マイクロバブル等含む全種）」では必須でないため d も誤り。**この設問は元資料のマークが疑わしいので要確認。**", "src": "feb2021", "c": "safety", "chk": 1}, {"id": "F07-1", "t": "浅大腿動脈狭窄：IVRがCT-angiographyに勝る利点", "q": "A patient has short section, significant superficial femoral artery stenosis confirmed by ultrasound. What is the advantage of the interventional procedure against the CT-angiography?", "o": ["a. contrast material allergy does not occur", "b. there is no ionizing radiation", "c. provides diagnosis and therapy under one roof", "d. does nor require preparation"], "a": "c. provides diagnosis and therapy under one roof", "k": "c", "e": "カテーテルによる血管内治療 (interventional radiology, IVR) は、血管造影で診断すると同時にバルーン拡張・ステント留置などの治療を一度に行える（diagnosis and therapy \"under one roof\"）のが最大の利点。IVRでもヨード造影剤と被曝を伴うため a・b は誤り、前処置も必要なため d も誤り。", "src": "feb2021", "c": "cardiovascular"}, {"id": "F07-2", "t": "気管支透亮像（air bronchogram）が特徴的でない病態（EXCEPT）", "q": "Aerobronchogram is characteristic in the following conditions, EXCEPT:", "o": ["a. bronchioloalveolar carcinoma", "b. alveolar pulmonary edema", "c. viral pneumonia", "d. IRDS"], "a": "c. viral pneumonia", "k": "c", "e": "気管支透亮像 (air bronchogram) は肺胞腔が液体・細胞・組織で充満し、含気の残る気管支が周囲との対比で透けて見える所見で、肺胞性病変（細気管支肺胞上皮癌 a、肺胞性肺水腫 b、新生児呼吸窮迫症候群 IRDS d）で典型的。ウイルス性肺炎は主に間質性パターンを示すため air bronchogram は特徴的でなく EXCEPT に該当 (c)。", "src": "feb2021", "c": "chest"}, {"id": "F08-1", "t": "皮質骨の画像所見として誤っているもの（FALSE）", "q": "FALSE for radiological appearance of cortical bone:", "o": ["a. radiopaque structures on chest x-ray", "b. has acoustic shadowing on ultrasonography", "c. black („signal void\") on MRI sequences", "d. its CT density is generally 100-300 HU"], "a": "d. its CT density is generally 100-300 HU", "k": "d", "e": "皮質骨 (cortical bone) のCT値は概ね数百〜1000 HU超と非常に高く、「100-300 HU」は低すぎるため誤り (FALSE = d)。皮質骨はX線で高吸収（radiopaque, a）、超音波では強い音響陰影 (acoustic shadowing, b)、MRIでは信号が乏しく黒い signal void (c) として写るのが正しい所見。", "src": "feb2021", "c": "msk"}, {"id": "F08-2", "t": "胸部X線で「白い肺」を示さない病態（EXCEPT）", "q": "„White lung\" can be recognized on a chest x-ray in the following conditions, EXCEPT:", "o": ["a. pulmonectomy", "b. pneumothorax", "c. atelectasia", "d. pneumonia"], "a": "b. pneumothorax", "k": "b", "e": "気胸 (pneumothorax) は胸腔内の空気のため患側が「黒く（透過性亢進）」写るため、「白い肺 (white lung)」とは逆で EXCEPT に該当 (b)。肺全摘後 (pulmonectomy, a)、無気肺 (atelectasis, c)、肺炎 (pneumonia, d) はいずれも含気低下・浸潤影で白く写る。", "src": "feb2021", "c": "chest"}, {"id": "F09-1", "t": "一般にFDG集積が高くない疾患", "q": "In general, which of these diseases does NOT have high FDG-uptake?", "o": ["a. Low-grade prostate cancer", "b. Pneumonia", "c. Invasive ductal breast cancer", "d. Colon adenocarcinoma"], "a": "a. Low-grade prostate cancer", "k": "a", "e": "低悪性度前立腺癌 (low-grade prostate cancer) はブドウ糖代謝が低くFDG集積が乏しいため、FDG-PETの感度が低い（前立腺癌にはPSMA-PETなどを用いる）。肺炎 (b) は炎症でFDG集積、浸潤性乳管癌 (c) や結腸腺癌 (d) は高代謝でFDG高集積を示すため、集積が高くないのは a。", "src": "feb2021", "c": "nuclear"}, {"id": "F09-2", "t": "CEUS（造影超音波）の適応でないもの", "q": "What is NOT an indication for CEUS examination (contrast-enhanced ultrasonography)?", "o": ["a. tubal patency examination in infertility program", "b. circumscribed liver mass characterization", "c. gallstone search", "d. vesico-ureteral reflux"], "a": "c. gallstone search", "k": "c", "e": "胆石 (gallstone) は通常のBモード超音波で音響陰影を伴う高エコーとして容易に描出でき、造影超音波 (CEUS) の適応ではない (c)。卵管疎通性検査 (HyCoSy, a)、限局性肝腫瘤の血流性状評価 (b)、膀胱尿管逆流 (VUR) の評価 (d) はマイクロバブル造影剤を用いるCEUSの適応。", "src": "feb2021", "c": "us"}, {"id": "F10-1", "t": "筋骨格（MSK）外傷画像について正しいもの", "q": "TRUE for MSK trauma imaging:", "o": ["a. signs of stress fracture appear earlier on radiograph than on bone scintigraphy", "b. at least 3-view radiograph is mandatory in acute fracture", "c. MRI study is indicated if injury of the CNS suspected", "d. study of choice is US in menisceal and cruciate ligament injury of the knee"], "a": "c. MRI study is indicated if injury of the CNS suspected", "k": "c", "e": "脊椎外傷などで脊髄＝中枢神経 (CNS) 損傷が疑われる場合、軟部・神経組織の評価に優れるMRIが適応 (c)。疲労骨折 (stress fracture) は骨シンチの方がX線より早期に陽性化するため a は逆。急性骨折は2方向が基本で「3方向必須」は誤り (b)。膝の半月板・十字靱帯損傷の第一選択はMRIでありUSではないため d も誤り。", "src": "feb2021", "c": "msk"}, {"id": "F10-2", "t": "電離放射線を使わない画像検査の組合せ", "q": "Which of the following imaging methods does not use ionizing radiation?", "o": ["a. CT and MRI", "b. mammography and ultrasound", "c. irrigoscopy and ultrasound", "d. ultrasound and MRI"], "a": "d. ultrasound and MRI", "k": "d", "e": "超音波 (ultrasound) は音波、MRIは磁場と電波を用い、いずれも電離放射線 (ionizing radiation) を使わない (d)。CT・マンモグラフィ・注腸造影 (irrigoscopy) はいずれもX線を用いるため、これらを含む a・b・c は誤り。", "src": "feb2021", "c": "physics"}, {"id": "F11-1", "t": "空間分解能の小さい順に並べる", "q": "Order the following modalities according to increasing spatial resolution:", "o": ["a. DSA < US < MRI < CT", "b. bone scintigraphy < MRI < DSA < mammography", "c. US < fluoroscopy < MRI < CT", "d. chest x-ray < fluoroscopy < US < MRI"], "a": "b. bone scintigraphy < MRI < DSA < mammography", "k": "b", "e": "空間分解能 (spatial resolution) は核医学（骨シンチ）が最も低く、マンモグラフィが最も高い。b は「骨シンチ < MRI < DSA < マンモグラフィ」と低→高の順に正しく並ぶ。他の選択肢はCTやMRIの順序が実際の分解能と矛盾するため誤り。", "src": "feb2021", "c": "physics", "trap": 1}, {"id": "F11-2", "t": "22歳・触知可能な乳房腫瘤：正しい検査順", "q": "22 year-old woman with palpable breast lump and negative family anamnesis. Which one is the correct order of radiological examinations?", "o": ["a. MR is the modality of choice, becuse screening of young patients must be performed by MRI", "b. CT is the only imaging study necessary to perform, because it provides staging of the tumor in one step", "c. US as an initial study, followed by mammography and/or MRI if necessary", "d. mammography as an initial study, followed by US and/or MRI if necessary"], "a": "c. US as an initial study, followed by mammography and/or MRI if necessary", "k": "c", "e": "若年（40歳未満）女性は乳腺密度が高くマンモグラフィの感度が低いため、超音波 (US) を初期検査とし、必要に応じてマンモグラフィやMRIを追加する (c)。若年スクリーニングをMRIで行うのは標準でなく a は誤り、乳房評価にCTは第一選択でないため b も誤り、若年でいきなりマンモグラフィを first とする d は不適切。", "src": "feb2021", "c": "breast", "trap": 1}, {"id": "F12-1", "t": "MR検査が可能な最も若い年齢", "q": "The youngest age at which an MR study can be performed:", "o": ["a. At the age of 2, by which the white matter is myelinated completely.", "b. It is necessary to wait until the age of 4-5, when the patient is able to co-operate.", "c. It can be performed even in the first days after birth.", "d. Prenatal MR study can be performed if developmental disorder is suspected."], "a": "b（スライドの●）／※下記要確認", "k": "b", "e": "スライドは b に●が付いているが、医学的にはMRIに年齢下限はなく、鎮静 (sedation) を併用すれば**新生児・出生直後でも施行可能**であり、さらに胎児MRI (fetal/prenatal MRI) も行われる。したがって医学的に正しいのは c（および d も臨床的に行われる）。協力が得られない年齢では鎮静で対応するため「4-5歳まで待つ必要」は不適切。**元資料のマークが疑わしいので要確認。**", "src": "feb2021", "c": "mri", "chk": 1}, {"id": "F12-2", "t": "甲状腺シンチグラフィの適応でないもの", "q": "Which of these following is NOT an indication for thyroid scintigraphy?", "o": ["a. Detection of ectopic thyroid tissue", "b. Differential diagnosis of hypothyroidism", "c. Differential diagnosis of hyperthyroidism", "d. Detection of cold nodules"], "a": "b. Differential diagnosis of hypothyroidism", "k": "b", "e": "甲状腺シンチグラフィはトレーサー集積（機能）を見る検査で、異所性甲状腺の検出 (a)、甲状腺機能\"亢進\"症の鑑別（Basedow病 vs 機能性結節など, c）、冷結節 (cold nodule) の検出 (d) が代表的適応。機能\"低下\"症の鑑別 (b) は集積が全般に低下し情報量が乏しく、通常は適応外。", "src": "feb2021", "c": "nuclear", "trap": 1}, {"id": "F13-1", "t": "腹部DWI（拡散強調MRI, DWI-ADC）が有用な対象", "q": "In abdominal imaging, diffusion-weighted (DWI-ADC) MRI is important in the detection of:", "o": ["a. colon cancer", "b. prostate cancer", "c. both, because the increase in cellularity inhibits the free movement of water molecules", "d. neither, because diffusion-weighted imaging is useful only in the detection of ischemia"], "a": "c. both, because the increase in cellularity inhibits the free movement of water molecules", "k": "c", "e": "悪性腫瘍は細胞密度 (cellularity) が高く水分子の自由拡散が制限される (diffusion restriction) ため、DWIで高信号・ADC低値となる。これは大腸癌・前立腺癌の両方に当てはまり c が正解。DWIは脳梗塞だけでなく体幹部腫瘍評価にも広く有用なので d は誤り。", "src": "feb2021", "c": "abdomen"}, {"id": "F13-2", "t": "急性虫垂炎の画像所見として正しいもの", "q": "True for imaging of acute appendicitis:", "o": ["a. appendix is thickened (more than 6 mm in diameter) with enhanced Doppler-signal", "b. iv. contrast administration is unnecessary to diagnose periappendicular abscess", "c. CT is always necessary", "d. ultrasonography is very sensitive method in obese patients"], "a": "a. appendix is thickened (more than 6 mm in diameter) with enhanced Doppler-signal", "k": "a", "e": "急性虫垂炎では虫垂が腫大（外径6 mm超）し、炎症性の充血を反映してカラードプラで血流シグナルが増強する (a)。膿瘍評価には造影が有用なので b は誤り、超音波や臨床で診断可能でありCTが「常に必須」ではない (c 誤り)、肥満患者では超音波の描出が難しく感度が下がるため d も誤り。", "src": "feb2021", "c": "abdomen"}, {"id": "F14-1", "t": "AP像とPA像に関する誤った記述（FALSE）", "q": "Choose the FALSE statement regarding to A-P and P-A chest films!", "o": ["a. diaphragm is generally in lower position on a P-A film in comparison to an A-P film", "b. both films are inspiratory in most of the cases", "c. pleural fluid can be recognized in the lateral sinuses on both films", "d. magnification of the heart is greater on an A-P film in comparison to a P-A film"], "a": "c. pleural fluid can be recognized in the lateral sinuses on both films", "k": "c", "e": "AP像は多くが臥位/ポータブルで撮られ、胸水は背側に広がって肋骨横隔膜角（lateral sinus）に明瞭な液面を作りにくいため、「両方の像で側方の sinus に胸水を認識できる」は誤り (FALSE = c)。立位PAでは横隔膜が下がり (a 正しい)、通常は吸気撮影 (b 正しい)、AP像では心拡大が強調される (d 正しい)。", "src": "feb2021", "c": "xray"}, {"id": "F14-2", "t": "モダリティと造影剤の組合せで誤っているもの（WRONG）", "q": "Which radiological modality-contrast agent pair is WRONG?", "o": ["a. dynamic MRI – gadolinium", "b. contrast-enhanced ultrasonography – microbubbles", "c. swallow exam – barium", "d. HRCT – iodine-based contrast"], "a": "d. HRCT – iodine-based contrast", "k": "d", "e": "HRCT（高分解能CT）は肺野の微細構造を評価する**非造影**の撮影法で、ヨード造影剤は用いないため組合せが誤り (WRONG = d)。動的MRI＝ガドリニウム (a)、造影超音波＝マイクロバブル (b)、嚥下造影＝バリウム (c) はいずれも正しい組合せ。", "src": "feb2021", "c": "safety"}, {"id": "F15-1", "t": "単純CTで負のCT値（HU）を示す構造", "q": "Structure with negative density value (HU) on noncontrast CT:", "o": ["a. liver tumor", "b. kidney stone", "c. lipoma", "d. aneurysm clip"], "a": "c. lipoma", "k": "c", "e": "脂肪 (fat) はおよそ −50〜−100 HU と負のCT値を示し、脂肪腫 (lipoma) が該当 (c)。肝腫瘍は概ね軟部組織〜やや低吸収だが正の値 (a)、腎結石 (b) や金属の動脈瘤クリップ (d) は高吸収で大きな正の値を示す。", "src": "feb2021", "c": "ct"}, {"id": "F15-2", "t": "頸動脈エコーで用いるプローブ（トランスデューサ）", "q": "Which transducer is generally used for carotid artery examination?", "o": ["a. 7-12 MHz convex", "b. 3-5 MHz convex", "c. 3-5 MHz linear", "d. 7-12 MHz linear"], "a": "d. 7-12 MHz linear", "k": "d", "e": "頸動脈は体表に近い浅在構造のため、高周波 (7-12 MHz) のリニア型 (linear) プローブで高い空間分解能が得られる (d)。低周波 (3-5 MHz) やコンベックス型は深部（腹部など）向けで分解能が落ちるため不適。高周波は深達度が浅い代わりに分解能が高い、という超音波の基本原則に対応する。", "src": "feb2021", "c": "us", "trap": 1}, {"id": "R01", "t": "放射性医薬品とは", "q": "What is a radiopharmaceutical?", "o": [], "a": "A specific molecule (specific for organ, molecule, function etc) marked with an unstable isotope.", "c": "nuclear", "k": "", "e": "放射性医薬品 (radiopharmaceutical)＝特定臓器/分子/機能に集積する担体に不安定同位元素 (unstable isotope) を標識したもの。", "src": "radkey", "qa": 1}, {"id": "R02", "t": "汎用核種", "q": "Which isotope is used most often for the conventional pharmacomedicine?", "o": [], "a": "Technetium 99 (99mTc)", "c": "nuclear", "k": "", "e": "一般核医学で最多はテクネチウム99m (99mTc)。半減期約6h、140keVのγ線。", "src": "radkey", "qa": 1}, {"id": "R03", "t": "腫瘍PET核種", "q": "Which PET pharmaceutical isotope is used most often in oncology?", "o": [], "a": "18 FDG", "c": "nuclear", "k": "", "e": "腫瘍PETは18F-FDG（フルオロデオキシグルコース）。糖代謝 (glucose metabolism) 亢進部に集積。", "src": "radkey", "qa": 1}, {"id": "R04", "t": "骨シンチの非適応", "q": "Which of the following is not an indication for bone scintigraphy?", "o": [], "a": "Localization of the primary tumor.", "c": "nuclear", "k": "", "e": "骨シンチ (bone scintigraphy) の適応は骨転移 (bone metastasis)・staging・follow-up。原発巣の局在は適応外。", "src": "radkey", "qa": 1}, {"id": "R05", "t": "PET-CT非適応", "q": "Which of the following is not a common indication for PET-CT?", "o": [], "a": "Size of primary tumor", "c": "nuclear", "k": "", "e": "PET-CTは代謝・転移・再発・治療効果に強いが、原発巣のサイズ計測は形態画像の役割。", "src": "radkey", "qa": 1}, {"id": "R06", "t": "DGCが不十分な腫瘍", "q": "For which tumor is DGC diagnosis not adequate for tumor?", "o": [], "a": "Prostate", "c": "nuclear", "k": "", "e": "前立腺癌 (prostate cancer) は造骨性転移でFDG集積が乏しい等、一部核医学評価が不十分。（DGCの語義は要確認）", "src": "radkey", "qa": 1, "chk": 1}, {"id": "R07", "t": "甲状腺シンチ最多適応", "q": "What is the most common indication for thyroid scintigraphy?", "o": [], "a": "Diagnosis of hyperthyroidism", "c": "nuclear", "k": "", "e": "甲状腺シンチの最多適応は甲状腺機能亢進症 (hyperthyroidism) の診断。", "src": "radkey", "qa": 1}, {"id": "R08", "t": "PETが検出するもの", "q": "What is detected by PET camera?", "o": [], "a": "Gamma photons", "c": "nuclear", "k": "", "e": "陽電子 (positron) の対消滅で生じる511keVのγ線2本を同時計数 (coincidence) で検出。", "src": "radkey", "qa": 1}, {"id": "R09", "t": "99mTc半減期", "q": "What is the half-life of Technetium 99?", "o": [], "a": "6 hours", "c": "nuclear", "k": "", "e": "99mTcの物理的半減期 (physical half-life) は約6時間。", "src": "radkey", "qa": 1}, {"id": "R10", "t": "核医学の特徴", "q": "Which of the following is true? (about isotope investigations)", "o": [], "a": "Most isotope investigations have high sensitivity (high sensitivity, low specificity).", "c": "nuclear", "k": "", "e": "核医学検査は高感度 (high sensitivity)・低特異度 (low specificity)。", "src": "radkey", "qa": 1}, {"id": "R11", "t": "治療用核種", "q": "Radioactive isotope used in radiotherapy?", "o": [], "a": "Beta emitter", "c": "nuclear", "k": "", "e": "治療核医学はβ線放出核種 (beta emitter)。飛程が短く局所に高線量。診断はγ線核種。", "src": "radkey", "qa": 1}, {"id": "R12", "t": "心筋シンチで評価", "q": "What can we investigate with myocardial scintigraphy?", "o": [], "a": "Rate of perfusion", "c": "nuclear", "k": "", "e": "心筋シンチは心筋灌流 (myocardial perfusion) を評価し虚血/梗塞を判定。", "src": "radkey", "qa": 1}, {"id": "R13", "t": "ガンマカメラに含まれない", "q": "Which one is not a part of gamma camera?", "o": [], "a": "X-ray tube", "c": "nuclear", "k": "", "e": "ガンマカメラはコリメータ・NaI結晶・光電子増倍管から成る。X線管 (X-ray tube) は不要。", "src": "radkey", "qa": 1}, {"id": "R14", "t": "動的腎シンチの誤り", "q": "Which statement is false about dynamic renal scintigraphy?", "o": [], "a": "Used for diagnosis of renal tumors", "c": "nuclear", "k": "", "e": "動的腎シンチは分腎機能・尿路通過の評価用。腎腫瘍診断はCT/MRIの役割（この記述が誤り）。", "src": "radkey", "qa": 1}, {"id": "R15", "t": "核医学の分解能", "q": "What is false? (nuclear medicine vs radiology resolution)", "o": [], "a": "Nuclear medicine has higher spatial resolution than radiology.", "c": "physics", "k": "", "e": "核医学の空間分解能 (spatial resolution) はX線/CTより低い（この記述は誤り）。", "src": "radkey", "qa": 1}, {"id": "R16", "t": "食道穿孔の造影剤", "q": "Esophagus perforation for diagnosis", "o": [], "a": "Use water soluble contrast (not barium)", "c": "abdomen", "k": "", "e": "食道穿孔は水溶性造影剤 (water-soluble contrast)。バリウムは縦隔炎 (mediastinitis) を起こすため禁忌。", "src": "radkey", "qa": 1}, {"id": "R17", "t": "放射線感受性が高い臓器", "q": "Most sensitive organ from radiation?", "o": [], "a": "Gonads", "c": "safety", "k": "", "e": "放射線感受性 (radiosensitivity) が高いのは生殖腺 (gonads)・骨髄など分裂が盛んな細胞。", "src": "radkey", "qa": 1}, {"id": "R18", "t": "X線利用技術", "q": "X-ray using technique?", "o": [], "a": "CT (DSA)", "c": "physics", "k": "", "e": "X線を使う技術の例: CT、DSA (digital subtraction angiography, 造影前後の差分で血管描出)。", "src": "radkey", "qa": 1}, {"id": "R19", "t": "胆石のエコー", "q": "Gall stone on ultrasound is?", "o": [], "a": "Hyperechoic", "c": "us", "k": "", "e": "胆石 (gallstone) は高エコー (hyperechoic) で後方音響陰影 (acoustic shadowing) を伴う。", "src": "radkey", "qa": 1}, {"id": "R20", "t": "ガドリニウムの誤り", "q": "What is not true about gadolinium?", "o": [], "a": "Have the same effect/side effect as iodine", "c": "safety", "k": "", "e": "ガドリニウム (gadolinium, MRI造影剤) はヨード造影剤 (iodine) と作用/副作用が異なる（同じは誤り）。", "src": "radkey", "qa": 1}, {"id": "R21", "t": "BI-RADS", "q": "Bi-rad scaling?", "o": [], "a": "Mammography scaling", "c": "breast", "k": "", "e": "BI-RADSは乳腺画像（マンモ等）の所見・悪性度を段階評価する分類。", "src": "radkey", "qa": 1}, {"id": "R22", "t": "軟部組織の音速", "q": "What is the resolution of ultrasound in soft tissue?", "o": [], "a": "1540 m/s", "c": "us", "k": "", "e": "軟部組織中の超音波伝播速度 (speed of sound) は標準1540 m/s。", "src": "radkey", "qa": 1}, {"id": "R23", "t": "腹部USのプローブ", "q": "What is the frequency and probe used in abdominal ultrasound?", "o": [], "a": "3,5-5 mHz convex probe", "c": "us", "k": "", "e": "腹部USは深達のため3.5–5MHzのコンベックスプローブ (convex probe)。", "src": "radkey", "qa": 1}, {"id": "R24", "t": "清明な液体のエコー", "q": "How do you describe the finding of clear fluid/cyst in ultrasound?", "o": [], "a": "Anechoic", "c": "us", "k": "", "e": "漿液性の液体/嚢胞は無エコー (anechoic, 黒) で後方エコー増強。", "src": "radkey", "qa": 1}, {"id": "R25", "t": "腎不全でのCTA", "q": "Patient case renal failure. Question is if we should do CTA.", "o": [], "a": "Vital patient. Do CTA.", "c": "safety", "k": "", "e": "生命に関わる病態 (vital) なら造影の腎毒性リスクを上回るためCTAを施行。禁忌は相対的。", "src": "radkey", "qa": 1}, {"id": "R26", "t": "RFAのガイド", "q": "Which modality can be used in radiofrequency ablation?", "o": [], "a": "US, MRI, X-ray, CT", "c": "physics", "k": "", "e": "ラジオ波焼灼 (RFA) のガイドはUS・MRI・X線・CTが使用可。", "src": "radkey", "qa": 1}, {"id": "R27", "t": "後腹膜液が正常な時", "q": "When is it normal to see retroperitoneal fluid?", "o": [], "a": "Post-surgery 1 week", "c": "abdomen", "k": "", "e": "術後1週間程度の後腹膜液 (retroperitoneal fluid) は生理的に見られうる。", "src": "radkey", "qa": 1}, {"id": "R28", "t": "CTと放射線", "q": "Does CT apply to radiation?", "o": [], "a": "Yes", "c": "safety", "k": "", "e": "CTは電離放射線 (ionizing radiation = X線) を使い被曝を伴う。", "src": "radkey", "qa": 1}, {"id": "R29", "t": "くも膜下出血の形", "q": "What is the shape of subarachnoid bleeding?", "o": [], "a": "Bleeding follows the sulci and space of the subarachnoid space.", "c": "neuro", "k": "", "e": "くも膜下出血 (SAH) は脳溝 (sulci)・脳槽・くも膜下腔に沿って広がる不定形。", "src": "radkey", "qa": 1}, {"id": "R30", "t": "被曝線量の順", "q": "Put the following into one row according to radiation dose", "o": [], "a": "Dental (lowest) -> Chest -> Background -> Abdominal/Pelvis (highest)", "c": "safety", "k": "", "e": "被曝量の目安: 歯科<胸部<(自然被曝)<腹部/骨盤。Backgroundの位置は要確認。", "src": "radkey", "qa": 1, "chk": 1}, {"id": "R31", "t": "NSFの原因", "q": "Systemic nephrogenic fibrosis is a consequence of?", "o": [], "a": "MRI (gadolinium)", "c": "safety", "k": "", "e": "腎性全身性線維症 (NSF) は腎機能低下例へのガドリニウム (gadolinium) 投与が原因。", "src": "radkey", "qa": 1}, {"id": "R32", "t": "CT生検の利点", "q": "Biopsy with CT?", "o": [], "a": "Can take from deeper structures (with US only superficial parts can be taken).", "c": "physics", "k": "", "e": "CTガイド生検は深部病変も穿刺可能。US ガイドは表在に限られる。", "src": "radkey", "qa": 1}, {"id": "R33", "t": "縦隔/後腹膜リンパ節", "q": "For mediastinal and retroperitoneal lymph nodes the most acceptable imaging method is?", "o": [], "a": "CT", "c": "ct", "k": "", "e": "縦隔・後腹膜リンパ節 (lymph nodes) の評価はCTが標準。", "src": "radkey", "qa": 1}, {"id": "R34", "t": "Hounsfieldで0の物質", "q": "During CT in the Hounsfield scale the density of the ... is fixed to zero", "o": [], "a": "Water", "c": "physics", "k": "", "e": "CT値 (HU) は水 (water)=0、空気=-1000、骨=+1000を基準に定義。", "src": "radkey", "qa": 1}, {"id": "R35", "t": "単純肝嚢胞の内部", "q": "In case of a simple liver cyst without irregular wall and without septations, inner content on US?", "o": [], "a": "Anechoic", "c": "abdomen", "k": "", "e": "単純肝嚢胞 (simple liver cyst) は内部無エコー (anechoic)・後方エコー増強。良性。", "src": "radkey", "qa": 1}, {"id": "R36", "t": "腹部大動脈瘤破裂の検出", "q": "Which method is used for the detection of abdominal aortic aneurysm rupture?", "o": [], "a": "Contrast enhanced abdomino-pelvic CT - CT angiography.", "c": "cardiovascular", "k": "", "e": "腹部大動脈瘤破裂 (ruptured AAA) は造影CT/CTA (CT angiography) で検出。", "src": "radkey", "qa": 1}, {"id": "R37", "t": "甲状腺結節生検のガイド", "q": "Which guidance technique is mainly used for taking biopsy of thyroid nodule?", "o": [], "a": "Ultrasound guided.", "c": "us", "k": "", "e": "甲状腺結節穿刺 (FNA) は超音波ガイド (US-guided)。被曝なくリアルタイム。", "src": "radkey", "qa": 1}, {"id": "R38", "t": "尿路結石の局在診断", "q": "In case of suspected nephron-ureterolithiasis the best method for localization of the stone is:", "o": [], "a": "Low-dose CT", "c": "gu", "k": "", "e": "尿路結石 (urolithiasis) の局在は低線量CT (low-dose non-contrast CT) が最も鋭敏。", "src": "radkey", "qa": 1}, {"id": "R39", "t": "機能画像でないもの", "q": "Which of the following modalities is NOT a functional imaging method?", "o": ["a. Scintigraphy", "b. PET", "c. Mammography", "d. SPECT"], "a": "c. Mammography", "c": "physics", "k": "c", "e": "機能画像 (functional imaging) はScintigraphy・PET・SPECT。マンモグラフィ (mammography) は形態画像で機能画像ではない。", "src": "radkey", "trap": 1}, {"id": "R40", "t": "急性膵炎の合併症検出", "q": "If suspicion of acute pancreatitis, which of the following imaging methods is capable of detecting the complications most efficiently?", "o": ["a. Abdominal plain film", "b. Abdominal US", "c. CT native and contrast enhanced", "d. Barium meal"], "a": "c. CT native and contrast enhanced", "c": "abdomen", "k": "c", "e": "急性膵炎 (acute pancreatitis) の合併症（壊死・膿瘍・仮性嚢胞）評価は単純＋造影CTが最も有用。", "src": "radkey"}, {"id": "R41", "t": "電離放射線を使わない", "q": "Which modality does not use ionizing radiation?", "o": ["a. Contrast enhanced US", "b. PET", "c. Fluoroscopy", "d. DSA"], "a": "a. Contrast enhanced US", "c": "safety", "k": "a", "e": "造影超音波 (contrast-enhanced US) は非電離。PET・透視 (fluoroscopy)・DSAはX線/放射線を使用。", "src": "radkey"}, {"id": "R42", "t": "腹部CTのウィンドウ", "q": "To evaluate an abdominal CT, the optimal window-setting is", "o": [], "a": "WL=60HU; WW=360HU", "c": "ct", "k": "", "e": "腹部軟部条件: ウィンドウレベル (WL)≈60HU、ウィンドウ幅 (WW)≈360HU。", "src": "radkey", "qa": 1}, {"id": "R43", "t": "Frimann-Dahl撮影", "q": "In case of which condition would you make a Frimann-Dahl radiograph?", "o": [], "a": "Subpulmonal fluid. Lateral decubitus position.", "c": "chest", "k": "", "e": "Frimann-Dahl撮影は側臥位 (lateral decubitus) で肺底部胸水など少量液体/遊離ガスを検出。", "src": "radkey", "qa": 1}, {"id": "R44", "t": "T1/T2の鑑別", "q": "To differentiate a T1 and T2 weighted image in MR, look for:", "o": [], "a": "Water", "c": "mri", "k": "", "e": "水/CSFの信号で鑑別。T1で水は黒、T2で水は白。", "src": "radkey", "qa": 1}, {"id": "R45", "t": "モダリティ選択の原則", "q": "Which are the guiding principles when it comes to choosing the modality to diagnose a disease?", "o": [], "a": "Modality with high specificity, least invasive, available and most cost-effective", "c": "physics", "k": "", "e": "選択原則: 高特異度・最小侵襲・利用可能性・費用対効果の総合。", "src": "radkey", "qa": 1}, {"id": "R46", "t": "電子密度と陰影", "q": "Lower electron-density regions (such as air) stop very few x-rays...rendered as dark on film", "o": [], "a": "Both statements are correct and there is a connection between.", "c": "physics", "k": "", "e": "電子密度 (electron density) が低い空気はX線吸収が少なくフィルム上で黒。両文正しく因果関係あり。", "src": "radkey", "qa": 1}, {"id": "R47", "t": "高エコーの定義", "q": "Structures with many acoustic interfaces are termed hyperechoic/echogenic and viewed as bright. ", "o": [], "a": "TRUE", "c": "us", "k": "", "e": "音響インピーダンス境界 (acoustic interfaces) が多い構造は反射が強く高エコー＝明るい。正しい。", "src": "radkey", "qa": 1}, {"id": "R48", "t": "胸部X線の技術", "q": "Which x-ray technique is applied by a conventional chest x-ray?", "o": [], "a": "Hardbeam technique (120-140keV)", "c": "xray", "k": "", "e": "通常胸部X線は高電圧 (hard beam, 120–140kVp)。肺野と縦隔を同時描出し肋骨の重なりを軽減。", "src": "radkey", "qa": 1}, {"id": "R49", "t": "微量遊離ガスの検出", "q": "Very small amount of free abdominal air can be reliably detected with which imaging method?", "o": [], "a": "X-ray/CT (especially CT)", "c": "abdomen", "k": "", "e": "遊離腹腔内ガス (free air=穿孔) は立位X線でも、微量はCTが最も鋭敏。", "src": "radkey", "qa": 1}, {"id": "R50", "t": "精巣の画像", "q": "Testicular imaging?", "o": [], "a": "US and MRI", "c": "gu", "k": "", "e": "精巣画像は超音波が第一選択、補助的にMRI。被曝なく軟部コントラスト良好。", "src": "radkey", "qa": 1}, {"id": "R51", "t": "胸部X線の適応", "q": "Indications for chest x-ray:", "o": [], "a": "Acute fever, respiratory symptoms, indicative physical examination findings, trauma, ICU patient status, chest tubes/drains/cannules/foreign bodies, acute abdomen, preoperative setting, lung screening.", "c": "chest", "k": "", "e": "胸部X線 (chest X-ray) の主な適応。基本概念は透過性 (transparency)。", "src": "radkey", "qa": 1}, {"id": "R52", "t": "甲状腺USのプローブ", "q": "Transducer used for thyroid US examination", "o": [], "a": "Linear, 7,5-10MHz", "c": "us", "k": "", "e": "表在臓器は高周波リニアプローブ (linear, 7.5–10MHz)。高分解能・浅深達。", "src": "radkey", "qa": 1}, {"id": "R53", "t": "頸部結節の第一選択", "q": "First chosen imaging method in case of a neck nodule", "o": [], "a": "US", "c": "us", "k": "", "e": "頸部結節 (neck nodule) の第一選択は超音波 (US)。", "src": "radkey", "qa": 1}, {"id": "R54", "t": "腸捻転のエコー徴候", "q": "Ultrasound sign of volvulus", "o": [], "a": "Whirlpool sign", "c": "abdomen", "k": "", "e": "腸捻転 (volvulus) では腸間膜血管が渦巻く渦巻き徴候 (whirlpool sign)。", "src": "radkey", "qa": 1}, {"id": "R55", "t": "肝血管腫のエコー", "q": "In case of typical liver hemangioma how can we characterize the mass in US?", "o": [], "a": "Well rounded, hyperechoic", "c": "abdomen", "k": "", "e": "典型的肝血管腫 (hemangioma) は境界明瞭・円形・高エコー (well-rounded, hyperechoic)。", "src": "radkey", "qa": 1}, {"id": "R56", "t": "腎嚢胞性病変の分類", "q": "The ... classification system divides renal cystic masses into 5 categories based on imaging characteristics on contrast-CT", "o": [], "a": "Bosniak", "c": "gu", "k": "", "e": "Bosniak分類は造影CT所見で腎嚢胞性病変を5カテゴリに分け悪性リスクと方針を示す。", "src": "radkey", "qa": 1}, {"id": "O01", "t": "後縦隔の軟部腫瘤", "q": "An abnormal soft tissue mass is seen in the posterior mediastinum. Which of the following pathologies can it be?", "o": ["a. Teratoma", "b. Thymoma", "c. Goiter", "d. Achalasia"], "a": "d. Achalasia", "c": "chest", "k": "d", "e": "後縦隔 (posterior mediastinum) の腫瘤はアカラシア (achalasia) による食道拡張。奇形腫・胸腺腫・甲状腺腫は前縦隔の病変。", "src": "oct2025"}, {"id": "O02", "t": "マンモの基本2方向", "q": "Which are the basic views in mammography?", "o": ["a. cranio-caudal (CC) + medio-lateral oblique (MLO)", "b. cranio-caudal (CC) + latero-lateral (ML/LM)", "c. cranio-caudal (CC) + latero-medial oblique (LMO)", "d. Cleopatra view + Eklund view"], "a": "a. cranio-caudal (CC) + medio-lateral oblique (MLO)", "c": "breast", "k": "a", "e": "基本2方向は頭尾方向 (CC) と内外斜位 (MLO)。", "src": "oct2025", "trap": 1}, {"id": "O03", "t": "動脈相の用途", "q": "Arterial phase of dynamic CT/MRI is used for the visualisation of:", "o": ["a. urinary collecting system", "b. metallic foreign body", "c. hypervascular liver tumors", "d. hypovascular liver tumors"], "a": "c. hypervascular liver tumors", "c": "ct", "k": "c", "e": "動脈相 (arterial phase) は過血管性肝腫瘍 (hypervascular liver tumors, 例HCC) が濃染する。", "src": "oct2025", "trap": 1}, {"id": "O04", "t": "乳腺微小石灰化の第一選択", "q": "Which one is the first-line imaging method for depiction and analysis of microcalcifications in breast lesions?", "o": ["a. ultrasound", "b. mammography", "c. MR", "d. scintigraphy"], "a": "b. mammography", "c": "breast", "k": "b", "e": "微小石灰化 (microcalcifications) の描出はマンモグラフィ (mammography) が第一選択。", "src": "oct2025"}, {"id": "O05", "t": "硬膜外血腫の特徴", "q": "What is the typical characteristic of an epidural hemorrhage?", "o": ["a. Crescent-shaped mass, which cannot cross the midline.", "b. Hypodense on CT if acute.", "c. Lens-shaped mass at the convexity, causing mass effect.", "d. none of these"], "a": "c. Lens-shaped mass at the convexity, causing mass effect.", "c": "neuro", "k": "c", "e": "硬膜外血腫 (epidural hemorrhage) は凸レンズ型 (lens-shaped)・縫合線を越えず・急性は高吸収。三日月型は硬膜下。", "src": "oct2025", "trap": 1}, {"id": "O06", "t": "気胸の古典的徴候", "q": "Classic radiological sign of pneumothorax?", "o": ["a. lung markings disappear in the area of the pneumothorax", "b. parietal pleura is shown as a thin line", "c. midline shift to the abnormal side", "d. all of the above"], "a": "a. lung markings disappear in the area of the pneumothorax", "c": "chest", "k": "a", "e": "気胸 (pneumothorax) では含気部の肺血管影 (lung markings) が消失。見えるのは臓側胸膜の線、縦隔偏位は健側へ。", "src": "oct2025"}, {"id": "O07", "t": "FDG集積しない腫瘍", "q": "Which tumors are NOT FDG-avid?", "o": ["a. ovarian carcinoma and prostate adenocarcinoma", "b. melanoma and ovarian carcinoma", "c. lung cancer (non-small) and ductal invasive breast carcinoma", "d. lymphoma and hepatocellular carcinoma"], "a": "a. ovarian carcinoma and prostate adenocarcinoma", "c": "nuclear", "k": "a", "e": "卵巣癌・前立腺腺癌はFDG集積が乏しい (not FDG-avid)。", "src": "oct2025"}, {"id": "O08", "t": "腹部骨盤USの準備（誤り）", "q": "How should the patient arrive for abdominal and pelvic ultrasound? Mark the FALSE answer.", "o": ["a. After at least 6 hours of fasting", "b. With full bladder", "c. With kidney function result not older than one week", "d. With previous ultrasound reports"], "a": "c. With kidney function result not older than one week", "c": "us", "k": "c", "e": "USは造影剤不要なので腎機能結果は不要（これが誤り）。空腹・蓄尿は正しい準備。", "src": "oct2025"}, {"id": "O09", "t": "胆石USの用語", "q": "What is the terminology of a typical gallstone ultrasound?", "o": ["a. Hyperechole", "b. Hypoechoic", "c. Anechoic", "d. Echodense"], "a": "d. Echodense", "c": "us", "k": "d", "e": "胆石 (gallstone) はecho-dense（高エコー＋後方音響陰影）。", "src": "oct2025"}, {"id": "O10", "t": "胸部X線で透亮な病態", "q": "Appears as a more transparent (radiolucent) area on a chest x-ray:", "o": ["a. pleural fluid", "b. pneumomediastinum", "c. atelectasia", "d. pneumonia"], "a": "b. pneumomediastinum", "c": "chest", "k": "b", "e": "透過性が高い (radiolucent) のはガスを含む気縦隔 (pneumomediastinum)。胸水・無気肺・肺炎は白く写る。", "src": "oct2025"}, {"id": "O11", "t": "MRI信号で正しい", "q": "Which statement is TRUE for MRI signal intensity?", "o": ["a. fat is hyperintense on both T1W and T2W MRI", "b. fluid-containing spaces are hypointense on both T1W and T2W MRI", "c. gadolinium contrast agent is visible on postcontrast T2W MRI", "d. SWI is useful in revealing changes in diffusion of water molecules"], "a": "a. fat is hyperintense on both T1W and T2W MRI", "c": "mri", "k": "a", "e": "脂肪 (fat) はT1・T2とも高信号。液体はT1低T2高、Gd増強はT1、拡散はDWI（SWIは出血/鉄）。", "src": "oct2025", "trap": 1}, {"id": "O12", "t": "救急で腹腔内free fluid検出", "q": "In case of emergency, which modality should be chosen to detect free abdominal fluid?", "o": ["a. FAST and eFAST", "b. Erect abdominal X-ray", "c. Supine abdominal X-ray", "d. Abdominal CT scan"], "a": "a. FAST and eFAST", "c": "us", "k": "a", "e": "救急の腹腔内free fluid検出はFAST/eFASTが第一選択。迅速・ベッドサイド・無被曝。", "src": "oct2025", "trap": 1}, {"id": "O13", "t": "心筋灌流シンチの適応", "q": "What can be an indication for myocardial perfusion scintigraphy?", "o": ["a. Ischemic heart disease", "b. Arrhythmia", "c. Diagnosis of organic heart defects", "d. All of these"], "a": "a. Ischemic heart disease", "c": "nuclear", "k": "a", "e": "心筋灌流シンチの適応は虚血性心疾患 (ischemic heart disease)。", "src": "oct2025"}, {"id": "O14", "t": "PETが検出するもの", "q": "The PET camera detects:", "o": ["a. Positrons", "b. Annihilation", "c. X-ray photons", "d. Gamma photons"], "a": "d. Gamma photons", "c": "nuclear", "k": "d", "e": "対消滅で生じる511keVのγ線 (gamma photons) を検出する。", "src": "oct2025"}, {"id": "O15", "t": "核医学で正しい記述", "q": "Which of the following statement is true? (nuclear medicine)", "o": ["a. With nuclear medicine investigations we can observe the function of organs, tissues, and subcellular structures.", "b. Nuclear medicine investigations have higher spatial resolution than radiologic investigations", "c. Nuclear medicine investigations are specific", "d. The radiopharmaceutical is usually administered per os"], "a": "a. With nuclear medicine investigations we can observe the function of organs, tissues, and subcellular structures.", "c": "nuclear", "k": "a", "e": "核医学は臓器・組織・細胞の機能を可視化。分解能は低く、特異度も低く、投与は通常静注。", "src": "oct2025"}, {"id": "O16", "t": "USで誤りの記述", "q": "Which statement is FALSE about clinical ultrasound examinations?", "o": ["a. Convex transducers have a larger field-of-view compared to linear transducers.", "b. Suitable for evaluation of flow dynamics.", "c. Deeper layers are examined by using a higher frequency transducer.", "d. Vascularisation can be visualised using iv. contrast agent (microbubbles)."], "a": "c. Deeper layers are examined by using a higher frequency transducer.", "c": "us", "k": "c", "e": "深部は低周波プローブで描出（高周波は浅い高分解能）。よってcが誤り。", "src": "oct2025"}, {"id": "O17", "t": "急性膵炎の画像で正しい", "q": "True for imaging of acute pancreatitis:", "o": ["a. radiological study is necessary to set up the diagnosis", "b. necrotic area of the pancreas enhances avidly after iv. contrast administration", "c. CT is performed if complication is suspected", "d. plain radiograph is often diagnostic"], "a": "c. CT is performed if complication is suspected", "c": "abdomen", "k": "c", "e": "膵炎診断は臨床＋採血、合併症疑いでCT（c正）。壊死部は造影されない、単純X線は非診断的。", "src": "oct2025"}, {"id": "O18", "t": "超音波を最も反射しない", "q": "Which structure reflects the least ultrasound waves?", "o": ["a. Anechoic", "b. Hypoechoic", "c. Hyperechoic", "d. Echodense"], "a": "a. Anechoic", "c": "us", "k": "a", "e": "無エコー (anechoic) は反射が最少で黒く描出（液体・嚢胞）。", "src": "oct2025", "trap": 1}, {"id": "O19", "t": "プラナーガンマカメラの画像", "q": "What kind of images are recorded by the planar gamma camera?", "o": ["a. 2-dimensional summation images", "b. Cross-sectional images", "c. 3-dimensional reconstructed images", "d. none of these"], "a": "a. 2-dimensional summation images", "c": "nuclear", "k": "a", "e": "プラナーガンマカメラは2次元の重ね合わせ像 (2D summation image)。断層はSPECT。", "src": "oct2025"}, {"id": "O20", "t": "腫瘍画像でのMRIの役割", "q": "The main role of MRI in oncologic imaging is:", "o": ["a. assessment of local tumor staging and regional lymph nodes", "b. to overview of organ systems in short examination time", "c. to follow-up all distant metastasis", "d. to search for pulmonary metastases"], "a": "a. assessment of local tumor staging and regional lymph nodes", "c": "mri", "k": "a", "e": "MRIの主役割は局所進展 (local staging) と所属リンパ節評価。軟部コントラストに優れる。", "src": "oct2025"}, {"id": "O21", "t": "CT値の昇順", "q": "Choose the correct sequence in increasing order of Hounsfield-units.", "o": ["a. Extraluminal blood < air < water < adipose tissue < bone", "b. Water < adipose tissue < extraluminal blood < bone < air", "c. Adipose tissue < water < bone < air < extraluminal blood", "d. Air < adipose tissue < water < extraluminal blood < bone"], "a": "d. Air < adipose tissue < water < extraluminal blood < bone", "c": "physics", "k": "d", "e": "CT値: 空気-1000 < 脂肪 < 水0 < 血液70-100 < 骨+1000。", "src": "oct2025", "trap": 1}, {"id": "O22", "t": "造影不要なCT適応", "q": "In which of the following CT indications is it NOT necessary to administer iv. contrast media?", "o": ["a. assessment of pulmonary embolism", "b. assessment of kidney stone", "c. staging of chest and abdominal regions in an oncologic patient", "d. assessment of focal liver lesion of unknown dignity"], "a": "b. assessment of kidney stone", "c": "ct", "k": "b", "e": "尿路結石 (kidney stone) は単純低線量CTで十分、造影不要。PE・staging・肝病変は造影必要。", "src": "oct2025"}, {"id": "O23", "t": "急性脳卒中画像で正しい", "q": "True for acute stroke imaging:", "o": ["a. The posterior scala / brainstem stroke lesion can only be detected reliably by CT.", "b. CT scan cannot be performed in case of aneurysmal clip.", "c. Small hemorrhages cannot be detected by MRI.", "d. MR helps to distinguish between acute hemorrhage and a chronic hematoma."], "a": "d. MR helps to distinguish between acute hemorrhage and a chronic hematoma.", "c": "neuro", "k": "d", "e": "MRは急性出血と慢性血腫の鑑別に有用（d正）。後頭蓋窩はMRIが優れ、微小出血もMRIが鋭敏。", "src": "oct2025"}, {"id": "O24", "t": "triple-rule-out CTで対象外", "q": "The following disorder is NOT diagnosed by triple-rule-out CT:", "o": ["a. deep vein thrombosis", "b. coronary stenosis", "c. aortic dissection", "d. pulmonary embolism"], "a": "a. deep vein thrombosis", "c": "cardiovascular", "k": "a", "e": "Triple-rule-out CTは冠動脈狭窄・大動脈解離・肺塞栓の3疾患を除外。深部静脈血栓は対象外。", "src": "oct2025"}, {"id": "O25", "t": "RUSHプロトコルの適応", "q": "What is the clinical indication of performing RUSH protocol?", "o": ["a. ultrasound-guided drainage of pleural effusion", "b. bedside ultrasound examination in hemodynamic shock", "c. ultrasound guided central venous line placement", "d. bedside ultrasound examination in myocardial infarction"], "a": "b. bedside ultrasound examination in hemodynamic shock", "c": "us", "k": "b", "e": "RUSH (Rapid Ultrasound in SHock) はショックの原因をベッドサイドUSで迅速鑑別。", "src": "oct2025", "trap": 1}, {"id": "O26", "t": "乳腺の充実/嚢胞鑑別", "q": "Method that can differentiate the most accurately between solid and cystic breast lesions is:", "o": ["a. mammography", "b. ultrasound", "c. PET-CT", "d. none of above"], "a": "b. ultrasound", "c": "breast", "k": "b", "e": "充実性と嚢胞性の鑑別は超音波 (ultrasound) が最も正確。", "src": "oct2025"}, {"id": "O27", "t": "造影副作用のリスク高", "q": "There is a higher risk of adverse effects after iv. administration of CT contrast material:", "o": ["a. in patients with impaired liver function", "b. in dehydrated patients", "c. in younger patients", "d. in patients with severe hypothyreosis"], "a": "b. in dehydrated patients", "c": "safety", "k": "b", "e": "脱水 (dehydration) は造影腎症 (CIN) のリスク↑。十分な補液が予防に重要。", "src": "oct2025"}, {"id": "O28", "t": "カラードプラの色", "q": "In the case of Color Doppler, what color indicates the flow towards the transducer?", "o": ["a. black", "b. red", "c. blue", "d. white"], "a": "b. red", "c": "us", "k": "b", "e": "プローブに向かう血流＝赤 (red)。BART: Blue Away, Red Toward。", "src": "oct2025"}, {"id": "O29", "t": "肺癌スクリーニング", "q": "Lung cancer screening can be efficiently achieved by:", "o": ["a. 1-view Chest X-ray", "b. 2-view Chest X-ray", "c. Chest fluoroscopy", "d. Chest CT"], "a": "d. Chest CT", "c": "chest", "k": "d", "e": "肺癌スクリーニングは低線量胸部CT (low-dose chest CT) が有効。", "src": "oct2025", "trap": 1}, {"id": "O30", "t": "HRCTで正しい", "q": "True for High-Resolution CT (HRCT) examination:", "o": ["a. important modality in pulmonary tumor characterization", "b. not used for bony structures", "c. an important imaging modality to diagnose interstitial lung disease", "d. iv. iodine-based contrast agent is necessary"], "a": "c. an important imaging modality to diagnose interstitial lung disease", "c": "chest", "k": "c", "e": "HRCTは薄層で間質性肺疾患 (interstitial lung disease) の診断に重要。造影は不要。", "src": "oct2025"}, {"id": "RP01", "t": "機能画像でないモダリティ", "q": "Which of the following modalities is not a functional imaging method?", "a": "Mammography", "c": "breast", "qa": 1, "e": "機能画像=代謝・血流・生理機能を見る（PET/SPECT/シンチ/機能MRI/perfusion）。マンモは形態画像で機能画像ではない。", "src": "radpp", "o": []}, {"id": "RP02", "t": "イオン化放射線を使わないモダリティ", "q": "Which modality does not use ionizing radiation?", "a": "Contrast enhanced US", "c": "us", "qa": 1, "e": "US・MRIは非電離。造影USもマイクロバブル造影剤を使うが放射線被曝なし。", "src": "radpp", "o": []}, {"id": "RP03", "t": "アイソトープ検査で投与する物質", "q": "What kind of material is administered to the patient during an isotope examination?", "a": "Radiopharmacon（放射性医薬品）", "c": "nuclear", "qa": 1, "e": "核医学では放射性医薬品（トレーサー）を投与する。", "src": "radpp", "o": []}, {"id": "RP04", "t": "T1とT2 MRIの見分け", "q": "To differentiate a T1 and T2 MRI, look for", "a": "Water", "c": "mri", "qa": 1, "e": "水はT1で低信号(暗)・T2で高信号(明)。水(CSF/嚢胞/浮腫)が明るければT2。", "src": "radpp", "o": []}, {"id": "RP05", "t": "HUスケールで密度ゼロ", "q": "During CT examination in the HU scale the density of the … is zero", "a": "Water", "c": "ct", "qa": 1, "e": "水=0 HU、空気=−1000 HU、骨/石灰化=+数百〜1000 HU。", "src": "radpp", "o": []}, {"id": "RP06", "t": "腹部CTの最適ウィンドウ", "q": "To evaluate an abdominal CT, the optimal window setting is (on HU scale)", "a": "WL = 60HU and WW = 360HU", "c": "ct", "qa": 1, "e": "軟部組織ウィンドウ。WL=中心値、WW=表示幅。", "src": "radpp", "o": []}, {"id": "RP07", "t": "胸部X線のX線手技", "q": "Which x-ray technique is applied in conventional chest x-ray?", "a": "Hardbeam technique (120-140 kVp)", "c": "xray", "qa": 1, "e": "高電圧で肋骨の写りを抑え、肺野・縦隔のコントラストを均一化する。", "src": "radpp", "o": []}, {"id": "RP08", "t": "成人USのトランスデューサ", "q": "Transducer generally used for adult US examination", "a": "3.5-5 MHz convex（コンベックス）", "c": "us", "qa": 1, "e": "腹部など深部用。低周波=深達度高い。", "src": "radpp", "o": []}, {"id": "RP09", "t": "成人甲状腺USのプローブ", "q": "The following is used for adult thyroid US", "a": "7.5-10 MHz, linear（リニア）", "c": "us", "qa": 1, "e": "浅部・高分解能用。高周波=深達度低いが空間分解能高い。", "src": "radpp", "o": []}, {"id": "RP10", "t": "US応用の正しい相関", "q": "Which correlation is the most correct to application of US?", "a": "High freq probe → poor penetration → good spatial resolution", "c": "us", "qa": 1, "e": "高周波ほど深達度は落ちるが空間分解能は上がる。", "src": "radpp", "o": []}, {"id": "RP11", "t": "成人で第一選択がUSの臓器", "q": "In case of which organ can you use US as the first modality (for adults)?", "a": "Liver（肝臓）", "c": "abdomen", "qa": 1, "e": "肝はUSが第一選択になりやすい。", "src": "radpp", "o": []}, {"id": "RP12", "t": "腸重積のUSサイン", "q": "US sign of intussusception?", "a": "\"target\"（標的）サイン", "c": "abdomen", "qa": 1, "e": "腸重積=腸管が自分自身に引き込まれる。横断像でtarget、縦断でpseudokidney。", "src": "radpp", "o": []}, {"id": "RP13", "t": "腸軸捻転のUSサイン", "q": "US sign of volvulus", "a": "\"whirlpool\"（渦巻き）サイン", "c": "abdomen", "qa": 1, "e": "腸間膜血管が軸を中心に渦を巻く。", "src": "radpp", "o": []}, {"id": "RP14", "t": "肝血管腫のUS像", "q": "Liver hemangioma", "a": "Hyperechoic（高エコー）", "c": "abdomen", "qa": 1, "e": "典型的に境界明瞭な高エコー腫瘤。", "src": "radpp", "o": []}, {"id": "RP15", "t": "単純肝嚢胞の内容性状", "q": "In case of a simple liver cyst (25mm, w/o irregular wall, w/o septation), how would we characterize the inner content?", "a": "Anechoic（無エコー）", "c": "abdomen", "qa": 1, "e": "単純嚢胞=無エコー+後方エコー増強+平滑な薄壁。", "src": "radpp", "o": []}, {"id": "RP16", "t": "腋窩・鎖骨下リンパ節の画像", "q": "Axillary and subclavicular lymph node imaging", "a": "US", "c": "us", "qa": 1, "e": "表在リンパ節はUSで評価。", "src": "radpp", "o": []}, {"id": "RP17", "t": "精巣癌の検出法", "q": "Method for detection of testicular cancer", "a": "US", "c": "gu", "qa": 1, "e": "陰嚢USが第一選択。", "src": "radpp", "o": []}, {"id": "RP18", "t": "甲状腺結節生検のガイド", "q": "Which guidance technique is mainly useful for the biopsy of thyroid nodule?", "a": "US guided", "c": "us", "qa": 1, "e": "浅部のためUSガイド下穿刺。", "src": "radpp", "o": []}, {"id": "RP19", "t": "脾腫瘍の血流評価", "q": "Imaging useful to demonstrate vascularity of splenic tumor", "a": "Color-duplex 腹部US（カラードプラ）", "c": "abdomen", "qa": 1, "e": "血流評価はカラードプラUS。", "src": "radpp", "o": []}, {"id": "RP20", "t": "急性膵炎の合併症検出", "q  "q": "GFR value at which patient does NOT need hydration prior to iv contrast enhanced CT", "a": "GFR > 60", "c": "safety", "qa": 1, "e": "GFR>60なら補水不要。逆（補水が必要な低GFR）を問う設問もあるので注意。", "src": "radpp", "o": []}, {"id": "RP30", "t": "バリウム注腸前に推奨される検査", "q": "Which investigation is strongly recommended before doing a barium enema/irrigoscopy?", "a": "Rectoscopy（直腸鏡）", "c": "abdomen", "qa": 1, "e": "注腸前に直腸の評価。", "src": "radpp", "o": []}, {"id": "RP31", "t": "虫垂炎を描出できない方法", "q": "Appendicitis can be visualized with the following imaging methods, except:", "a": "PA abdominal x-ray", "c": "abdomen", "qa": 1, "e": "虫垂炎はUS/CTで評価。単純X線は非特異的。", "src": "radpp", "o": []}, {"id": "RP32", "t": "胆嚢結石(30mm)を示せない方法", "q": "How to demonstrate calcified stone in gallbladder (30mm), except?", "a": "Angiography（血管造影）", "c": "abdomen", "qa": 1, "e": "血管造影は結石描出に不適。", "src": "radpp", "o": []}, {"id": "RP33", "t": "ごく少量のfree airの描出", "q": "Very small amount of free abdominal air can be reliably depicted with", "a": "X-ray（立位/左側臥位）", "c": "xray", "qa": 1, "e": "横隔膜下free airは立位X線で検出しやすい。", "src": "radpp", "o": []}, {"id": "RP34", "t": "GI穿孔の立位腹部X線サイン", "q": "Pathognomonic sign of GI tract perforation in an erect plain abdominal radiograph", "a": "Crescent translucency under the dome of the diaphragm（横隔膜下三日月状透亮=free air）", "c": "abdomen", "qa": 1, "e": "立位で横隔膜下に遊離ガス。", "src": "radpp", "o": []}, {"id": "RP35", "t": "二重造影腸管検査で誤った記述", "q": "False statement regarding double contrast bowel examination", "a": "「ガスで腔を拡張する陽性造影剤で透過性を下げる」という記述", "c": "abdomen", "qa": 1, "e": "ガス(空気/CO2)は陰性造影剤で透過性を上げる。バリウムが陽性造影剤。", "src": "radpp", "o": []}, {"id": "RP36", "t": "Frimann-Dahl撮影を行う病態", "q": "In case of which condition would you take a Frimann-Dahl image?", "a": "Sub pulmonal fluid（肺底部胸水）", "c": "chest", "qa": 1, "e": "Frimann-Dahl法=側臥位腹部X線(PA)で遊離腹腔内ガスを検出。", "src": "radpp", "o": []}, {"id": "RP37", "t": "硬膜下血腫のCT形状", "q": "Subdural hematoma on CT?", "a": "Crescent shape（三日月型）", "c": "neuro", "qa": 1, "e": "静脈性(架橋静
