6-3", "t": "機能的でないX線検査", "q": "Which is not a functional X-Ray examination?", "o": ["a. Swallow examination", "b. Fistulography", "c. Beside AP view chest X-Ray", "d. Barium enema study (irrigoscopy)"], "a": "c. Beside AP view chest X-Ray", "c": "xray", "k": "c", "e": "ベッドサイドの臥位AP胸部X線 (bedside AP chest X-Ray) は単純な静止画像であり、動的・機能的検査ではない。嚥下造影(a)、瘻孔造影(b)、注腸造影(d)は造影剤の動きや管腔の機能・形態を動的に評価する機能的X線検査。", "src": "pp"}, {"id": "036-4", "t": "胸部X線の適応でないもの", "q": "Which is not an indication of Chest X-Ray?", "o": ["a. High fever", "b. Search for primary tumor", "c. Elevated liver enzymes", "d. Chest screening"], "a": "c. Elevated liver enzymes", "c": "chest", "k": "c", "e": "肝酵素の上昇 (elevated liver enzymes) は肝胆道系の問題を示唆し、胸部X線の適応ではない。高熱（肺炎検索）(a)、原発巣・転移検索(b)、胸部スクリーニング(d)は胸部X線の妥当な適応。", "src": "pp"}, {"id": "036-5", "t": "4か月児の腸重積整復術の絶対禁忌", "q": "Which of the following statement is an absolute contraindication for enema reduction of an intussusception (in case of a 4 month old baby):", "o": ["a. Small amount of free fluid on the abdominal ultrasound", "b. Signs of perforation (pneumoperitoneum, peritonitis)", "c. Subicterus", "d. Small bowel obstruction"], "a": "b. Signs of perforation (pneumoperitoneum, peritonitis)", "c": "abdomen", "k": "b", "e": "腸重積 (intussusception) の注腸整復は、穿孔徴候（気腹 pneumoperitoneum・腹膜炎 peritonitis）がある場合は腹腔内へ造影剤や空気を押し込み悪化させるため絶対禁忌。少量の腹水(a)や軽度黄疸(c)は絶対禁忌ではない。", "src": "pp"}, {"id": "037-1", "t": "成人甲状腺US用のトランスデューサ", "q": "The following transducer is usually used for adults thyroid US examination:", "o": ["a. 9 – 12.5 MHz convex", "b. 6 – 9 MHz phased array", "c. 2.5 – 5 MHz convex", "d. 7.5 – 10 MHz linear"], "a": "d. 7.5 – 10 MHz linear", "c": "us", "k": "d", "e": "甲状腺 (thyroid) は表在臓器のため、高周波（7.5–10 MHz）のリニア型プローブ (linear transducer) で高分解能に描出する。低周波コンベックス(c)は深部腹部、フェーズドアレイ(b)は心臓用で甲状腺には不適。", "src": "pp", "trap": 1}, {"id": "037-2", "t": "左側の緊張性気胸での縦隔の偏位", "q": "In case of a LEFT sided, distended PTX the mediastinal complex will move:", "o": ["a. Moderately to the left side", "b. Stay unchanged", "c. Expressly to the right", "d. Expressly to the left"], "a": "d. Expressly to the left", "c": "chest", "k": "d", "e": "本スライドではdがマークされている。なお生理学的には、左側の緊張性気胸 (tension pneumothorax, PTX) では患側の胸腔内圧が著しく上昇し、縦隔は健側＝右へ強く偏位するのが正しい所見（=cが医学的に正しい）。マークは d だが、緊張性気胸では縦隔が患側と反対へ偏位する点に注意。", "src": "pp", "trap": 1}, {"id": "037-3", "t": "頸部結節で最初に選ぶ画像法", "q": "What is the first chosen imaging method in case of a neck nodule?", "o": ["a. Swallow X-Ray examination", "b. US", "c. MR", "d. CT"], "a": "b. US", "c": "neuro", "k": "b", "e": "頸部結節 (neck nodule) は表在性のため、被曝なく結節の大きさ・性状・血流・悪性所見を高分解能で評価できる超音波 (US) が第一選択。MR(c)/CT(d)は深部進展や病期診断、嚥下X線(a)は咽喉頭の機能評価用。", "src": "pp"}, {"id": "037-4", "t": "反復する右季肋部痛で最初に行う画像法", "q": "In case of recurring right subcostal pain the first imaging method should be:", "o": ["a. Abdominal CT", "b. MR", "c. Abdominal US", "d. Scintigraphy"], "a": "c. Abdominal US", "c": "abdomen", "k": "c", "e": "右季肋部痛 (right subcostal pain) は胆嚢・胆道・肝の病変（胆石、胆嚢炎など）を示唆し、被曝なく胆嚢結石や胆嚢壁を鋭敏に評価できる腹部超音波 (US) が第一選択。CT(a)/MR(b)は精査、シンチ(d)は機能評価用。", "src": "pp", "trap": 1}, {"id": "038-1", "t": "腸捻転の超音波徴候", "q": "Ultrasound sign of the volvulus:", "o": ["a. Target sign", "b. Whirlpool sign", "c. Pseudokidney", "d. Comet sign"], "a": "b. Whirlpool sign", "c": "abdomen", "k": "b", "e": "腸捻転 (volvulus) では腸間膜と血管が捻れるため、超音波・CTで渦巻き状の渦巻きサイン (whirlpool sign) を呈する。ターゲットサイン(a)は腸重積、コメットサイン(d)は胆嚢腺筋腫症などの所見。", "src": "pp", "trap": 1}, {"id": "038-2", "t": "小型（15–20mm）中間的肺結節の生検ガイド法", "q": "Which guidance technique is mainly useful for the biopsy of small (15-20mm) intermediate pulmonary nodules?", "o": ["a. US guided biopsy", "b. X-Ray guided biopsy", "c. CT guided biopsy", "d. MR guided biopsy"], "a": "c. CT guided biopsy", "c": "ct", "k": "c", "e": "肺結節 (pulmonary nodule) は肺野深部にあり空気に囲まれるためUSが届かず、CTガイド下生検 (CT guided biopsy) で正確に針先と結節を位置決めできる。US(a)は肺には不適、X線(b)は3次元的位置決めが困難、MR(d)は肺生検ガイドには通常用いない。", "src": "pp", "trap": 1}, {"id": "038-3", "t": "典型的肝血管腫の超音波所見", "q": "In a case of a typical liver hemangioma how can we characterize the mass?", "o": ["a. Well rounded, hypoechoic", "b. Well rounded, anechoic", "c. Well rounded, hyperechoic", "d. Well rounded, hyper dense"], "a": "c. Well rounded, hyperechoic", "c": "us", "k": "c", "e": "典型的肝血管腫 (liver hemangioma) は超音波で境界明瞭・類円形の高エコー (hyperechoic) 腫瘤として描出されるのが特徴。無エコー(b)は嚢胞、低エコー(a)は他の腫瘤を示唆し、高吸収(d)はCT用語。", "src": "pp", "trap": 1}, {"id": "038-4", "t": "CT造影剤を避けるべき病態", "q": "Intravenous contrast material should be avoided at a CT examination when the patient suffers from:", "o": ["a. Manifest hypothyroidism", "b. Severe lower limb atherosclerotic limb disease", "c. Manifest hyperthyroidism", "d. Multi Nodular goiter"], "a": "c. Manifest hyperthyroidism", "c": "safety", "k": "c", "e": "顕性甲状腺機能亢進症 (manifest hyperthyroidism) では、ヨード造影剤が甲状腺クリーゼを誘発しうるため静脈内ヨード造影を避ける。甲状腺機能低下症(a)はむしろ問題が少なく、多結節性甲状腺腫(d)も顕性亢進がなければ絶対禁忌ではない。bは造影回避の理由として不適切。", "src": "pp", "trap": 1}, {"id": "038-5", "t": "疾患診断のモダリティ選択における指導原則", "q": "Which are guiding principles when it comes to choosing a modality to diagnose a disease?", "o": ["a. Modality having high specificity", "b. Least invasive modality", "c. Available modality", "d. Most cost effective modality"], "a": "判別不能（要確認）（全選択肢がマークされており、解答欄には「could be more than one answer」と注記）", "c": "physics", "k": "", "e": "画像モダリティ選択の指導原則には、高い特異度(a)、最も低侵襲(b)、利用可能性(c)、費用対効果(d)のすべてが関与し、本スライドでは4つ全てがマークされ「複数正解の可能性あり」と注記されている。実臨床では、診断能・侵襲性・被曝・利用可能性・コストを総合して最適なモダリティを選択するのが原則であり、単一の正解に絞れない設問。", "src": "pp", "chk": 1}, {"id": "039-1", "t": "HRCTが適応とならない症例", "q": "High resolution CT (HRCT) is NOT the reasonable choice in the following case:", "o": ["a. Structure of the lungs – restrictive pulmonary disease, fibrosis", "b. Cerebellopontine angle – vestibular schwannoma (acoustic neuroma)", "c. Structure of the middle ear – conductive hearing loss", "d. Bone structure of femur – osteoid osteoma"], "a": "b. Cerebellopontine angle – vestibular schwannoma (acoustic neuroma)", "c": "physics", "k": "b", "e": "前庭神経鞘腫 (vestibular schwannoma) は軟部組織腫瘍であり、第一選択は造影MRIである。HRCTは高い空間分解能で含気構造や微細な骨構造を描出するのに優れ、肺の間質性病変 (fibrosis)、中耳・側頭骨の骨構造、骨腫瘍 (osteoid osteoma) の評価に適している。小脳橋角部の神経鞘腫はMRIで描出するためHRCTの適応ではない。", "src": "pp"}, {"id": "039-3", "t": "血管IVR前の準備の例外", "q": "The following preparations are necessary before a vascular interventional radiological procedure, EXCEPT:", "o": ["a. Checking the INR value", "b. Check for the existence of a metal foreign body", "c. Providing sufficient hydration", "d. Checking GFR value"], "a": "b. Check for the existence of a metal foreign body", "c": "cardiovascular", "k": "b", "e": "金属異物の確認はMRI検査前に必須の安全確認であり、血管内IVRには不要である。血管内IVRでは出血リスク評価のためINR、造影剤腎症予防のための十分な補液 (hydration) とGFRの確認が必要となる。", "src": "pp", "trap": 1}, {"id": "039-4", "t": "動的腎シンチグラフィに関する誤り", "q": "Which of the following statements is FALSE about dynamic renal scintigraphy?", "o": ["a. The secretion if the kidneys be compared with each other", "b. Can be used for diagnosis of renal tumors", "c. The parameters of urinary drainage (and possible obstruction) can be determined", "d. The functional performance of renal parenchyma can be determined"], "a": "b. Can be used for diagnosis of renal tumors", "c": "nuclear", "k": "b", "e": "動的腎シンチグラフィ (dynamic renal scintigraphy) は左右腎の分腎機能、尿路通過・閉塞、腎実質機能を評価する機能的検査であり、腎腫瘍の形態診断には適さない（腫瘍診断にはCT/MRI/USを用いる）。よってbが誤りの記述である。", "src": "pp"}, {"id": "039-5", "t": "腫瘍学で最も使われるPET製剤", "q": "Which PET- radiopharmaceutical is most often used in oncology?", "o": ["a. 18F Fludeoxyglucose (18F-FDG)", "b. 99m-Tc-Hydroxymethylene-Diphosphonate (99m-Tc-HDP)", "c. 11C-Cholin", "d. 18F-Sodium-Fluoride"], "a": "a. 18F Fludeoxyglucose (18F-FDG)", "c": "nuclear", "k": "a", "e": "FDG (18F-fluorodeoxyglucose) はブドウ糖代謝が亢進した腫瘍細胞に集積するため、腫瘍学で最も汎用されるPET製剤である。99m-Tc-HDPと18F-NaFは骨シンチ用、11C-Cholinは前立腺癌などに限定的に使われる製剤である。", "src": "pp"}, {"id": "040-1", "t": "乳房US所見と悪性の示唆", "q": "During US examination, the following finding suggests a potential malignancy in the breast:", "o": ["a. Calcifications due to fat necrosis", "b. Encapsulated fluid collection", "c. Hypoechoic, irregular structure with lobulated contour", "d. Microscopic calcifications"], "a": "c. Hypoechoic, irregular structure with lobulated contour", "c": "breast", "k": "c", "e": "乳房超音波で悪性を示唆する所見は、低エコー (hypoechoic) で辺縁不整・分葉状輪郭をもつ腫瘤である。脂肪壊死の石灰化や被包化された液体貯留 (嚢胞) は良性所見であり、微小石灰化 (microscopic calcifications) は超音波では検出困難でマンモグラフィの所見である。", "src": "pp"}, {"id": "040-2", "t": "CT造影剤静注に影響する条件の例外", "q": "The following conditions can affect the administration of IV CT contrast media, EXCEPT:", "o": ["a. Coughing, epihora, sense of palpating and appearance of urticaria on chest and back following the administration of a certain type and concentration of IV contrast media", "b. Latest eGFR 28 ml/min/1.73^2", "c. Iodine allergy indicated on the referral – rash appearing after using antiseptic on the skin", "d. Diabetes, chronic kidney disease patients who are not on dialysis, intake of Metformin containing drugs on the day of examination"], "a": "c. Iodine allergy indicated on the referral – rash appearing after using antiseptic on the skin", "c": "safety", "k": "c", "e": "皮膚消毒薬（ポビドンヨード等）による接触性皮疹は、静注ヨード造影剤に対する真のアレルギーとは関連せず、造影剤投与の妨げにはならない（局所のヨード接触反応と全身性造影剤アレルギーは別物）。一方、過去の造影剤による蕁麻疹・流涙・咳などのアレルギー反応(a)、低いeGFR (b)、メトホルミン内服中の糖尿病・CKD患者(d) は造影剤投与に影響する。", "src": "pp"}, {"id": "040-3", "t": "充実性と嚢胞性乳房腫瘤の鑑別", "q": "Which imaging modality is capable of differentiating between solid and cystic breast masses?", "o": ["a. Ultrasonography", "b. Galatography", "c. Mammography", "d. PET-CT"], "a": "a. Ultrasonography", "c": "breast", "k": "a", "e": "超音波 (ultrasonography) は嚢胞内の液体を無エコーとして描出でき、充実性腫瘤と嚢胞性腫瘤を容易に鑑別できる。マンモグラフィは石灰化や腫瘤の検出に優れるが充実・嚢胞の鑑別は不得手で、乳管造影 (galactography) は乳管病変用、PET-CTは代謝評価用である。", "src": "pp"}, {"id": "040-4", "t": "電離放射線を使わない画像法", "q": "Which of the following imaging methods do not used ionizing radiation?", "o": ["a. Ultrasound and MRI", "b. CT and MRI", "c. X-Rays and Ultrasound", "d. Fluoroscopy and Ultrasound"], "a": "a. Ultrasound and MRI", "c": "physics", "k": "a", "e": "超音波 (ultrasound) は音波、MRIは磁場と電波を用いるため、いずれも電離放射線 (ionizing radiation) を使わない。CT・X線・透視 (fluoroscopy) はX線を用いるため、これらを含むb・c・dは誤りである。", "src": "pp", "trap": 1}, {"id": "041-1", "t": "単純CTが適応となる場合", "q": "Non contrast CT is app for:", "o": ["a. Staging of abdominal region in oncologist patients", "b. Assessment of kidney stones", "c. Follow up for pulmonary embolism", "d. Assessment of focal liver lesion of unknown dignity"], "a": "b. Assessment of kidney stones", "c": "ct", "k": "b", "e": "尿路結石 (kidney stones) の評価は単純CTが適応で、結石は高吸収のため造影なしで明瞭に描出される。腫瘍のステージング、肺塞栓 (pulmonary embolism) の経過観察、性状不明の肝腫瘤の評価はいずれも造影CTが必要である。", "src": "pp"}, {"id": "041-3", "t": "急性胸痛で胸部X線が診断できない疾患", "q": "Chest X-Ray can diagnose the following pathologies in case of acute chest pain, EXCEPT:", "o": ["a. Aortic dissection", "b. Pneumonia", "c. Pneumothorax", "d. Hydrothorax"], "a": "a. Aortic dissection", "c": "chest", "k": "a", "e": "大動脈解離 (aortic dissection) の確定診断には造影CT（CTA）が必要で、胸部X線では縦隔拡大を示唆するのみで確定できない。肺炎、気胸 (pneumothorax)、胸水 (hydrothorax) は胸部X線で診断可能である。", "src": "pp"}, {"id": "041-4", "t": "陰性の腹部X線で除外できるもの", "q": "Negative abdominal X-Ray rules out the following:", "o": ["a. Ileus", "b. Tumor", "c. Perforation if luminal organs", "d. None of them"], "a": "d. None of them", "c": "abdomen", "k": "d", "e": "腹部単純X線が陰性でも、イレウス・腫瘍・消化管穿孔のいずれも除外できない（感度が低く、早期や少量のフリーエアは描出されないことがある）。したがって「いずれも除外できない」が正解である。", "src": "pp"}, {"id": "041-5", "t": "腹部・骨盤超音波での患者準備", "q": "How should the patient arrive for abdominal and pelvic ultrasound?", "o": ["a. With kidney function results not older than one week", "b. with a full bladder", "c. After at least 4 hours of fasting", "d. With previous ultrasound reports"], "a": "b. with a full bladder", "c": "us", "k": "b", "e": "骨盤部超音波では充満した膀胱 (full bladder) が音響窓となり、子宮・卵巣・膀胱などの骨盤臓器を観察しやすくなる。腎機能結果や過去のレポートは必須でなく、絶食は上腹部（胆嚢など）の準備に関係するが本問の主眼ではない。", "src": "pp"}, {"id": "042-2", "t": "20歳女性の乳房痛の画像法選択", "q": "The imaging method choice in a 2o year old female with breast pain:", "o": ["a. Breast ultrasound", "b. Mammography", "c. CT", "d. MRI"], "a": "a. Breast ultrasound", "c": "breast", "k": "a", "e": "若年女性は乳腺密度が高くマンモグラフィの感度が低いうえ放射線被曝も避けたいため、第一選択は乳房超音波 (breast ultrasound) である。CTやMRIは一次評価には不要である。", "src": "pp"}, {"id": "042-3", "t": "急性腹部X線が検出しないものの例外", "q": "Acute abdominal X-Ray is generally used in everyday clinical practice to detect the following, EXCEPT:", "o": ["a. Kidney stone", "b. Foreign body", "c. Air fluid levels", "d. Free abdominal air"], "a": "a. Kidney stone", "c": "abdomen", "k": "a", "e": "多くの腎結石は腹部単純X線では描出が不十分（重なりやガスの影響で検出困難）であり、評価には単純CTが用いられる。異物、鏡面像 (air fluid levels)、遊離腹腔内ガス (free abdominal air) は腹部X線で検出可能である。", "src": "pp"}, {"id": "042-4", "t": "多発外傷ケアにおけるMRIの役割", "q": "What is the role of MRI in the poly trauma care algorithm?", "o": ["a. A cranial MRI scan is performed in each case", "b. Detection of neurological abnormalities, possible discoligamentous lesions and exclusion of intrusion all hematoma which cannot be others I've explained by CT", "c. The first step in the diagnostic algorithm: whole body MRI", "d. Plays no role at all, CT and US are enough"], "a": "b. Detection of neurological abnormalities, possible discoligamentous lesions and exclusion of intrusion all hematoma which cannot be others I've explained by CT", "c": "mri", "k": "b", "e": "多発外傷ではCTが第一選択だが、MRIは神経学的異常、椎間板・靱帯損傷 (discoligamentous lesions)、CTで描出しきれない病変の評価という補完的役割を担う。全例で頭部MRIを行うわけでなく(a)、全身MRIが初期診断の第一段階でもなく(c)、役割がないとするd も誤りである。", "src": "pp"}, {"id": "042-5", "t": "AP像の特徴", "q": "Characteristics of the AP view:", "o": ["a. Small amounts of pleural fluid is hard to notice on an AP chest X-Ray", "b. The cardiac silhouette is larger than on a PA view", "c. AP view is obtained for a supine chest radiograph"], "a": "a / b / c すべて正しい（複数正解としてハイライト）", "c": "xray", "k": "", "e": "本スライドではa・b・cの3つすべてが正解としてハイライトされている。AP像は仰臥位で撮影されるため少量の胸水が後方に広がり気づきにくく(a)、X線源-心臓間距離が短く拡大効果で心陰影が大きく写り(b)、臥位胸部撮影でAP方向が用いられる(c)。いずれもAP像の正しい特徴である。", "src": "pp"}, {"id": "043-1", "t": "遊離腹腔内ガス", "q": "Free peritoneal air:", "o": ["a. Can be detected with the usage of barium contrast material", "b. Is always abnormal", "c. Is a sign of parenchymal organ perforation", "d. Is more sensitively detected with X-Ray than CT"], "a": "b. Is always abnormal", "c": "abdomen", "k": "b", "e": "遊離腹腔内ガス (free peritoneal air) は通常、消化管（管腔臓器）穿孔を示す常に異常な所見である。穿孔疑いでバリウムは禁忌のため水溶性造影剤を使う(a誤り)、実質臓器でなく管腔臓器穿孔の徴候(c誤り)、検出感度はX線よりCTが高い(d誤り)。", "src": "pp"}, {"id": "043-2", "t": "腫瘍画像におけるMRIの主な役割", "q": "The main role of MRI in oncological imaging is:", "o": ["a. A local tumor staging", "b. Overview of organ systems and local tumor staging in a short examination time", "c. Making large field of view (FOV) images, since image resolution is not affected by the FOV", "d. Imaging the same regions as with CT scan for better documentation"], "a": "a. A local tumor staging", "c": "mri", "k": "a", "e": "MRIは優れた軟部組織コントラストにより、腫瘍の局所進展度評価（局所ステージング）に最も有用である。検査時間は長く広範囲を短時間で撮るのは不得手(b)、FOVを大きくすると分解能は低下する(c)、CTと同じ部位を撮るための検査ではない(d)。", "src": "pp"}, {"id": "043-4", "t": "CTでのくも膜下出血の典型像", "q": "What is the typical appearance of a subarachnoid hemorrhage in CT?", "o": ["a. Hyper dense / basal cisterns, most commonly around the Circle of Willis", "b. Hypo dense / basal cisterns, most commonly around the Circle of Willis", "c. Hypo dense / amorphous, within the brain", "d. Hyper dense / amorphous, with the brain"], "a": "a. Hyper dense / basal cisterns, most commonly around the Circle of Willis", "c": "neuro", "k": "a", "e": "急性くも膜下出血 (subarachnoid hemorrhage) は単純CTで高吸収（白く）描出され、脳底槽 (basal cisterns)、特にウィリス動脈輪 (Circle of Willis) 周囲に分布する。新鮮血は高吸収であり低吸収とするb・cは誤り、分布は脳実質内の不定形でなく脳底槽である(d誤り)。", "src": "pp", "trap": 1}, {"id": "044-1", "t": "胆管IVRの適応でないもの", "q": "Which is NOT an indication for bile duct interventional radiological procedure?", "o": ["a. Cholangitis", "b. Bile duct stenosis caused by malignant tumor", "c. Bile stone", "d. Portal hypertension"], "a": "d. Portal hypertension", "c": "cardiovascular", "k": "d", "e": "門脈圧亢進症 (portal hypertension) は門脈系の病態であり胆管IVRの適応ではない（TIPSなど別のIVRが該当）。胆管炎、悪性腫瘍による胆管狭窄、胆石はいずれも胆管ドレナージ・ステント留置など胆管IVRの適応である。", "src": "pp"}, {"id": "044-3", "t": "不安定な腎機能障害例での肺動脈CT戦略", "q": "Chest pain, dyspnea, impaired renal function (GFR – 38 ml/min/1.73m2) and D-diner positively in the laboratory, S1Q3 on ECG. The patient is hemodynamically unstable. Does the renal impairment change the diagnostic strategy?", "o": ["a. Yes, prophylactic intravenous hydration should be performed first to avoid contrast induced acute kidney injury then the pulmonary CT angiography May be preformed", "b. No, I'm this case chest X-Ray should be preformed first and pulmonary CT angiography should only be considered upon a positive chest X-Ray", "c. Yes, because of the sever renal impairment only a non contrast CT should be performed", "d. No, acute pulmonary CT angiography must be performed because of the life threatening emergency, the consequential contrast induced acute kidney injury is of secondary concern"], "a": "d. No, acute pulmonary CT angiography must be performed because of the life threatening emergency, the consequential contrast induced acute kidney injury is of secondary concern", "c": "safety", "k": "d", "e": "血行動態が不安定で肺塞栓 (S1Q3, Dダイマー陽性) が強く疑われる生命を脅かす緊急事態では、診断のための肺動脈造影CT (pulmonary CT angiography) を直ちに行うべきで、造影剤腎症 (contrast induced AKI) は二次的な懸念である。補液の準備を優先(a)、まずX線(b)、単純CTのみ(c) は緊急性を欠き診断に不十分である。", "src": "pp"}, {"id": "044-4", "t": "高エコーでない構造を選ぶ", "q": "Which structures are typically echo dense? Pick the WRONG answer.", "o": ["a. Gallstone", "b. Kidney stone", "c. Sclerotic vascular plaque", "d. Liver cyst"], "a": "d. Liver cyst", "c": "us", "k": "d", "e": "設問は「高エコーでないもの（誤りの選択肢）」を選ぶもの。肝嚢胞 (liver cyst) は内部が液体のため無エコー（後方エコー増強を伴う）であり、高エコーではない。胆石・腎結石・硬化性血管プラークはいずれも高エコー（音響陰影を伴うことが多い）である。", "src": "pp"}, {"id": "045-1", "t": "ドプラ信号を典型的に記録できる構造", "q": "In which anatomical structure can we register Doppler signal typically?", "o": ["a. Biliary duct", "b. Common carotid artery", "c. Wirsung duct", "d. Ureter"], "a": "b. Common carotid artery", "c": "us", "k": "b", "e": "ドプラ信号は流れる血流から得られるため、総頸動脈 (common carotid artery) のような血管で典型的に記録できる。胆管、主膵管 (Wirsung duct)、尿管は血流のない管腔であり、典型的なドプラ信号は得られない。", "src": "pp"}, {"id": "045-2", "t": "X線に対する超音波の最大の利点", "q": "What are the most important advantages of ultrasound over X-ray examination?", "o": ["a. Better spatial resolution", "b. Can be used during pregnancy", "c. Ability to measure flow", "d. Able to differentiate between soft tissue"], "a": "a. Better spatial resolution", "c": "us", "k": "a", "e": "（ハイライトはaだが、医学的にはbの「妊娠中に使用可能（無被曝）」も超音波の重要な利点である点に注意。）超音波は高周波プローブで表在組織を高い空間分解能 (spatial resolution) で描出できる。血流測定や軟部組織の鑑別、放射線非被曝による妊娠中使用も利点だが、本スライドではaがハイライトされている。", "src": "pp"}, {"id": "045-3", "t": "カラードプラでプローブに向かう血流の色", "q": "Which color indicates the flow towards the transducer conventionally in color Doppler?", "o": ["a. Black", "b. Red", "c. Blue", "d. White"], "a": "b. Red", "c": "us", "k": "b", "e": "カラードプラの慣例（BART: Blue Away, Red Toward）では、プローブ (transducer) に向かう血流は赤 (red)、遠ざかる血流は青 (blue) で表示される。よって向かう流れは赤である。", "src": "pp"}, {"id": "045-4", "t": "臨床超音波検査の特徴で誤り", "q": "What are the characteristic of clinical ultrasound examination? Pick the WRONG answer.", "o": ["a. It can be used to examine brain in the new borns", "b. It is capable to measure flow rate", "c. A higher frequency transducer can be used to examine deeper layers", "d. Vascularization can be visualized used IV contrast media"], "a": "c. A higher frequency transducer can be used to examine deeper layers", "c": "us", "k": "c", "e": "設問は誤りを選ぶもの。高周波プローブは分解能が高い反面、減衰が大きく深部には届かない。深部を観察するには低周波プローブを用いるため、cが誤りである。新生児の大泉門からの脳評価(a)、流速測定(b)、造影超音波での血管描出(d) はいずれも正しい。", "src": "pp"}, {"id": "045-5", "t": "純粋な液体の超音波用語", "q": "What is the typical ultrasound terminology of pure fluid?", "o": ["a. Echogenic", "b. Hypoechoic", "c. Anechoic", "d. Echodense"], "a": "c. Anechoic", "c": "us", "k": "c", "e": "純粋な液体は超音波を反射せず内部エコーを生じないため、無エコー (anechoic, 黒) と表現される（後方エコー増強を伴う）。Echogenic/echodenseは高エコー、hypoechoicは低エコーであり、純粋な液体には当てはまらない。", "src": "pp", "trap": 1}, {"id": "046-1", "t": "胆石の超音波用語", "q": "What is the typical ultrasound terminology if gallstone?", "o": ["a. Echogenic", "b. Hypoechoic", "c. Anechoic", "d. Echodense"], "a": "d. Echodense", "c": "us", "k": "d", "e": "胆石は強く反射する固形物で、後方音響陰影を伴う高エコー（echodense/echogenic）として描出される。本スライドではechodenseがハイライトされている。Hypoechoic（低エコー）やanechoic（無エコー）は液体・軟部の用語であり胆石には当てはまらない。", "src": "pp", "trap": 1}, {"id": "046-2", "t": "造影超音波の適応で誤り", "q": "What are the indications for contrast enhanced ultrasound examination. Pick the FALSE answer", "o": ["a. Differential diagnosis of hepatic masses", "b. Evaluation if complex renal cysts", "c. Distinguishing between active and inactive Crohn's disease", "d. To diagnose heptosplenomegaly"], "a": "d. To diagnose heptosplenomegaly", "c": "us", "k": "d", "e": "設問は誤りを選ぶもの。肝脾腫 (hepatosplenomegaly) は通常のグレースケール超音波での大きさ計測で診断でき、造影超音波 (CEUS) は不要である。肝腫瘤の鑑別、複雑性腎嚢胞の評価、クローン病の活動性評価は血流・造影効果をみるCEUSの適応である。", "src": "pp"}, {"id": "046-3", "t": "典型的に無エコーでない構造（誤り）", "q": "Which structures are typically anechoic? Pick the FALSE answer.", "o": ["a. Full bladder", "b. Cyst", "c. Lumen if greater vessels", "d. Acute hematoma"], "a": "c. Lumen if greater vessels", "c": "us", "k": "c", "e": "設問は無エコーでないものを選ぶもの。大血管の内腔 (lumen of greater vessels) は流れる血液で満たされ、必ずしも無エコーではない（特にうっ滞・流れの遅い部位ではエコーを生じうる）ため誤りとされている。充満膀胱・嚢胞・急性血腫はいずれも液体性で無エコーを示す。", "src": "pp"}, {"id": "046-4", "t": "左上葉の不均一浸潤影の最も考えられる診断", "q": "What could be the most likely clinical diagnosis of this description: an inhomogenous infiltrate is seen in the upper left lobe.", "o": ["a. Pneumonia", "b. Hydrothorax", "c. Pneumothorax", "d. Small circulatory congestion"], "a": "a. Pneumonia", "c": "chest", "k": "a", "e": "肺葉内の不均一な浸潤影 (inhomogenous infiltrate) は肺炎 (pneumonia) に典型的な所見である。胸水 (hydrothorax) は重力に従う均一な陰影、気胸 (pneumothorax) は透過性亢進した無血管領域、軽度のうっ血は両側びまん性であり、限局性浸潤影とは異なる。", "src": "pp"}, {"id": "046-5", "t": "肺炎の臨床診断と陰性X線の矛盾", "q": "Does the clinical diagnosis of pneumonia contradict the negative X-Ray image?", "o": ["a. Yes, therefore a CT scan is required for clarification", "b. No, because pneumonia does not have a typical X-Ray image", "c. Yes, therefore due diligence is required as clarification", "d. No, the X-Ray image many be negative for the first 48hours after the onset of symptoms"], "a": "d. No, the X-Ray image many be negative for the first 48hours after the onset of symptoms", "c": "chest", "k": "d", "e": "肺炎は発症後早期（最初の約48時間）にはX線で陰影が現れないことがあるため、陰性X線は臨床診断と矛盾しない。肺炎には典型的なX線像が存在する(b誤り)ため、陰性でも矛盾しない理由は「早期には陰性となりうる」ことである。", "src": "pp", "trap": 1}, {"id": "047-1", "t": "ICUのオンサイト胸部撮影の撮影方向", "q": "In the study of patients in the intensive care unit, the radial direction of the on-site chest recordings is", "o": ["a. AP", "b. PA", "c. MLO (mediolateral oblique)", "d. CC (Craniocaudal)"], "a": "a. AP", "c": "chest", "k": "a", "e": "ICUの臥床患者にポータブル装置で撮影する胸部写真は、X線が前面（前→後, AP方向）から入射するAP像となる。立位の標準胸部撮影はPA、MLOとCCはマンモグラフィの撮影方向である。", "src": "pp"}, {"id": "047-2", "t": "立位2方向胸部像で高い確度で診断できないもの（例外）", "q": "Can be diagnosed with high certainty in a standing, two way chest image in the case of chest trauma, EXCEPT:", "o": ["a. Hemothorax", "b. Rib fracture", "c. PTX", "d. Foreign body"], "a": "b. Rib fracture", "c": "chest", "k": "b", "e": "肋骨骨折 (rib fracture) は通常の胸部X線では重なりや転位の少なさから見逃されやすく、高い確度では診断できない（専用肋骨撮影やCTを要する）。血胸 (hemothorax)、気胸 (PTX)、異物は立位2方向像で比較的確実に診断できる。", "src": "pp"}, {"id": "047-3", "t": "外傷性肋骨X線の撮影方向数", "q": "Traumatic rib X-Ray recordings most often, in how many directions is it made?", "o": ["a. 1", "b. 3", "c. 2", "d. 4"], "a": "c. 2", "c": "msk", "k": "c", "e": "外傷性肋骨撮影は通常2方向（正面と斜位）で行い、肋骨の重なりを避けて骨折線を描出しやすくする。1方向では見逃しやすく、3・4方向は一般的でない。", "src": "pp"}, {"id": "047-4", "t": "腸管造影剤が疑われる場合", "q": "In case of suspicion of intestinal contrast agent:", "o": ["a. Do not administer because it will cause peritonitis in all cases", "b. Can't be given because is had an osmotic effect", "c. Can be given because iodine-containing preparations do not cause peritonitis", "d. It can be given because the barium (…..something unreadable)"], "a": "c. Can be given because iodine-containing preparations do not cause peritonitis", "c": "safety", "k": "c", "e": "消化管穿孔が疑われる場合でも、水溶性ヨード造影剤 (iodine-containing preparations) は腹膜炎を起こさないため投与可能である。バリウムは腹腔内漏出で腹膜炎を起こすため禁忌だが、ヨード造影剤は安全に使える点が要点である。", "src": "pp"}, {"id": "049-5", "t": "縦隔・後腹膜リンパ節に最適な画像法（Midterm-B Q10）", "q": "For the mediastinal and retroperitoneal lymph nodes the most acceptable imaging method is", "o": ["a. US", "b. CT examination", "c. Scinitigraphy", "d. Chest x-ray (two views)"], "a": "b. CT examination", "c": "ct", "k": "b", "e": "縦隔・後腹膜は超音波では描出が難しい深部であり、CTがリンパ節の位置・大きさ・性状を最も正確に評価できる。超音波(a)はガス・骨に妨げられ、シンチ(c)は機能評価、胸部X線(d)は解像度・重なりの点で不十分である。", "src": "pp"}, {"id": "050-2", "t": "慢性副鼻腔炎で評価すべき複合体（Midterm-B Q12）", "q": "How do you call the complex that should be evaluated in case of chronic sinusitis?", "o": ["a. Osteomeatal complex", "b. Ostiomeatal complex", "c. Ethmoidal complex", "d. Nasomeatal complex"], "a": "b. Ostiomeatal complex", "c": "neuro", "k": "b", "e": "慢性副鼻腔炎では、上顎洞・前篩骨洞・前頭洞の排出路が集まる骨洞複合体 (ostiomeatal complex, OMC) の評価が重要で、ここの閉塞が炎症の鍵となる。他の名称は正式な解剖用語ではない。", "src": "pp", "trap": 1}, {"id": "050-3", "t": "多発外傷で最速の画像法（Midterm-B Q13）", "q": "In case of a polytraumatic patient, which is the fastest imaging method to get useful information about cranial, chest and abdominal complications?", "o": ["a. Skull, chest and abdominal x-ray (??)", "b. Carotid and abdominal US examination", "c. Non contrast and contrast enhanced multidetector CT examination", "d. PET-CT"], "a": "c. Non contrast and contrast enhanced multidetector CT examination", "c": "ct", "k": "c", "e": "（スライドではcがハイライトだがaにも\"(??)\"の疑問符あり。医学的にはcが妥当。）多発外傷では、多列検出器CT (multidetector CT) による全身評価が頭部・胸部・腹部の損傷を短時間で包括的に把握でき最速・最適である。単純X線では情報不足、超音波は限定的、PET-CTは外傷救急には不適である。", "src": "pp"}, {"id": "051-1", "t": "出血に関する正しい記述（Midterm-A Q1）", "q": "Choose the correct statement", "o": ["a. Fresh hemorrhage in CT is hypodense", "b. Chronic subdural hematoma in CT is hyperdense", "c. MR is capable to determine the approximate age of hemorrhage", "d. MR is not useful in identifying hemorrhage"], "a": "c. MR is capable to determine the approximate age of hemorrhage", "c": "neuro", "k": "c", "e": "MRIは血腫の経時的なヘモグロビン変性により信号が変化するため、出血のおおよその時期を推定できる。新鮮出血はCTで高吸収(a誤り)、慢性硬膜下血腫は低吸収(b誤り)、MRは出血同定にも有用(d誤り)である。", "src": "pp", "trap": 1}, {"id": "051-3", "t": "信号強度に関する正しい記述（Midterm-A Q3）", "q": "Choose the correct statement", "o": ["a. On T1 weighted images white mater has a higher signal intensity than grey matter", "b. On T1 weighted images white matter has a lower signal intensity than grey matter", "c. On T2 weighted images CSF has intermediate signal", "d. On T2 weighted images bones have the highest signal intensity"], "a": "a. On T1 weighted images white mater has a higher signal intensity than grey matter", "c": "mri", "k": "a", "e": "白質は脂質（ミエリン）に富むため、T1強調像では灰白質より高信号を示す。よってaが正しくbは誤り。T2強調像では脳脊髄液 (CSF) は高信号で中間信号ではなく(c誤り)、骨は信号に乏しく最高信号ではない(d誤り)。", "src": "pp", "trap": 1}, {"id": "054-2", "t": "慢性副鼻腔炎で評価すべき複合体（Midterm-A Q14）", "q": "How do you call the complex that should be evaluated in case of chronic sinusitis?", "o": ["a. Osteomeatal complex", "b. Ostimeatal complex", "c. Ethmoidal complex", "d. Nasomeatal complex"], "a": "b. Ostimeatal complex", "c": "neuro", "k": "b", "e": "慢性副鼻腔炎では骨洞複合体 (ostiomeatal complex, OMC) の評価が重要で、この排出路の閉塞が炎症を惹起する。本スライドではbがハイライトされている（正しい綴りは ostiomeatal）。他は正式な解剖名ではない。", "src": "pp", "trap": 1}, {"id": "057-1", "t": "ハウンスフィールド値で0に固定される組織（Midterm-C Q9）", "q": "During the CT examination in the Houndfield scale, the density of the ……. Is fixed to zero:", "o": ["a. Fresh blood", "b. Water", "c. Fat", "d. Bone"], "a": "b. Water", "c": "ct", "k": "b", "e": "ハウンスフィールド単位 (Hounsfield unit, HU) は水を0、空気を-1000に固定して定義される。新鮮血は約60-100HU、脂肪は約-100HU、骨は高HUであり、基準として0に固定されるのは水である。", "src": "pp"}, {"id": "057-2", "t": "腎・尿管結石の局在に最適な方法（Midterm-C Q10）", "q": "In case of suspected nephron-ureterolithiasis the best method for the localization of the nephron-ureterolithiasis is:", "o": ["a. Abdominal US examination", "b. Intravenous urography", "c. Low dose CT", "d. PET-CT"], "a": "c. Low dose CT", "c": "gu", "k": "c", "e": "（スライドではa・cの両方がハイライトされているが、結石の局在同定のゴールドスタンダードは低線量CT。）尿路結石の局在診断には低線量CT (low dose CT) が最も感度・特異度が高く被曝も抑えられる。超音波は腎結石や水腎症の検出に有用だが尿管中部の結石は描出困難、IVUやPET-CTは第一選択ではない。", "src": "pp"}, {"id": "057-5", "t": "縦隔拡大の原因となりうる病態（誤りを選ぶ, Midterm-C Q13）", "q": "In case of widening of the mediastinum, what pathological process could be the case of this alteration: choose the false answer", "o": ["a. Aortic aneurysm, aortic dissection, aortic unfolding... (mediastinal mass, cardiac tamponade, etc.)", "b. Lymphoma", "c. Aneurysm of the descending aorta", "d. Calcified pleural callus", "e. Hilar pulmonary neoplasia"], "a": "d. Calcified pleural callus", "c": "chest", "k": "d", "e": "設問は誤り（縦隔拡大の原因にならないもの）を選ぶもの。石灰化した胸膜の瘢痕 (calcified pleural callus) は胸膜の限局性変化であり、縦隔そのものの拡大の原因にはならない。大動脈瘤・解離・縦隔腫瘤(a)、リンパ腫(b)、下行大動脈瘤(c)、肺門腫瘍(e) はいずれも縦隔拡大を生じうる。\n\n<!-- part04: pages 058-076 -->", "src": "pp"}, {"id": "058-1", "t": "腹部大動脈瘤破裂の検出法", "q": "Which method is used for the detection of abdominal aortic aneurysm rupture?", "o": ["a. Barium enema", "b. PA chest and native abdominal x-ray", "c. Contrast enhanced abdomino-pelvic CT – CT angiography", "d. PET-CT"], "a": "c. Contrast enhanced abdomino-pelvic CT – CT angiography", "c": "cardiovascular", "k": "c", "e": "腹部大動脈瘤破裂 (ruptured abdominal aortic aneurysm) は緊急で、造影CT/CT血管造影 (CT angiography) が破裂・血腫・解離の範囲と内腔の状態を最も正確に描出する。無症候の触知可能拍動性腫瘤のスクリーニングには超音波 (US) が選択されるが、破裂評価には不十分。バリウム注腸やPET-CTは血管緊急評価には不適。", "src": "pp"}, {"id": "058-2", "t": "肺膿瘍の胸部X線所見", "q": "Pulmonary abscess usually appears on the chest c-ray as", "o": ["a. Lower transparency crescent shape", "b. Lower transparency ring shaped with inner fluid level", "c. Lower transparency lense shaped", "d. Lower transparency wedge shape"], "a": "b. Lower transparency ring shaped with inner fluid level", "c": "chest", "k": "b", "e": "肺膿瘍 (pulmonary abscess) は内部が壊死・融解して空洞化し、空気と液体の境界 (air-fluid level) を伴うリング状の透過性低下像として描出される。周囲には浸潤影 (consolidation) を伴うことが多い。三日月形・レンズ形・楔形はそれぞれ別の病態（気胸・硬膜外/下出血・梗塞など）の所見。", "src": "pp", "trap": 1}, {"id": "058-3", "t": "腹腔内腹水の証明に有用でない検査", "q": "Which imaging technique is useful to demonstrate the ascites in the abdominal cavity (choose the wrong one)", "o": ["a. Abdominal US", "b. Abdominal CT", "c. Abdominal CT and US", "d. Scintigraphy"], "a": "d. Scintigraphy", "c": "abdomen", "k": "d", "e": "腹水 (ascites) は液体貯留であり、超音波 (US) とCTで容易に検出・定量できる。シンチグラフィ (scintigraphy) は機能・代謝情報を見る核医学検査で、空間分解能が低く液体貯留の解剖学的描出には不適。設問は「誤り（不適切）な選択肢」を選ぶため d が正解。", "src": "pp", "trap": 1}, {"id": "058-4", "t": "硬膜外出血の形状", "q": "Which shape is generally characteristic in case of epidural bleeding?", "o": ["a. Crescent", "b. Amorph", "c. Lentiform", "d. Not detectable"], "a": "c. Lentiform", "c": "neuro", "k": "c", "e": "硬膜外血腫 (epidural hematoma) は硬膜と頭蓋骨内板の間に貯留し、骨縫合 (suture) を越えられないため両凸レンズ状 (lentiform/biconvex) の形をとる。多くは中硬膜動脈損傷による動脈性出血で、側頭骨骨折を伴う。三日月形 (crescent) は硬膜下血腫 (subdural hematoma) の特徴。", "src": "pp", "trap": 1}, {"id": "058-5", "t": "マルチスライスCTについて正しくない記述", "q": "Which is NOT true regarding the multidetector/multislice CT", "o": ["a. Parallel rows of detectors", "b. During one rotation 4,16, 32... slices are measured", "c. Fractional (discontinuous) data collection = loss of information", "d. During one inspiration only, the whole body is scanned"], "a": "c. Fractional (discontinuous) data collection = loss of information", "c": "ct", "k": "c", "e": "マルチスライスCT (multidetector/multislice CT) は検出器を平行に複数列配置し、連続的な容積データ収集 (volumetric data collection) を行うため情報損失がない。一回転で複数スライスを取得でき、一回の息止めで全身を高速に撮影できる。c は「断続的データ収集で情報が失われる」という記述で、連続収集の事実に反するため誤り。", "src": "pp"}, {"id": "059-1", "t": "造影CT前に水分負荷が不要なGFR値", "q": "In case of the following GFR value the patient DOES NOT need hydration prior to an IV contrast enhanced CT examination:", "o": ["a. GFR is below 30 ml/min/1.73m2", "b. GFR is above 40 ml/min/1.73m2", "c. GFR is below 60 ml/min/1.73m2", "d. GFR is above 60 ml/min/1.73 m2"], "a": "d. GFR is above 60 ml/min/1.73 m2", "c": "safety", "k": "d", "e": "ヨード造影剤は腎排泄性で、腎機能が保たれていれば造影剤腎症 (contrast-induced nephropathy) のリスクは低い。GFRが60 ml/min/1.73m²を超えていれば腎機能は十分とみなされ、予防的水分負荷 (hydration) は不要。GFRが低い（30や60未満）患者ほど水分負荷が必要となる。", "src": "pp", "trap": 1}, {"id": "059-2", "t": "急性膵炎の合併症を最も効率的に検出する検査", "q": "Based on the physical investigation and laboratory parameters, there is a suspicion of acute pancreatitis. Which of the following imaging methods is able to detect the complications most efficiently?", "o": ["a. Abdominal plain film", "b. Transabdominal ultrasonography", "c. CT/unenhanced and contrast-enhanced study", "d. Barium meal"], "a": "c. CT/unenhanced and contrast-enhanced study", "c": "abdomen", "k": "c", "e": "急性膵炎 (acute pancreatitis) の診断は臨床・検査値で行うが、合併症（壊死、仮性嚢胞 (pseudocyst)、膿瘍、出血、液体貯留）の評価には単純＋造影CTが最も有用。造影で壊死部の非増強域や仮性嚢胞壁の増強が描出される。腹部単純X線やバリウム検査では膵実質や周囲の合併症を評価できず、USは腸管ガスで膵の描出が制限される。", "src": "pp"}, {"id": "059-3", "t": "4〜5ヶ月児の股関節形成不全スクリーニング法", "q": "Which imaging method is applied for screening of hip dysplasia for neonates between 4-5 months of age?", "o": ["a. X-ray", "b. Ultrasonography", "c. MRI", "d. Non of the above"], "a": "b. Ultrasonography", "c": "msk", "k": "b", "e": "発育性股関節形成不全 (developmental dysplasia of the hip; DDH) のスクリーニングでは、骨化が未完成な乳児の軟骨性大腿骨頭を評価でき、被ばくもない超音波 (ultrasonography) が標準。X線は骨化が進む生後6ヶ月以降に有用となるため、この月齢では不適。MRIは鎮静が必要でスクリーニングに非実用的。", "src": "pp"}, {"id": "059-5", "t": "二重造影注腸検査について誤った記述", "q": "Which statement is false on double contrast bowel examination", "o": ["a. Smear mucosa with barium-containing contrast agent.", "b. Distend the lumen with gas, which is a positive contrast media, because of decreasing transparency.", "c. Relax bowel walls with smooth muscle relaxant", "d. Depiction: luminal contour, mucosal relief"], "a": "b. Distend the lumen with gas, which is a positive contrast media, because of decreasing transparency.", "c": "abdomen", "k": "b", "e": "二重造影 (double contrast) では、バリウム（陽性造影剤）で粘膜をコーティングし、ガス（空気/CO₂）で内腔を拡張する。ガスはX線をよく通すため透過性を高める陰性造影剤 (negative contrast) であり、b の「ガスは陽性造影剤で透過性を低下させる」という記述は誤り。鎮痙薬で腸管を弛緩させ、内腔輪郭と粘膜表面を描出する。", "src": "pp"}, {"id": "060-1", "t": "成人で第一選択として超音波を適用できる臓器", "q": "In case of which organ can you apply utrasonography as the first imaging modality for adults:", "o": ["a. Lung", "b. Colon", "c. Spine", "d. Liver", "e. Brain"], "a": "d. Liver", "c": "us", "k": "d", "e": "肝臓 (liver) は超音波が良好に到達する充実性実質臓器で、腫瘤・嚢胞・脂肪肝・胆道評価の第一選択として超音波 (ultrasonography) が用いられる。肺や結腸は内部の空気がUSビームを反射・散乱させ、脊椎は骨が、成人の脳は頭蓋骨がそれぞれ音波を遮るため超音波は第一選択にならない。", "src": "pp"}, {"id": "060-2", "t": "頭頸部コンパートメントを上下に分ける構造", "q": "The head and neck compartments are separated into parts on the basis of the following structure:", "o": ["a. Epiglottis", "b. Hyoid bone", "c. Cricoid cartilage", "d. Uvula", "e. Hard palate"], "a": "b. Hyoid bone", "c": "neuro", "k": "b", "e": "頭頸部の解剖学的コンパートメントは舌骨 (hyoid bone) を基準に舌骨上 (suprahyoid) と舌骨下 (infrahyoid) の空間に分けられる。咽頭粘膜間隙・傍咽頭間隙などは舌骨上、前頸部間隙などは舌骨下に分類される。喉頭蓋・輪状軟骨・口蓋垂・硬口蓋はこの主要な分割基準ではない。", "src": "pp"}, {"id": "060-3", "t": "電離放射線を使用しないモダリティ", "q": "Which modality does not apply ionizing radiation", "o": ["a. Contrast enhanced US", "b. Positron emission tomography (PET)", "c. Fluoroscopy", "d. Digital subtractional angiography (DSA)"], "a": "a. Contrast enhanced US", "c": "physics", "k": "a", "e": "超音波 (ultrasound) は音波を用いるため電離放射線 (ionizing radiation) を使用せず、造影USでも被ばくはない。PETは放射性同位元素のγ線、透視 (fluoroscopy) とDSAはX線を用いるため、いずれも電離放射線を伴う。", "src": "pp"}, {"id": "060-4", "t": "超音波の周波数・分解能の正しい対応", "q": "Which correlation is the most correct to the application of ultrasonography", "o": ["a. High frequency probe – deep penetration – low spatial resolution", "b. High frequency probe – poor penetration – good spatial resolution", "c. Low frequency probe – deep penetration – good spatial resolution", "d. Low frequency probe – poor penetration – good spatial resolution"], "a": "b. High frequency probe – poor penetration – good spatial resolution", "c": "us", "k": "b", "e": "超音波では高周波プローブほど波長が短く、深部への到達 (penetration) は浅いが空間分解能 (spatial resolution) は高い（表在病変・小児に有用）。逆に低周波プローブは深部到達は良いが分解能は低い（腹部・肥満患者に有用）。したがって「高周波＝浅い到達＋良好な分解能」の b が正しい。", "src": "pp", "trap": 1}, {"id": "061-1", "t": "抗菌薬で改善しない肺浸潤影で考えるべき疾患", "q": "If a pulmonary infiltrate DOES NOT resolve over time despite treatment with antimicrobial agents, think of....", "o": ["a. Broncho-alveolar subtype of lung cancer", "b. Supraglottic cancer of larynx", "c. Boeck sarcoidosis", "d. Presence of mycoplasma or klebsiella", "e. Pleural adhesions"], "a": "a. Broncho-alveolar subtype of lung cancer", "c": "chest", "k": "a", "e": "抗菌薬治療でも消退しない肺浸潤影は、肺炎ではなく悪性を疑う。細気管支肺胞上皮癌 (broncho-alveolar subtype of lung cancer、現在の肺腺癌・粘液型) は肺炎様の浸潤影を呈し抗菌薬で改善しないため代表的鑑別となる。マイコプラズマ・クレブシエラは適切な抗菌薬で改善する感染症であり、持続性浸潤の説明に合わない。", "src": "pp"}, {"id": "061-2", "t": "通常の胸部X線で用いるX線技術", "q": "Which X-ray technique is applied by conventional chest x-ray?", "o": ["a. Hardbeam technique (25-35keV)", "b. Softbeam technique (25-35 keV)", "c. Hardbeam technique (120-140 keV)", "d. Softbeam technique (120-140 keV)"], "a": "c. Hardbeam technique (120-140 keV)", "c": "xray", "k": "c", "e": "通常の胸部X線では高エネルギーの硬線 (hardbeam, 120-140 keV) を用いる。これにより肋骨など骨の重なりを抑えて肺野・縦隔のコントラストを得やすくする。軟線 (softbeam, 低keV) は軟部組織のコントラストを重視するマンモグラフィなどで使われる。", "src": "pp", "trap": 1}, {"id": "061-6", "t": "胸部X線の適応でないもの", "q": "Which is NOT an indication of chest x-ray", "o": ["a. High fever", "b. Search for primary tumor", "c. Elevated liver enzymes", "d. Chest screening"], "a": "c. Elevated liver enzymes", "c": "chest", "k": "c", "e": "胸部X線の適応は高熱、呼吸器症状、身体所見異常、原発巣検索、外傷、術前後、胸部スクリーニングなど。肝酵素上昇 (elevated liver enzymes) は肝胆道系の問題を示唆し、胸部X線の適応にはならない（腹部US/CTなどが適切）。", "src": "pp"}, {"id": "061-7", "t": "4ヶ月児の腸重積整復における絶対禁忌", "q": "Which of the following statement is the absolute contraindication for enema reduction of an intussusception (in case of a 4 month old baby):", "o": ["a. Small amount of free fluid on the abdominal US", "b. Signs of perforation", "c. Subicterus", "d. Small bowel obstruction"], "a": "b. Signs of perforation", "c": "abdomen", "k": "b", "e": "腸重積 (intussusception) の注腸整復 (enema reduction) では、すでに腸管穿孔 (perforation) や腹膜炎の徴候がある場合は注腸で腸内圧を上げると致命的となるため絶対禁忌。少量の腹水のみでは禁忌にならず、外科的判断を要するが整復を試みうる。", "src": "pp"}, {"id": "062-1", "t": "成人甲状腺USに通常用いるトランスデューサ", "q": "The following transducer is usually used for adult thyroid US", "o": ["a. 9-12.5 MHz convex", "b. 6-9 MHz phased-array", "c. 2-5 MHz convex", "d. 7.5-10 MHz linear"], "a": "d. 7.5-10 MHz linear", "c": "us", "k": "d", "e": "甲状腺は表在臓器のため、高周波 (7.5-10 MHz) のリニア (linear) プローブが用いられ、高い空間分解能で結節を描出できる。コンベックスや低周波は深部腹部臓器向け、フェーズドアレイは心臓向けで、表在の甲状腺評価には分解能が不足する。", "src": "pp", "trap": 1}, {"id": "062-3", "t": "脂肪を典型的に含む腎病変", "q": "Which renal lesion contains typically fat?", "o": ["a. Renal cell carcinoma", "b. Septated renal cyst", "c. Renal cortical infarction", "d. Angiomyolipoma"], "a": "d. Angiomyolipoma", "c": "gu", "k": "d", "e": "血管筋脂肪腫 (angiomyolipoma) は血管・平滑筋・脂肪からなる良性腫瘍で、内部に肉眼的脂肪 (macroscopic fat) を含むのが特徴。CTで脂肪濃度（低吸収）を確認することが診断の鍵。腎細胞癌・腎嚢胞・腎梗塞は典型的には脂肪を含まない。", "src": "pp"}, {"id": "063-1", "t": "小腸イレウスを起こしうる炎症性病態", "q": "The following inflammatory conditions can cause small bowel ileus:", "o": ["a. Chron´s disease", "b. Diverticulitis", "c. Bowel tuberculosis", "d. All of the above"], "a": "d. All of the above", "c": "abdomen", "k": "d", "e": "クローン病 (Crohn's disease)、憩室炎 (diverticulitis)、腸結核 (bowel tuberculosis) はいずれも炎症性病態として腸管の浮腫・狭窄・癒着を起こし、麻痺性/閉塞性のイレウス (ileus) を生じうる。したがって全てが該当し d が正解。", "src": "pp"}, {"id": "063-2", "t": "典型的肝血管腫のエコー所見", "q": "In case of typical liver hemangiomas, how can we characterize the mass?", "o": ["b. Well rounded, hypoechoic", "c. Well rounded, anechoic", "d. Well rounded, hyperechoic", "e. Well rounded, hyperdense"], "a": "d. Well rounded, hyperechoic", "c": "abdomen", "k": "d", "e": "典型的な肝海綿状血管腫 (cavernous hemangioma) は超音波で、境界明瞭・整な高エコー (hyperechoic) の腫瘤として描出されるのが特徴。無エコー (anechoic) は嚢胞、低エコー (hypoechoic) は多くの腫瘍に見られる所見で典型的血管腫の像ではない。", "src": "pp", "trap": 1}, {"id": "064-2", "t": "「病的骨折」とみなされる骨折", "q": "Which of the following fracture type is considered as \"pathological fracture\"?", "o": ["a. Fatigue fractures of athletes", "b. Fracture of bones weakened by a tumor, inflammation or cyct", "c. All type of vertebral facture", "d. Fractures due to osteoporosis"], "a": "b. Fracture of bones weakened by a tumor, inflammation or cyct", "c": "msk", "k": "b", "e": "病的骨折 (pathological fracture) は、腫瘍・炎症・嚢胞などの基礎疾患により脆弱化した骨が、通常では折れない軽微な力で骨折するもの。疲労骨折は正常骨への反復負荷によるもの。骨粗鬆症性骨折も骨の脆弱化を伴うが、本問では基礎病変による局所脆弱化を典型的な病的骨折として b を正解としている。", "src": "pp"}, {"id": "064-6", "t": "腋窩・鎖骨上リンパ節腫大の第一選択画像", "q": "In case of enlarged axillary and supraclavicular lymph nodes the first imaging method is:", "o": ["a. CT", "b. MR", "c. US", "d. Scintigraphy"], "a": "c. US", "c": "us", "k": "c", "e": "腋窩・鎖骨上リンパ節は表在性で、超音波 (US) により大きさ・形状・皮髄構造・血流を評価でき、被ばくなく穿刺吸引のガイドも可能なため第一選択。CT/MRはより広範な病期評価が必要なときに用いる。", "src": "pp"}, {"id": "065-5", "t": "術後に起こりうる合併症", "q": "Which of the followings can be complications after an operation", "o": ["a. Ileus caused by adhesions", "b. Abscess", "c. Stress ulcus", "d. Insufficiency of the suture"], "a": "判別不能（要確認）（おそらく「全て該当」を意図）", "c": "abdomen", "k": "", "e": "本問は a〜d がすべて黄色でハイライトされており、術後合併症として癒着性イレウス (adhesion ileus)、膿瘍 (abscess)、ストレス潰瘍 (stress ulcer)、縫合不全 (suture insufficiency) はいずれも実際に起こりうる。選択肢に「all of the above」がないため、出題意図としては「全て正しい」を示していると考えられる。単一解の指定が読み取れないため要確認。", "src": "pp", "chk": 1}, {"id": "065-6", "t": "脊柱管内腫瘍の分類", "q": "Tumors within the spinal canal may be classified as", "o": ["a. Intramedullary", "b. Extradural", "c. Intradural-extramedullary", "d. Extradural-intramedullary"], "a": "判別不能（要確認）（おそらく a・b・c が正しい分類）", "c": "neuro", "k": "", "e": "脊柱管内腫瘍は通常、髄内 (intramedullary)、硬膜内髄外 (intradural-extramedullary)、硬膜外 (extradural) の3つに分類される。a・b・c がハイライトされており、これらが正しい分類。d の「extradural-intramedullary」は解剖学的に成立しない組み合わせで誤り。単一解指定が読み取れないため要確認。", "src": "pp", "chk": 1, "trap": 1}, {"id": "065-7", "t": "麻痺性イレウスを起こしうる病態", "q": "Which condition can cause paralytic ileus?", "o": ["a. Cramp caused by kidney stone", "b. Acute pancreatitis", "c. Mesenterial thrombo-embolism", "d. Side-effect of medication"], "a": "判別不能（要確認）（おそらく a〜d すべて該当）", "c": "abdomen", "k": "", "e": "麻痺性イレウス (paralytic ileus) は腸管運動の停止で起こり、腎結石による疝痛 (renal colic)、急性膵炎 (acute pancreatitis)、腸間膜血栓塞栓 (mesenteric thrombo-embolism)、薬剤の副作用（オピオイド・抗コリン薬など）のいずれも原因となりうる。a〜d 全てがハイライトされており、全選択肢が該当すると考えられる。単一解指定が読み取れないため要確認。", "src": "pp", "chk": 1}, {"id": "066-6", "t": "疾患診断のモダリティ選択の指導原則", "q": "Which are the guiding principles when it comes to choosing a modality to diagnose a disease?", "o": ["a. Modality having a high specificity", "b. Least invasive modality", "c. Available modality", "d. Most cost-effective modality"], "a": "a・b・c・d すべて（全て該当）", "c": "physics", "k": "", "e": "検査モダリティ選択の指導原則は、高い特異度 (high specificity)、より低侵襲 (least invasive)、利用可能性 (available)、費用対効果 (cost-effective) のすべてを総合的に考慮すること。本問は a〜d すべてがハイライトされており、全選択肢が正しい指導原則である。", "src": "pp"}, {"id": "082-1", "t": "CTにおける出血の経時的描出（Midterm-B Q1）", "q": "Chose the correct statement", "o": ["a. Fresh hemorrhage in CT is hypodense", "b. Chronic subdural hematoma in CT is hyperdense", "c. MR is capable to determine the approximal age of hemorrhage", "d. MR is not useful in identifying hemorrhage"], "a": "c. MR is capable to determine the approximal age of hemorrhage", "c": "neuro", "k": "c", "e": "MRIは血液分解産物（oxyhemoglobin→deoxyhemoglobin→methemoglobin→hemosiderin）の常磁性変化を反映し、T1/T2信号の経時変化から出血の時期（age of hemorrhage）を推定できる。新鮮出血 (fresh hemorrhage) はCTで高吸収 (hyperdense) であり (a) は誤り。慢性硬膜下血腫 (chronic subdural hematoma) はCTで低吸収 (hypodense) となるため (b) も誤り。MRは出血同定に非常に有用なので (d) も誤り。", "src": "pp", "trap": 1}, {"id": "082-2", "t": "Duplex超音波の定義（Midterm-B Q2）", "q": "Duplex ultrasonography", "o": ["a. Combination of two transducers to see blood vessesl both in superficial and deep locations", "b. Simultaneous doppler analysis of bilateral limbs by two sonographs", "c. 2D US examination, then doppler analysis by \"pencil\" probe", "d. Simultaneous 2D US with doppler sampling from the vessels specified on the 2D image"], "a": "d. Simultaneous 2D US with doppler sampling from the vessels specified on the 2D image", "c": "us", "k": "d", "e": "Duplex超音波 (duplex ultrasonography) はグレースケールの2D Bモード像と、その画面上で指定した血管からのドプラ (doppler) 解析を同時に行う検査である。2台のトランスデューサや別々のpencilプローブを使う方法ではないため (a)(c) は誤り。両側肢を2台で同時計測するものでもないので (b) も誤り。", "src": "pp"}, {"id": "082-3", "t": "FAST検査で確認するもの（Midterm-B Q3）", "q": "For what does a radiologist look for when performing a FAST-exam?", "o": ["a. Free abdominal fluid", "b. Gall bladder inflammation", "c. Kidney stones", "d. Cysts"], "a": "a. Free abdominal fluid", "c": "abdomen", "k": "a", "e": "FAST (Focused Assessment with Sonography for Trauma) は外傷患者でベッドサイドで行う迅速超音波で、腹腔内・心嚢内の遊離液 (free fluid)、すなわち出血を探す検査である。胆嚢炎 (b)、腎結石 (c)、嚢胞 (d) の評価が主目的ではない。", "src": "pp"}, {"id": "082-4", "t": "症候性骨腫瘍の第一選択モダリティ（Midterm-B Q4）", "q": "What is the first modality choice in symptomatic bone tumors?", "o": ["a. PET-CT", "b. Scintigraphy", "c. Conventional x-ray", "d. CT"], "a": "c. Conventional x-ray", "c": "msk", "k": "c", "e": "症候性骨腫瘍の評価はまず単純X線 (conventional x-ray) が第一選択で、病変の局在・辺縁・骨膜反応・基質などから良悪性をある程度判断できる。シンチグラフィ (b) は転移検索の感度は高いが特異度が低く第一選択ではない。CT/PET-CT (a)(d) はより精密な病期診断に用いられる二次的検査である。", "src": "pp"}, {"id": "082-5", "t": "腸重積の超音波サイン（Midterm-B Q5）", "q": "US sign of intussusception:", "o": ["a. \"target\" sign", "b. \"whirlpool\" sign", "c. \"psudokidney\" sign", "d. \"comet\" sign"], "a": "a. \"target\" sign", "c": "abdomen", "k": "a", "e": "腸重積 (intussusception) では同心円状に重なった腸管壁が超音波横断像で標的状 (target sign、別名 doughnut sign / bull's-eye sign) に描出される。whirlpool sign (b) は腸捻転、pseudokidney sign (c) は長軸像での所見、comet tail (d) はアーチファクトであり典型的な短軸サインではない。", "src": "pp", "trap": 1}, {"id": "082-6", "t": "MRスペクトロスコピーが有用な癌（Midterm-B Q6）", "q": "MR spectroscopy is a useful method in diagnosis of", "o": ["a. Renal cell cancer", "b. Ovarian cancer", "c. Testicular cancer", "d. Prostate cancer"], "a": "d. Prostate cancer", "c": "gu", "k": "d", "e": "MRスペクトロスコピー (MR spectroscopy, MRS) は組織内代謝物（choline、citrate等）の濃度を測定でき、前立腺癌 (prostate cancer) では citrate低下とcholine上昇の比から悪性を評価できる。脳・乳腺・前立腺腫瘍で特に有用であり、腎・卵巣・精巣癌 (a)(b)(c) は主たる適応ではない。", "src": "pp"}, {"id": "083-7", "t": "超急性期脳梗塞の所見（Midterm-B Q7）", "q": "Choose the correct statement regarding hyperacute cerebral infarcts", "o": ["a. Hyperdense media sign is always visible", "b. Hyperdense media sign is visible in 25-50% of the cases", "c. Hyperdense media sign is never visible", "d. Hyperdense media sign is visible in 10-15% of the cases"], "a": "b. Hyperdense media sign is visible in 25-50% of the cases", "c": "neuro", "k": "b", "e": "中大脳動脈高吸収サイン (hyperdense media/MCA sign) は血栓による動脈内血液の高吸収で、超急性期脳梗塞の早期CT所見だが全例ではなく約25-50%の症例でのみ認められる。常に見える (a) や決して見えない (c)、10-15% (d) は誤り。", "src": "pp", "trap": 1}, {"id": "083-8", "t": "頭蓋外頸動脈疾患の診断戦略（Midterm-B Q8）", "q": "What is the diagnostic strategy in extracranial carotid disease?", "o": ["a. Primary examination is DSA which is complemented by CTA or MRA, US is only for kids", "b. Primary examination is duplex US for screening and follow-up: problem solving advanced imaging for selected cases is CTA or MRA – catheter angiography (DSA) is mainly for therapeutic interventions", "c. US-guided puncture of the CCA and then directed angiography of the affected side", "d. Primary examination is CTA; MRA is only for iodine-sensitive patients; DSA for all patients preceding surgery and duplex US for post-surgical complications"], "a": "b. Primary examination is duplex US for screening and follow-up: problem solving advanced imaging for selected cases is CTA or MRA – catheter angiography (DSA) is mainly for therapeutic interventions", "c": "cardiovascular", "k": "b", "e": "頸動脈狭窄のスクリーニングと経過観察はduplex US (放射線・造影剤不要で安全) が第一選択で、必要例にCTA/MRA、DSA (catheter angiography) は治療的介入が主目的である。DSAを一次検査とする (a)(d) や、CCAを穿刺する侵襲的方法 (c) は適切でない。", "src": "pp"}, {"id": "083-9", "t": "大量胸水時の縦隔偏位（Midterm-B Q9）", "q": "In case of a huge left-sided pleural fluid collection the mediastinal complex will move:", "o": ["a. Moderately to the right side", "b. The mediastinal complex will stay in unchanged position", "c. Moderately to the left side", "d. Extensively to the left side"], "a": "a. Moderately to the right side", "c": "chest", "k": "a", "e": "大量胸水 (pleural fluid collection) は占拠性病変として働き、縦隔 (mediastinal complex) を胸水のある側と反対側へ押しやる。左大量胸水なら右へ偏位する。患側 (左) へ移動する (c)(d) は無気肺による牽引の所見であり、ここでは誤り。", "src": "pp", "trap": 1}, {"id": "083/084-11", "t": "表在軟部組織US用トランスデューサ（Midterm-B Q11）", "q": "The following transducer is used generally for superficial soft tissue US examinations", "o": ["a. 7,5-10 MHz convex", "b. 6-9 MHz phased-array", "c. 3,5-5 MHz convex", "d. 7,5-10 MHz linear"], "a": "d. 7,5-10 MHz linear", "c": "us", "k": "d", "e": "表在軟部組織には高周波 (7.5-10 MHz) のリニア (linear) プローブが用いられ、浅部の高い空間分解能が得られる。convex (a)(c) や phased-array (b) は深部・腹部・心臓向けで、表在評価には適さない。", "src": "pp", "trap": 1}, {"id": "084-12", "t": "慢性副鼻腔炎で評価する複合体（Midterm-B Q12）", "q": "How do you call the complex that should be evaluated in case of chronic sinusitis?", "o": ["a. Osteomeatal complex", "b. Ostiomeatal complex", "c. Ethmoidal complex", "d. Nasomeatal complex"], "a": "b. Ostiomeatal complex", "c": "neuro", "k": "b", "e": "慢性副鼻腔炎 (chronic sinusitis) では各副鼻腔が中鼻道へ排出する共通路である骨洞複合体 (ostiomeatal complex, OMC) の閉塞が病態の鍵で、CTで評価される。綴りの異なる (a) や存在しない複合体名 (c)(d) は誤り。", "src": "pp", "trap": 1}, {"id": "084-14", "t": "小腸イレウスを起こさない病態（FALSEを選ぶ）（Midterm-B Q14）", "q": "The following pathological conditions can generate small bowel ileus (only one answer is false, you have to choose the FALSE answer):", "o": ["a. Crohn´s disease", "b. Coecum tumor", "c. Strangulated hernia", "d. Thrombosis of the splenic vein"], "a": "d. Thrombosis of the splenic vein", "c": "abdomen", "k": "d", "e": "クローン病 (a)、盲腸腫瘍 (b)、絞扼性ヘルニア (c) はいずれも小腸閉塞・イレウスを起こしうる。脾静脈血栓症 (splenic vein thrombosis) は静脈系の問題で腸管腔の通過障害を直接起こさないため、これがFALSE（イレウスの原因にならない）として正解。", "src": "pp"}, {"id": "084-15", "t": "神経放射線学での正しい記述（Midterm-B Q15）", "q": "In neuroradiology", "o": ["a. MR has a superior ability in the imaging of the cranial bones", "b. MR images lack bone artifacts", "c. MR has the ability to distinguish calcifications", "d. MR cannot visualize white matter lesions"], "a": "b. MR images lack bone artifacts", "c": "mri", "k": "b", "e": "MRIは骨皮質からの信号がほとんどなく、CTで問題となる骨由来のビームハードニング等のアーチファクトが少ない（特に後頭蓋窩の評価に有利）。骨描出はCTが優れるため (a) は誤り、石灰化の検出はCTが得意で (c) も誤り、白質病変はMRの最も得意とする領域なので (d) も誤り。", "src": "pp"}, {"id": "084-16", "t": "間質性陰影の形態（Midterm-B Q16）", "q": "Interstitial shadows are", "o": ["a. Web-like", "b. Of vascular origin", "c. Patchy", "d. Common CT terminology for mesenteric fat"], "a": "a. Web-like", "c": "chest", "k": "a", "e": "肺の間質性陰影 (interstitial shadows) は網状・線状の網目状 (web-like / reticular) パターンを呈する。斑状 (patchy) (c) は肺胞性陰影に近く、血管由来 (b) や腸間膜脂肪の用語 (d) は間質性陰影の定義ではない。", "src": "pp"}, {"id": "085-2", "t": "腸重積の注腸整復の絶対禁忌（Midterm-A Q2）", "q": "Which of the following is an absolute contraindicated for enema reduction of an intussusception?", "o": ["a. Small amount of free fluid on utrasonography", "b. Signs of perforation (pneumoperitoneum, peritonitis)", "c. Small bowel allergy", "d. Iodine allergy"], "a": "b. Signs of perforation (pneumoperitoneum, peritonitis)", "c": "abdomen", "k": "b", "e": "腸重積の注腸整復 (enema reduction) は、穿孔 (pneumoperitoneum) や腹膜炎 (peritonitis) の所見があれば絶対禁忌で、加圧により症状が増悪する。少量の遊離液 (a) は相対的所見にとどまり、ヨードアレルギー (d) は水溶性・空気整復で回避でき絶対禁忌ではない。", "src": "pp"}, {"id": "085-3", "t": "MRI信号強度の正しい記述（Midterm-A Q3）", "q": "Choose the correct statement", "o": ["a. On T1 weighted images white mater has a higher signal intensity than grey matter", "b. On T1 weighted images white matter has a lower signal intensity than grey matter", "c. On T2 weighted images CSF has intermediate signal", "d. On T2 weighted images bones have the highest signal intensity"], "a": "a. On T1 weighted images white matter has a higher signal intensity than grey matter", "c": "mri", "k": "a", "e": "白質はミエリン（脂肪成分）が多くT1短縮するため、T1強調像で灰白質より高信号 (higher signal) を示す。したがって (b) は誤り。T2強調像でCSFは最も高信号で中間信号ではないので (c) も誤り、骨皮質はT2で低信号のため (d) も誤り。", "src": "pp", "trap": 1}, {"id": "085-4", "t": "脊椎損傷の分類モデル（Midterm-A Q4）", "q": "The vertebral column injuries are classified according to the \"model\" below", "o": ["a. David 3 column theory", "b. Denis spinal canal theory", "c. Davis spinal canal theory", "d. Denis 3 column theory"], "a": "d. Denis 3 column theory", "c": "msk", "k": "d", "e": "脊椎損傷の安定性評価は Denis の3支柱理論 (Denis 3 column theory)（前柱・中柱・後柱）で分類され、2柱以上の損傷で不安定とされる。考案者名や呼称の誤った (a)(b)(c) は誤り。", "src": "pp", "trap": 1}, {"id": "086-6", "t": "腎嚢胞性病変の分類システム（Midterm-A Q6）", "q": "The …….. classification system divides renal cyctic masses into five categories based on imaging characteristics on contrast-enhanced CT", "o": ["a. Bi-rads", "b. Ren-Rads", "c. Li-Rads", "d. Bosniak"], "a": "d. Bosniak", "c": "gu", "k": "d", "e": "Bosniak分類は造影CT所見に基づき腎嚢胞性腫瘤を5カテゴリーに分け、悪性リスクと経過観察・治療方針を示す。BI-RADS (a) は乳腺、LI-RADS (c) は肝の分類で、Ren-Rads (b) は架空の名称である。", "src": "pp", "trap": 1}, {"id": "086-7", "t": "MRスペクトロスコピーが有用な癌（Midterm-A Q7）", "q": "MR spectroscopy is a useful method in the diagnosis of", "o": ["a. Renal cell cancer", "b. Ovarian cancer", "c. Testicular cancer", "d. Prostate cancer"], "a": "d. Prostate cancer", "c": "gu", "k": "d", "e": "MRS (MR spectroscopy) は前立腺癌 (prostate cancer) で citrate低下とcholine上昇の代謝変化を評価でき有用である。腎・卵巣・精巣癌 (a)(b)(c) は主たる適応ではない。", "src": "pp"}, {"id": "086-8", "t": "舌骨上頸部の中央（脂肪）コンパートメント（Midterm-A Q8）", "q": "What is the central (\"fatty\") compartment of the suprahyoid neck?", "o": ["a. Anterior cervical space", "b. Pharyngeal mucosal space", "c. Masticator space", "d. Parapharyngeal space"], "a": "d. Parapharyngeal space", "c": "neuro", "k": "d", "e": "傍咽頭間隙 (parapharyngeal space) は舌骨上頸部の中央に位置する脂肪に富む間隙で、周囲の病変による偏位の方向が局在診断の手がかりになる。前頸間隙 (a) は舌骨下、咽頭粘膜間隙 (b)・咀嚼筋間隙 (c) は脂肪性の中心区画ではない。", "src": "pp", "trap": 1}, {"id": "086/087-10", "t": "新生児イレウスの正しい記述（Midterm-A Q10）", "q": "In case of ileus in newborns", "o": ["a. We can make the diagnosis based only on abdominal x-ray", "b. Meconium ileus is caused by impacted thick meconium in children suffering from CF.", "c. Hirschsprung´s disease never causes ileus in newborn.", "d. Ileum atresia never occurs with non-used colon, because it is a disease of the small bowel, not the colon."], "a": "b. Meconium ileus is caused by impacted thick meconium in children suffering from CF.", "c": "abdomen", "k": "b", "e": "胎便性イレウス (meconium ileus) は嚢胞性線維症 (cystic fibrosis, CF) で粘稠な胎便が回腸末端に嵌頓して起こる。診断はX線のみでは不十分で造影注腸等を要するため (a) は誤り、Hirschsprung病は新生児イレウスを起こしうるので (c) も誤り、回腸閉鎖では未使用の細い結腸 (microcolon) を伴うため (d) も誤り。", "src": "pp"}, {"id": "087-11", "t": "中等量右胸水時の縦隔偏位（Midterm-A Q11）", "q": "In case of a moderate amount of right sided pleural fluid collection the mediastinal complex will move", "o": ["a. Moderately to the right side", "b. Stay in unchanged position", "c. Moderately to the left side", "d. Extensively to the left side"], "a": "c. Moderately to the left side", "c": "chest", "k": "c", "e": "胸水は占拠性に働き縦隔を対側へ押すため、右胸水では縦隔は左へ偏位する。量が中等度なら中等度の偏位 (moderately) で、患側 (右) への偏位 (a) や偏位なし (b)、過度の偏位 (d) は当てはまらない。", "src": "pp", "trap": 1}, {"id": "087-12", "t": "縦隔・後腹膜リンパ節の最適画像法（Midterm-A Q12）", "q": "For the mediastinal and retroperitoneal lymph nodes the most acceptable imaging method is:", "o": ["a. US", "b. CT examination", "c. Scintigraphy", "d. Chest x-ray (two views)"], "a": "b. CT examination", "c": "chest", "k": "b", "e": "深部にある縦隔・後腹膜リンパ節は超音波 (a) では描出困難で、CTが位置と性状の評価に最適である。胸部X線 (d) は重なりで感度が低く、シンチグラフィ (c) は解剖学的分解能に劣る。", "src": "pp"}, {"id": "088-14", "t": "慢性副鼻腔炎で評価する複合体（Midterm-A Q14）", "q": "How do you call the complex that should be evaluated in case of chronic sinusitis?", "o": ["a. Osteomeatal complex", "b. Ostimeatal complex", "c. Ethmoidal complex", "d. Nasomeatal complex"], "a": "b. Ostimeatal complex", "c": "neuro", "k": "b", "e": "慢性副鼻腔炎では骨洞複合体 (ostiomeatal complex, OMC) の閉塞が病態の中心で、CTで評価する（選択肢bが意図された OMC の綴り）。他の複合体名 (a)(c)(d) は誤りまたは別概念である。", "src": "pp", "trap": 1}, {"id": "088-16", "t": "血管造影で必須でない器具（FALSEを選ぶ）（Midterm-A Q16）", "q": "These devices are mandatory during angiography. Mark the FALSE one", "o": ["a. Ballon catheter", "b. 4F catheter", "c. seldinger needle", "d. Guide wire"], "a": "a. Ballon catheter", "c": "cardiovascular", "k": "a", "e": "血管造影 (angiography) ではSeldinger針 (c)、ガイドワイヤー (d)、カテーテル (b) が必須だが、バルーンカテーテル (balloon catheter) は血管形成術など治療で用いるもので診断的血管造影に必須ではない。よってこれがFALSE（必須でない）として正解。", "src": "pp"}, {"id": "088-17", "t": "腹部単純X線で透過性（非不透過）の腎結石（Midterm-A Q17）", "q": "Which type of renal stone is radiolucent (non opaque) on abdominal plain radiography?", "o": ["a. Urine acid", "b. Sturvite", "c. Calcium phosphate", "d. Calcium oxalate"], "a": "a. Urine acid", "c": "gu", "k": "a", "e": "尿酸結石 (uric acid stone) はカルシウムを含まずX線透過性 (radiolucent) で単純X線に写りにくい。ストルバイト (b)、リン酸カルシウム (c)、シュウ酸カルシウム (d) はいずれも不透過性 (radiopaque) で描出される。", "src": "pp", "trap": 1}, {"id": "089-1", "t": "腹腔内腹水の描出に有用でない手法（FALSEを選ぶ）（Midterm-C Q1）", "q": "Which image technique is useful to demonstrate ascites in the abdominal cavity? (choose the false)", "o": ["a. Abdominal US", "b. Abdominal CT", "c. Abdominal CT and US examination", "d. Scintigraphy"], "a": "d. Scintigraphy", "c": "abdomen", "k": "d", "e": "腹水 (ascites) は超音波やCTで明瞭に描出される。シンチグラフィ (scintigraphy) は機能・代謝を反映する核医学検査で液体貯留の描出には適さないため、これが「有用でない（false）」として正解。", "src": "pp", "trap": 1}, {"id": "089-2", "t": "硬膜下血腫のCT形状（Midterm-C Q2）", "q": "Subdural hematoma appears on CT examination usually with:", "o": ["a. Amorf contours", "b. Ring shaped", "c. Crescent shaped", "d. Lense shaped"], "a": "c. Crescent shaped", "c": "neuro", "k": "c", "e": "硬膜下血腫 (subdural hematoma) は脳表に沿って広がり、CTで三日月状 (crescent shaped) を呈し縫合線を越える。両凸レンズ状 (lens shaped) (d) は硬膜外血腫の特徴で、リング状 (b) や不整形 (a) は典型像ではない。", "src": "pp"}, {"id": "089-3", "t": "腸重積の超音波サイン（Midterm-C Q3）", "q": "US sign of intussusception?", "o": ["a. \"Target\" sign", "b. \"Whirlpool\" sign", "c. \"Pseudokidney\" sign", "d. \"Comet\" sign"], "a": "a. \"Target\" sign", "c": "abdomen", "k": "a", "e": "腸重積 (intussusception) は同心円状の腸管壁により短軸で標的状 (target sign / doughnut sign) を示す。whirlpool (b) は腸捻転、pseudokidney (c) は長軸像、comet (d) はアーチファクトであり、代表的な短軸サインは target sign。", "src": "pp", "trap": 1}, {"id": "089-4", "t": "拍動性後頭部頭痛の若年女性の第一選択画像（Midterm-C Q4）", "q": "a young 30 year old female was admitted for the emergency department with a strong \"beating-like\" occipital headache. What is the first imaging method in this case?", "o": ["a. MR", "b. Skull x-ray, two view", "c. Native CT of the brain", "d. Color-duplex carotid US"], "a": "c. Native CT of the brain", "c": "neuro", "k": "c", "e": "突然の強い拍動性頭痛 (thunderclap headache) はくも膜下出血 (subarachnoid hemorrhage) を疑い、急性出血の検出には単純CT (native CT) が第一選択で迅速かつ高感度である。MR (a) は急性出血に劣り時間もかかり、頭蓋単純X線 (b)・頸動脈US (d) はこの病態に不適。", "src": "pp"}, {"id": "089/090-5", "t": "大量左胸水時の縦隔偏位（Midterm-C Q5）", "q": "In case of a huge left-sided pleural fluid collection, the mediastinal complex will move:", "o": ["a. Moderately to the right", "b. The mediastinal complex will stay in unchanged position", "c. Moderately to the left", "d. Extensively to the left"], "a": "a. Moderately to the right", "c": "chest", "k": "a", "e": "左胸水は縦隔を対側 (右) へ押しやる。患側 (左) への偏位 (c)(d) は無気肺による牽引の所見で、ここでは当てはまらない。偏位なし (b) も誤り。", "src": "pp", "trap": 1}, {"id": "090-6", "t": "縦隔・後腹膜リンパ節の最適画像法（Midterm-C Q6）", "q": "For the mediastinal and retroperitoneal lymph nodes, the most acceptable imaging method is:", "o": ["a. US", "b. CT examination", "c. Scintigraphy", "d. Chest X-ray (two views)"], "a": "b. CT examination", "c": "chest", "k": "b", "e": "深部の縦隔・後腹膜リンパ節は超音波 (a) では評価困難で、CTが位置・性状の評価に最適。胸部X線 (d) は重なりで感度が低く、シンチグラフィ (c) は解剖学的分解能に劣る。", "src": "pp"}, {"id": "090-7", "t": "成人腹部US用トランスデューサ（Midterm-C Q7）", "q": "The following transducer is used generally for adults abdominal US examination:", "o": ["a. 7,5-10 MHz convex", "b. 6-9 MHz phased-array", "c. 3,5-5 MHz convex", "d. 7,5-10 MHz linear"], "a": "c. 3,5-5 MHz convex", "c": "us", "k": "c", "e": "成人腹部超音波には深部到達のため低めの周波数 (3.5-5 MHz) のコンベックス (convex) プローブを用いる。高周波プローブ (a)(d) は表在向けで深部penetrationが不十分、phased-array (b) は心臓向けである。", "src": "pp", "trap": 1}, {"id": "090-8", "t": "虫垂炎を描出できない方法（exceptを選ぶ）（Midterm-C Q8）", "q": "Appendicitis can be visualized with the following imaging methods, except:", "o": ["a. With native and contract enhanced CT", "b. With US examination", "c. With P-A abdominal x-ray", "d. With US and abdominal CT examination"], "a": "c. With P-A abdominal x-ray", "c": "abdomen", "k": "c", "e": "虫垂炎 (appendicitis) はCT（最も高感度）やUS（特に若年者）で描出できる。P-A腹部単純X線 (c) は虫垂自体や炎症を直接描出できず、これが「描出できない（except）」として正解。", "src": "pp"}, {"id": "090/091-11", "t": "甲状腺結節生検のガイド法（Midterm-C Q11）", "q": "Which guidance technique is mainly useful for the biopsy of thyroid nodule?", "o": ["a. X-ray guided biopsy", "b. US-guided biopsy", "c. CT-guided biopsy", "d. MR-guided biopsy"], "a": "b. US-guided biopsy", "c": "us", "k": "b", "e": "甲状腺は表在臓器で、超音波ガイド下生検 (US-guided biopsy) がリアルタイムに針先を確認でき被ばくもなく最適である。X線 (a)・CT (c)・MR (d) ガイドは表在の甲状腺穿刺には過剰・不適。", "src": "pp", "trap": 1}, {"id": "091-12", "t": "単純肝嚢胞の内部性状（Midterm-C Q12）", "q": "In case of a simple liver cyst (with 25 mm diameter, without irregular wall and without septations), how would we characterize the inner content of the cyst?", "o": ["a. Hypoechoic", "b. Anechoic", "c. Hyperechoic", "d. Hyperdense"], "a": "b. Anechoic", "c": "abdomen", "k": "b", "e": "単純嚢胞 (simple cyst) は均一な液体で満たされ、超音波で内部エコーのない無エコー (anechoic) を呈し、後方エコー増強を伴う。低エコー (a) は内部にわずかなエコーがある場合、高エコー (c) や高吸収 (d、CT用語) は嚢胞内容の特徴ではない。", "src": "pp", "trap": 1}, {"id": "091-13", "t": "縦隔拡大の原因でないもの（FALSEを選ぶ）（Midterm-C Q13）", "q": "In case of widening of the mediastinum, what pathological process could be the case of this alteration: choose the false answer", "o": ["e. Lymphoma", "f. Aneurysm of the descending aorta", "g. Calcified pleural callus", "h. Hilar pulmonary neoplasia"], "a": "g. Calcified pleural callus", "c": "chest", "k": "", "e": "縦隔拡大 (widening of the mediastinum) はリンパ腫 (e)、下行大動脈瘤 (f)、肺門腫瘍 (h) など縦隔の腫瘤・血管病変で生じる。石灰化した胸膜胼胝 (calcified pleural callus) は胸膜の限局性変化で縦隔拡大を起こさないため、これがFALSEとして正解。", "src": "pp"}, {"id": "091-15", "t": "肺膿瘍の胸部X線所見（Midterm-C Q15）", "q": "Pulmonary abscess usually appears on the chest c-ray with", "o": ["a. Lower transparency crescent shaped", "b. Lower transparency ring shaped with inner fluid level", "c. Lower transparency lense shaped", "d. Lower transparency wedge shape"], "a": "b. Lower transparency ring shaped with inner fluid level", "c": "chest", "k": "b", "e": "肺膿瘍 (pulmonary abscess) は壁が厚い空洞 (ring shaped) を形成し、内部に気液面 (air-fluid level) を伴うのが典型的である。三日月状 (a)、レンズ状 (c)、楔状 (d) は膿瘍の典型像ではない。", "src": "pp", "trap": 1}, {"id": "092-17", "t": "硬膜外出血に特徴的な形状（Midterm-C Q17）", "q": "Which shape is generally characteristic in case of epidural bleeding", "o": ["a. Crescent", "b. Amorph", "c. Lentiform", "d. Not detectable"], "a": "c. Lentiform", "c": "neuro", "k": "c", "e": "硬膜外血腫 (epidural hematoma) は硬膜が縫合部で固着しているため両凸レンズ状 (lentiform / biconvex) を呈し縫合線を越えない。三日月状 (crescent) (a) は硬膜下血腫の特徴で、本問では誤り。", "src": "pp", "trap": 1}, {"id": "092-19", "t": "造影CT前に補液が不要となるGFR値（Midterm-C Q19）", "q": "In case of the following GFR value the patient DOES NOT need hydration prior to an IV contrast enhanced CT examination:", "o": ["a. GFR is below 30 ml/min/1.73m2", "b. GFR is above 40 ml/min/1.73m2", "c. GFR is below 60 ml/min/1.73m2", "d. GFR is above 60 ml/min/1.73 m2"], "a": "d. GFR is above 60 ml/min/1.73 m2", "c": "safety", "k": "d", "e": "GFRが60 ml/min/1.73m²以上であれば腎機能が保たれ造影腎症のリスクが低く、造影前の補液 (hydration) は不要である。60未満 (a)(c) では腎保護目的の補液が推奨され、40以上 (b) という閾値は基準として不適切。", "src": "pp", "trap": 1}, {"id": "093-22", "t": "立位腹部単純X線での消化管穿孔の特徴的所見（Midterm-C Q22）", "q": "Patognomic sign of GI tract perforation in an erect plain abdominal radiograph:", "o": ["a. Oral contrast material depicted in the duodenum", "b. Colon cut-of sign", "c. Broad air-fluid level in the transverse colon", "d. Crescent translucency under the dome of the hemidiaphragm"], "a": "d. Crescent translucency under the dome of the hemidiaphragm", "c": "abdomen", "k": "d", "e": "消化管穿孔では遊離ガス (free air) が立位で横隔膜ドーム下に集まり、三日月状の透亮像 (crescent translucency / subdiaphragmatic free air) として写るのが特徴的所見である。十二指腸の造影剤 (a)、colon cut-off (b)、横行結腸の気液面 (c) は穿孔の特異的サインではない。", "src": "pp"}, {"id": "093-23", "t": "二重造影注腸検査で誤った記述（FALSEを選ぶ）（Midterm-C Q23）", "q": "Which statement is false about double contrast bowel examination", "o": ["a. Smear mucosa with barium-containing contrast agent.", "b. Distend the lumen with gas, which is a positive contrast media, because of decreasing transparency.", "c. Relax bowel walls with smooth muscle relaxant", "d. Depiction: luminal contour, mucosal relief"], "a": "b. Distend the lumen with gas, which is a positive contrast media, because of decreasing transparency.", "c": "abdomen", "k": "b", "e": "二重造影 (double contrast) では空気は陰性造影剤 (negative contrast、透過性を上げる) であり、「陽性造影剤で透過性を下げる」とする記述は誤り。バリウムで粘膜を被覆 (a)、平滑筋弛緩薬で腸管を弛緩 (c)、管腔輪郭と粘膜レリーフを描出 (d) は正しい。", "src": "pp"}, {"id": "094-28", "t": "脳卒中の治療方針を決める所見（Midterm-C Q28）", "q": "In case of stroke, treatment strategy is primarily based on the following findings:", "o": ["a. Localization of the lesion (infra- or supratentorial)", "b. Unilateral or bilateral lesion", "c. Presence of oedema", "d. Presence of hemorrhage"], "a": "d. Presence of hemorrhage", "c": "neuro", "k": "d", "e": "脳卒中 (stroke) ではまず出血か梗塞かの鑑別が治療を左右する。出血 (hemorrhage) があれば血栓溶解療法は禁忌となるため、出血の有無が最重要である。病変の局在 (a)、片側/両側 (b)、浮腫の有無 (c) は治療方針の第一決定要因ではない。", "src": "pp", "trap": 1}, {"id": "094-29", "t": "抗菌薬で消退しない肺浸潤影で考える疾患（Midterm-C Q29）", "q": "If a pulmonary infiltrate DOES NOT resolve over time despite treatment with antimicrobial agents, think of….", "o": ["a. Broncho-alveolar subtype of lung cancer", "b. Supraglottic cancer of larynx", "c. Boeck sarcoidosis", "d. Presence of mycoplasma or klebsiella", "e. Pleural adhesions"], "a": "a. Broncho-alveolar subtype of lung cancer", "c": "chest", "k": "a", "e": "抗菌薬で消退しない持続性の肺浸潤影 (non-resolving infiltrate) は、肺炎様に見える細気管支肺胞型肺癌 (bronchoalveolar carcinoma、現:浸潤性粘液性腺癌) を考える典型である。マイコプラズマやクレブシエラ (d) は抗菌薬に反応しうる感染で、他の選択肢はこの所見の代表的原因ではない。", "src": "pp"}, {"id": "094/095-32", "t": "30mm胆嚢結石の描出で誤った記述（FALSEを選ぶ）（Midterm-C Q32）", "q": "How could we demonstrate a calcified stone in the gallbladder, with 30 mm in diameter (choose the false statement)", "o": ["a. Angiography", "b. US", "c. Native abdominal CT", "d. With P-A abdominal x-ray"], "a": "a. Angiography", "c": "abdomen", "k": "a", "e": "胆嚢結石 (gallbladder stone) は超音波（音響陰影を伴う高エコー）、単純CT、石灰化していれば腹部単純X線でも描出されうる。血管造影 (angiography) は血管腔の検査で結石描出には不適であり、これが「誤った（false）」選択肢として正解。", "src": "pp"}, {"id": "095-33", "t": "機能的でないX線検査（Midterm-C Q33）", "q": "Which is not a functional x-ray examination", "o": ["a. Swallow examination", "b. Fistulography of the liver (???)", "c. Bedside A-P view chest x-ray", "d. Barium enema study (irrigoscopy)"], "a": "c. Bedside A-P view chest x-ray", "c": "xray", "k": "c", "e": "嚥下造影 (a)、瘻孔造影 (b)、注腸造影 (d) は動的・機能的な情報（通過、走行、運動）を評価する機能的X線検査である。ベッドサイドのA-P胸部単純X線 (c) は静的な一枚撮影で機能的検査ではないため、これが正解。", "src": "pp"}, {"id": "095-37", "t": "左側気胸時の縦隔の動き（Midterm-C Q37）", "q": "In case of a left sided PTX the mediastinal complex will move:", "o": ["a. Moderately to the left side", "b. The mediastinal complex will stay in unchanged position", "c. Extensively to the right side", "d. Extensively to the left side"], "a": "b. The mediastinal complex will stay in unchanged position", "c": "chest", "k": "b", "e": "単純気胸 (simple pneumothorax, PTX) では通常、縦隔の偏位は生じず位置はほぼ不変である（緊張性気胸でのみ対側へ偏位する）。本問は単純気胸を前提とするため偏位なし (b) が正解で、左右への偏位 (a)(c)(d) は当てはまらない。", "src": "pp", "trap": 1}, {"id": "096-1", "t": "頸部腫瘤の第一選択画像検査", "q": "What is the first chosen imaging method in case of neck nodule?", "o": ["a. Swallow x-ray examination", "b. US", "c. MR", "d. CT"], "a": "b. US", "c": "neuro", "k": "b", "e": "頸部腫瘤 (neck nodule) は表在性であり、超音波 (ultrasound, US) は被曝がなく低コストで、嚢胞性か充実性かの鑑別やリンパ節評価に優れるため第一選択となる。MRやCTは超音波で評価が不十分な場合や深部・進展評価の二次的検査である。嚥下造影 (swallow x-ray) は咽喉頭の機能・通過評価に用いるもので腫瘤の第一選択ではない。", "src": "pp"}, {"id": "096-2", "t": "反復する右肋骨下部痛の第一画像検査", "q": "In case of recurring right subcostal pain, the first imaging method is:", "o": ["a. Abdominal CT", "b. MR", "c. Abdominal US", "d. Scintigraphy"], "a": "c. Abdominal US", "c": "abdomen", "k": "c", "e": "右肋骨下部 (right subcostal) の痛みは肝臓・胆嚢・胆道系を疑い、腹部超音波 (abdominal US) は胆石 (gallstone) や胆嚢炎の評価に優れ、被曝がなく安価なため第一選択となる。CTやMRは超音波で診断がつかない場合の精査に用いる。シンチグラフィ (scintigraphy) は機能評価が主で初期スクリーニングには適さない。", "src": "pp", "trap": 1}, {"id": "096-3", "t": "肺塞栓症が疑われる際の信頼できる画像法", "q": "Which is reliable imaging method in a suspicion of pulmonary embolism?", "o": ["a. Transesophageal US", "b. P-A chest x-ray", "c. Pulmonary CT-angiography", "d. Fluoroscopy of the chest"], "a": "c. Pulmonary CT-angiography", "c": "cardiovascular", "k": "c", "e": "肺塞栓症 (pulmonary embolism, PE) の診断のゴールドスタンダードは造影CT肺動脈造影 (pulmonary CT-angiography, CTPA) であり、肺動脈内の血栓による造影欠損を直接描出できる。胸部単純X線 (chest x-ray) はしばしば異常を示すが非特異的で除外には不十分である。経食道超音波や透視は肺動脈塞栓の評価には適さない。", "src": "pp"}, {"id": "096-4", "t": "小腸イレウスを起こす炎症性疾患", "q": "What kind of inflammatory conditions can cause small bowel ileus:", "o": ["a. Crohn's disease", "b. Diverticulitis", "c. Bowel tuberculosis", "d. All of the above"], "a": "d. All of the above", "c": "abdomen", "k": "d", "e": "クローン病 (Crohn's disease)、憩室炎 (diverticulitis)、腸結核 (bowel tuberculosis) はいずれも炎症性過程により腸管の浮腫・狭窄・運動低下を引き起こし、小腸イレウス (small bowel ileus) の原因となる。したがって全てが正しく「All of the above」が正解となる。", "src": "pp"}, {"id": "097-1", "t": "典型的な肝血管腫の遅延相での見え方", "q": "In case of typical liver hemangiomas, how can we characterize the mass?", "o": ["e. Well rounded, hypoechoic", "f. Well rounded, anechoic", "g. Well rounded, hyperechoic", "h. Well rounded, hyperdense"], "a": "g. Well rounded, hyperechoic", "c": "abdomen", "k": "", "e": "典型的な肝血管腫 (liver hemangioma) は超音波で境界明瞭・整な高エコー (hyperechoic) の結節として描出される。これは多数の血管腔内に血液が満たされているためで、辺縁部から中心へ向かう造影パターンを示す。低エコー・無エコーは嚢胞などを示唆し、hyperdense はCTの濃度表現で本問のエコー所見の問いには合致しない。", "src": "pp", "trap": 1}, {"id": "097-2", "t": "CT造影剤を避けるべき患者の病態", "q": "IV contrast material should be avoided at CT examinations when the patient suffers from:", "o": ["a. Manifest hypothyroidism", "b. Severe lower extremity atherosclerotic disease", "c. Manifest hyperthyroidism", "d. Multinodular goiter"], "a": "d. Multinodular goiter", "c": "safety", "k": "d", "e": "ヨード造影剤 (iodinated contrast) はヨード負荷により甲状腺ホルモン産生を増加させ、特に多結節性甲状腺腫 (multinodular goiter) の患者では自律性結節からヨード誘発性甲状腺機能亢進症 (iodine-induced hyperthyroidism) を生じるリスクが高い。これは数日から数週間遅れて発症することがある。なお顕性甲状腺機能亢進症 (manifest hyperthyroidism) も禁忌だが、本スライドではmultinodular goiterが正解として示されている。", "src": "pp", "trap": 1}, {"id": "097-3", "t": "脾腫瘍の血流評価に有用な画像法", "q": "Which imaging technique is useful to demonstrate the vascularity of a splenic tumor?", "o": ["a. Color-duplex abdominal US", "b. Multiphasic contrast enhanced abdominal CT", "c. A-P abdominal x-ray", "d. Contrast enhanced abdominal MR"], "a": "b. Multiphasic contrast enhanced abdominal CT", "c": "abdomen", "k": "b", "e": "多時相造影CT (multiphasic contrast enhanced CT) は動脈相・門脈相・遅延相を撮影することで、脾腫瘍の血流動態 (vascularity) と造影パターンを詳細に評価でき、病変の性状診断に有用である。カラードプラ超音波も血流評価可能だが、脾深部腫瘍の血流動態評価には多時相CTがより信頼性が高い。単純X線は軟部組織の血流評価には無力である。", "src": "pp", "trap": 1}, {"id": "097-4", "t": "「病的骨折」とみなされる骨折タイプ", "q": "Which of the following fracture type is considered as \"pathological fracture\"?", "o": ["a. Fatigue fractures of athletes", "b. Facture of bones weakened by a tumor, inflammation or cyct", "c. All type of vertebral facture", "d. Fractures due to osteoporosis"], "a": "b. Fracture of bones weakened by a tumor, inflammation or cyst; d. Fractures due to osteoporosis", "c": "msk", "k": "b", "e": "病的骨折 (pathological fracture) とは、腫瘍・炎症・嚢胞 (tumor, inflammation or cyst) や骨粗鬆症 (osteoporosis) などにより基礎疾患で脆弱化した骨が、正常では骨折しない程度の軽微な外力で折れるものを指す。本スライドではbとdの両方が正解として示されている。疲労骨折 (fatigue fracture) は正常骨への反復負荷によるもので病的骨折とは区別される。", "src": "pp"}, {"id": "097-5", "t": "アイソトープ検査で患者に投与される物質", "q": "What kind of material is administered to the patient during an isotope examination?", "o": ["a. Contrast media", "b. Isopharmacon", "c. Gadolinium", "d. Radiopharmacon"], "a": "d. Radiopharmacon", "c": "nuclear", "k": "d", "e": "核医学のアイソトープ検査では放射性医薬品 (radiopharmacon / radiopharmaceutical) を投与する。これは標的臓器・機能に特異的な分子に放射性同位元素を標識したもので、体内分布をガンマカメラ等で検出する。造影剤 (contrast media) やガドリニウム (gadolinium) はそれぞれCT・MRIで用いる薬剤でアイソトープ検査では用いない。", "src": "pp", "trap": 1}, {"id": "097-6", "t": "頭頸部MRIの計画として不適切な適応", "q": "Which of the following indications is inadequate planning an MRI in head and neck region?", "o": ["a. Evaluation of perineural tumor spread", "b. Bony skullbase evaluation in suspicion of bony fracture owing to an injury", "c. Cartilage infiltration of the larynx", "d. Proving soft tissue involvement of suprahyoid compartments", "e. Posttherapeutic differentiation between recidive tumor and scar tissue"], "a": "b. Bony skullbase evaluation in suspicion of bony fracture owing to an injury", "c": "neuro", "k": "b", "e": "MRIは軟部組織のコントラスト分解能に優れる一方、皮質骨 (cortical bone) の評価は苦手である。外傷による頭蓋底の骨折 (bony fracture) の評価にはCTが適しており、MRIは不適切である。神経周囲進展、喉頭軟骨浸潤、軟部組織進展、治療後の再発腫瘍と瘢痕の鑑別はいずれもMRIの良い適応である。", "src": "pp"}, {"id": "098-1", "t": "腎細胞癌診断のゴールドスタンダード", "q": "\"Gold standard\" method currently in the diagnosis of renal cell cancer", "o": ["a. HRCT", "b. Transabdominal US", "c. Unenhanced abdominal CT examination", "d. IV urography", "e. Contrast enhanced multiphasic abdominal CT"], "a": "e. Contrast enhanced multiphasic abdominal CT", "c": "gu", "k": "e", "e": "腎細胞癌 (renal cell carcinoma) 診断のゴールドスタンダードは多時相造影腹部CT (contrast enhanced multiphasic abdominal CT) である。皮髄相・腎実質相・排泄相で腫瘍の造影パターンを評価し、性状診断と病期診断 (staging) が可能となる。超音波はスクリーニングに有用だが確定診断には劣り、単純CTや排泄性尿路造影では十分な性状評価ができない。", "src": "pp", "trap": 1}, {"id": "098-2", "t": "腋窩・鎖骨上リンパ節腫大の第一画像検査", "q": "In case of enlarged axillary and supraclavicular lymph nodes the first imaging method is:", "o": ["a. CT", "b. MR", "c. US", "d. Scintigraphy"], "a": "c. US", "c": "us", "k": "c", "e": "腋窩・鎖骨上リンパ節 (axillary and supraclavicular lymph nodes) は表在性であり、超音波 (US) は被曝なく高分解能で腫大リンパ節の大きさ・形態・内部構造を評価でき、超音波ガイド下生検も可能なため第一選択である。CTやMRは深部や全身評価が必要な場合の二次検査となる。", "src": "pp"}, {"id": "098-3", "t": "単純腎嚢胞の内容の超音波での見え方", "q": "In case of a simple renal cyst (with 25 mm diameter, without irregular wall and without septations), how could we characterize the inner content of the cyst?", "o": ["a. Hypoechoic", "b. Anechoic", "c. Hyperechoic", "d. Hyperdense"], "a": "b. Anechoic", "c": "gu", "k": "b", "e": "単純腎嚢胞 (simple renal cyst) は均一な漿液で満たされ、超音波では内部に反射体がないため無エコー (anechoic、黒く描出) を示し、後方エコー増強を伴う。隔壁や不整な壁がないことが良性の単純嚢胞の特徴である。低エコーや高エコーは充実成分や複雑嚢胞を示唆し、hyperdense はCTの表現である。", "src": "pp", "trap": 1}, {"id": "098-4", "t": "機能的画像法でないモダリティ", "q": "Which of the following modalities is not a functional imaging method:", "o": ["a. Scintigarphy", "b. PET", "c. Mammography", "d. SPECT"], "a": "c. Mammography", "c": "nuclear", "k": "c", "e": "マンモグラフィ (mammography) は乳房の形態を描出する純粋な形態画像 (morphological imaging) であり、機能的画像法ではない。シンチグラフィ、PET、SPECTはいずれも放射性医薬品の集積から代謝・血流・機能などの生理的情報を画像化する機能的画像法 (functional imaging) である。", "src": "pp", "trap": 1}, {"id": "098-5", "t": "注腸検査の前に強く推奨される検査", "q": "Which investigation is stongly recommended before doing a barium enema?", "o": ["a. Pelvic US", "b. Cystoscopy", "c. Rectoscopy", "d. Barium follow-through", "e. Urography"], "a": "c. Rectoscopy", "c": "abdomen", "k": "c", "e": "注腸造影 (barium enema) の前には直腸鏡検査 (rectoscopy) が推奨される。これは注腸では評価が難しい直腸下部の病変を直接観察し、また穿孔リスクのある病変や禁忌の有無を確認するためである。膀胱鏡・尿路造影は泌尿器系の検査で大腸検査前の準備とは無関係である。", "src": "pp", "trap": 1}, {"id": "098-6", "t": "鈍的腹部外傷で脊椎に圧迫され損傷しやすい臓器", "q": "Which organ would you put in this sentence: the ...... body is the most common portion of this organ to be injured in blunt trauma because they are compressed against the spine in blunt traumatic injuries to the abdomen", "o": ["a. Gall-bladder", "b. Bladder", "c. Pancreas", "d. Liver", "e. Aorta"], "a": "c. Pancreas", "c": "abdomen", "k": "c", "e": "膵臓 (pancreas) は後腹膜に位置し、その体部 (body) が脊椎の前方を横切るため、鈍的腹部外傷 (blunt abdominal trauma) では脊椎に圧迫されて膵体部が損傷を受けやすい。典型的にはハンドルやシートベルトによる上腹部への直達外力で生じる。他の臓器も外傷を受けうるが「脊椎への圧迫」という機序に最も合致するのは膵臓である。", "src": "pp", "trap": 1}, {"id": "098-7", "t": "腹部CT評価の最適ウィンドウ設定", "q": "To evaluate an abdominal CT, the optimal windowing setting is..../on the HU-scale? (WL=window level, WW=window width)", "o": ["a. WL=-600 HU, WW=1600 HU", "b. WL=800 HU, WW=2000 HU", "c. WL=60 HU, WW=360 HU", "d. WL= 0 HU, WW=200 HU"], "a": "c. WL=60 HU, WW=360 HU", "c": "ct", "k": "c", "e": "腹部の軟部組織 (soft tissue) のCT値は概ね数十HU前後に分布するため、軟部組織ウィンドウとしてウィンドウレベル (WL) 約40〜60 HU、ウィンドウ幅 (WW) 約350〜400 HUが最適である。WL=-600/WW=1600は肺ウィンドウ、広すぎたり狭すぎる設定では腹部実質臓器のコントラストが適切に得られない。", "src": "pp", "trap": 1}, {"id": "099-1", "t": "開腹術後の合併症となりうるもの", "q": "Which of the followings can be complications after an operation", "o": ["a. Ileus caused by adhesions", "b. Abscess", "c. Stress ulcus", "d. Insufficiency of the suture"], "a": "a, b, c, d（すべて）", "c": "abdomen", "k": "", "e": "術後合併症 (postoperative complications) には、癒着によるイレウス (ileus caused by adhesions)、膿瘍 (abscess)、ストレス潰瘍 (stress ulcer)、縫合不全 (suture insufficiency) がいずれも含まれる。本スライドでは全選択肢が正解としてハイライトされており、これらは画像で評価される代表的な術後合併症である。", "src": "pp"}, {"id": "099-2", "t": "脊柱管内腫瘍の分類", "q": "Tumors within the spinal canal may be classified as", "o": ["a. Intramedullary", "b. Extradural", "c. Intradural-extramedullary", "d. Extradural-intramedullary"], "a": "a, b, c（Intramedullary / Extradural / Intradural-extramedullary）", "c": "neuro", "k": "", "e": "脊柱管内腫瘍は局在により髄内 (intramedullary)、硬膜内髄外 (intradural-extramedullary)、硬膜外 (extradural) の3つに分類される。「extradural-intramedullary」という組み合わせは解剖学的に存在しない誤った分類である。", "src": "pp", "trap": 1}, {"id": "099-3", "t": "麻痺性イレウスを起こしうる病態", "q": "Which condition can cause paralytic ileus?", "o": ["a. Cramp caused by kidney stone", "b. Acute pancreatitis", "c. Mesenterial thrombo-embolism", "d. Side-effect of medication"], "a": "a, b, c, d（すべて）", "c": "abdomen", "k": "", "e": "麻痺性イレウス (paralytic ileus) は腸管運動が低下する機能的イレウスで、腎結石による疝痛 (renal colic)、急性膵炎 (acute pancreatitis)、腸間膜血栓塞栓 (mesenteric thrombo-embolism) による虚血、薬剤の副作用 (medication side-effect、特にオピオイドや抗コリン薬) などが原因となる。本スライドでは全選択肢が正解とされている。", "src": "pp"}, {"id": "099-4", "t": "硬膜外血腫と硬膜下血腫の出血源の違い", "q": "What is the difference between the origin of an epidural and subdural hematoma (usually)?", "o": ["a. Subdural hemorrhage: arterial", "b. Subdural hemorrhage: vein", "c. Epidural hemorrhage: vein", "d. Epidural hemorrhage: arterial"], "a": "b. Subdural hemorrhage: vein; d. Epidural hemorrhage: arterial", "c": "neuro", "k": "b", "e": "硬膜外血腫 (epidural hematoma) は通常、中硬膜動脈 (middle meningeal artery) などの動脈性出血 (arterial) によりレンズ状（凸レンズ型）を呈する。硬膜下血腫 (subdural hematoma) は架橋静脈 (bridging veins) の破綻による静脈性出血 (venous) で三日月状を呈する。したがってbとdが正しい組み合わせとなる。", "src": "pp", "trap": 1}, {"id": "099-5", "t": "フリーマン・ダール像（frimann-dahl）を撮る病態", "q": "In case of which of the following conditions would you make a frimann-dahl image?", "o": ["a. Infiltrate of the lung", "b. Abdominal free gas", "c. Fracture of the femoral head", "d. Subpulmonal fluid"], "a": "d. Subpulmonal fluid", "c": "abdomen", "k": "d", "e": "フリーマン・ダール撮影 (Frimann-Dahl projection) は水平方向のX線束を用いる撮影法で、少量の胸水、特に肺底部に貯留した横隔膜下胸水 (subpulmonal/subpulmonary fluid) の検出に有用である。患者の体位変換により液体の移動を確認できる。腹腔内遊離ガスの検出にも水平線撮影は使われるが、本スライドではsubpulmonal fluidが正解として示されている。", "src": "pp"}, {"id": "099-6", "t": "虫垂切除後・回盲部痛で疑う疾患", "q": "Young female patient previously underwent appendectomy. Now she is having pain n the ileocecal region. Which of the following disorders would you be suspicions of?", "o": ["a. Sigma diverticulitis", "b. Crohns disease", "c. Peptic ulcer", "d. Extrauterine gravidity"], "a": "b. Crohns diseas
