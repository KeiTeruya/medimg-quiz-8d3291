<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>医療画像クイズ 暗記アプリ</title>
<style>
  :root{
    --bg:#0f1419; --panel:#1a2230; --panel2:#222d3d; --line:#2e3a4d;
    --txt:#e6edf3; --muted:#8b9bb0; --accent:#4f9dff; --accent2:#3a7bd5;
    --ok:#2ecc71; --okbg:#16331f; --ng:#ff6b6b; --ngbg:#3a1c1c; --warn:#f4c430;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:var(--bg);color:var(--txt);line-height:1.6}
  header{position:sticky;top:0;z-index:10;background:rgba(15,20,25,.95);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:10px 16px}
  h1{font-size:16px;margin:0 0 8px}
  .row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .lbl{font-size:11px;color:var(--muted);margin:6px 6px 0 0;align-self:center}
  .chip{background:var(--panel);border:1px solid var(--line);color:var(--txt);
    border-radius:999px;padding:4px 11px;font-size:12px;cursor:pointer;white-space:nowrap}
  .chip:hover{border-color:var(--accent)}
  .chip.active{background:var(--accent2);border-color:var(--accent);color:#fff}
  .chip.src.active{background:#1f6f43;border-color:var(--ok)}
  .chip .n{opacity:.65;margin-left:4px;font-size:11px}
  .btn{background:var(--panel);border:1px solid var(--line);color:var(--txt);
    border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:var(--accent2);border-color:var(--accent);color:#fff}
  .btn.toggle.active{background:var(--accent2);border-color:var(--accent);color:#fff}
  main{max-width:780px;margin:0 auto;padding:16px}
  .meta{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);margin-bottom:10px;flex-wrap:wrap;gap:8px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;min-height:200px}
  .qid{font-size:11px;color:var(--muted);letter-spacing:.5px}
  .srcbadge{display:inline-block;border-radius:6px;padding:1px 6px;font-size:10px;background:#1f6f43;color:#d7ffe7;margin-left:6px}
  .qtitle{font-size:13px;color:var(--accent);margin:2px 0 10px}
  .q{font-size:17px;font-weight:600;margin-bottom:16px}
  .q .neg{background:#5a1d1d;color:#ffb3b3;border-radius:4px;padding:0 4px;font-weight:800;text-decoration:underline}
  .opt{display:block;width:100%;text-align:left;background:var(--panel2);
    border:1px solid var(--line);color:var(--txt);border-radius:10px;
    padding:11px 14px;margin:7px 0;font-size:14.5px;cursor:pointer;transition:.12s}
  .opt:hover{border-color:var(--accent)}
  .opt.correct{background:var(--okbg);border-color:var(--ok)}
  .opt.wrong{background:var(--ngbg);border-color:var(--ng)}
  .opt.disabled{cursor:default}
  .reveal{margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);display:none}
  .reveal.show{display:block}
  .ans{font-size:14px;font-weight:700;color:var(--ok);margin-bottom:8px}
  .ans.warn{color:var(--warn)}
  .expl{font-size:14px;color:#d4dde8}
  .nav{display:flex;gap:8px;justify-content:center;margin:16px 0;flex-wrap:wrap}
  .judge{display:flex;gap:8px;justify-content:center;margin-top:10px}
  .judge .btn{min-width:120px}
  .progressbar{height:6px;background:var(--panel);border-radius:3px;overflow:hidden;margin:6px 0 0}
  .progressbar > i{display:block;height:100%;background:var(--ok);width:0}
  .stats{margin-top:18px;font-size:12px;color:var(--muted)}
  .stats table{width:100%;border-collapse:collapse}
  .stats td{padding:4px 6px;border-bottom:1px solid var(--line)}
  .stats td:last-child{text-align:right}
  .badge{display:inline-block;min-width:34px;text-align:center;border-radius:6px;padding:1px 6px;font-size:11px}
  .hist{display:inline-flex;gap:1px;align-items:center;vertical-align:middle;margin-left:6px;flex-wrap:wrap;max-width:100%}
  .hist span{font-size:9px;line-height:1}
  .hist .hok{color:var(--ok)}
  .hist .hng{color:#ff6b6b}
  .hist .hmore{color:var(--muted);margin-right:1px}
  .empty{text-align:center;color:var(--muted);padding:40px 0}
  .hint{font-size:11px;color:var(--muted);text-align:center;margin-top:6px}
  a{color:var(--accent)}
</style>
</head>
<body>
<header>
  <h1>医療画像クイズ 暗記アプリ <span style="font-weight:400;color:var(--muted);font-size:12px" id="totalCount"></span></h1>
  <div class="row" id="srcRow"></div>
  <div class="chips" id="cats"></div>
  <div class="row" style="margin-top:8px">
    <button class="btn toggle" id="modeBtn">モード: フラッシュカード</button>
    <button class="btn toggle" id="weakBtn">苦手優先 OFF</button>
    <button class="btn toggle" id="unseenBtn">未学習のみ OFF</button>
    <button class="btn toggle" id="chkBtn">⚠ 要確認のみ OFF</button>
    <button class="btn toggle" id="trapBtn" title="選択肢が紛らわしく早とちりしやすい問題だけを集中練習">🪤 ひっかけのみ OFF</button>
    <button class="btn" id="shuffleBtn">🔀 シャッフル</button>
    <button class="btn" id="statsBtn">📊 統計</button>
    <button class="btn" id="exportBtn">⬇ 足跡を書き出し</button>
    <button class="btn" id="importBtn">⬆ 足跡を読み込み</button>
    <button class="btn" id="resetBtn">🗑 足跡リセット</button>
    <input type="file" id="importFile" accept="application/json,.json" style="display:none">
  </div>
</header>
<main>
  <div class="meta">
    <span id="position"></span>
    <span id="deckInfo"></span>
  </div>
  <div class="progressbar"><i id="catbar"></i></div>
  <div id="storageWarn" style="display:none;background:#5a1d1d;color:#ffd5d5;border:1px solid #a33;border-radius:8px;padding:8px 12px;margin:8px 0;font-size:13px">
    ⚠ このブラウザでは学習の足跡を保存できません（プライベートモード、または file:// で開いている可能性）。記録を残すには通常モードのブラウザで開いてください。
  </div>
  <div id="view"></div>
  <div class="nav">
    <button class="btn" id="prevBtn">← 前へ</button>
    <button class="btn primary" id="revealBtn">答えを見る (Space)</button>
    <button class="btn" id="nextBtn">次へ →</button>
  </div>
  <div class="judge" id="judge" style="display:none">
    <button class="btn" id="againBtn" style="border-color:var(--ng)">まだ (×)</button>
    <button class="btn" id="gotBtn" style="border-color:var(--ok)">覚えた (○)</button>
  </div>
  <div class="hint">ショートカット: Space=答え/次へ・1〜5=選択・←→=移動・G=覚えた・A=まだ</div>
  <div class="stats" id="statsPanel" style="display:none"></div>
</main>

<script>
const DATA = {"labels": {"physics": "物理・画像原理", "safety": "造影剤・安全・禁忌", "xray": "X線・透視", "ct": "CT", "mri": "MRI", "us": "超音波", "nuclear": "核医学・PET", "breast": "乳腺・マンモグラフィ", "neuro": "神経・頭頸部", "chest": "胸部", "abdomen": "腹部・消化器", "msk": "筋骨格", "cardiovascular": "心臓・血管・IVR", "gu": "泌尿器・生殖器"}, "order": ["physics", "safety", "xray", "ct", "mri", "us", "nuclear", "breast", "neuro", "chest", "abdomen", "msk", "cardiovascular", "gu"], "sources": {"pp": "PP問題集", "feb2021": "2021 Feb Exam", "radkey": "Radiology要点", "oct2025": "Oct 2025/26 試験", "radpp": "Radiology PP", "imgpp": "Medical Imaging PP", "exampp": "Exam PP"}, "items": [{"id": "001-1", "t": "MRIとペースメーカー患者の対応", "q": "A patient arrives for an MRI scan with the referral of a medical specialist. He tells that he has a cardiac pacemaker. What the radiographer/radiologist needs to do?", "o": ["a. non-contrast MRI can be performed, but intravenous contrast agents are contraindicated", "b. before the MRI scan can be performed, the radiographer/radiologist needs to check the written medical documentation of the patient to make sure that his pacemaker is MRI compatible (at the field strength of the scanner) and is set to MRI compatibility mode", "c. MRI can be performed, because the referring medical specialist is responsible for checking the contraindications", "d. MRI can be performed, because nowadays pacemakers are MR compatible"], "a": "b. before the MRI scan can be performed, the radiographer/radiologist needs to check the written medical documentation of the patient to make sure that his pacemaker is MRI compatible (at the field strength of the scanner) and is set to MRI compatibility mode", "c": "safety", "k": "b", "e": "心臓ペースメーカー (cardiac pacemaker) はMRIの強磁場・高周波で加熱・誤作動・リード過熱のリスクがあるため、撮影前に「MRI条件付き対応 (MR conditional)」かを文書で確認し、対応磁場強度を満たした上でMRIモードに設定する必要がある。実施者（撮影者・放射線科医）に最終確認の責任があるためcは誤り。全てのペースメーカーがMR対応ではないためdも誤り。MR非対応機種では造影の有無に関わらず撮影自体が禁忌となり得るためaも不適切。", "src": "pp"}, {"id": "001-2", "t": "心筋シンチグラフィで評価する項目", "q": "What is determined by myocardial scintigraphy?", "o": ["a. ventricular function", "b. myocardial perfusion", "c. level of coronary stenosis", "d. valvular function"], "a": "b. myocardial perfusion", "c": "nuclear", "k": "b", "e": "心筋シンチグラフィ (myocardial scintigraphy) は放射性トレーサーの心筋集積から心筋血流 (myocardial perfusion) と虚血・梗塞領域を評価する核医学検査である。心室機能 (ventricular function) や弁機能 (valvular function) は心エコーやMRIで、冠動脈狭窄の程度 (level of coronary stenosis) は冠動脈造影やCT-angiographyで評価するため、a・c・dは誤り。", "src": "pp", "trap": 1}, {"id": "002-1", "t": "CT造影剤の副作用リスクが高い患者", "q": "There is a higher risk of adverse effects after iv. adminisitration of CT contrast material:", "o": ["a. in patients with severe hypothyreosis", "b. in patients with impaired liver function", "c. in patients under the age of 70 years", "d. in dehydrated patients"], "a": "d. in dehydrated patients", "c": "safety", "k": "d", "e": "ヨード造影剤 (iodinated contrast) は腎排泄されるため、脱水 (dehydration) があると腎血流低下により造影剤腎症 (contrast-induced nephropathy) のリスクが高まる。したがって投与前の十分な水分補給が重要。造影剤は肝機能 (liver function) ではなく腎機能に依存するためbは誤り、高齢（70歳以上）の方がリスクが高いためcも誤り、甲状腺機能亢進症が問題になるが重度甲状腺機能低下症 (hypothyreosis) は主たるリスクではないためaも誤り。", "src": "pp"}, {"id": "002-2", "t": "T1強調像とT2強調像の鑑別", "q": "How can be differentiated a T1W MR image from a T2W MR image?", "o": ["a. „flow void\" can be recognized on T1W MRI, but not on T2W MRI", "b. can be determined only after iv. gadolinium administration, because gadolinium shortens the T1 time", "c. fat is hypointense on T1W MRI, but hyperintense on T2W MRI", "d. stationary fluid is hypointense on T1W MRI, but hyperintense on T2W MR"], "a": "d. stationary fluid is hypointense on T1W MRI, but hyperintense on T2W MR", "c": "mri", "k": "d", "e": "静止液体（CSFなど, stationary fluid）はT1強調像で低信号 (hypointense)、T2強調像で高信号 (hyperintense) となるのが最も基本的な鑑別点である。flow voidは流速の速い血流の信号欠損で両強調像で見えるためaは誤り、ガドリニウム投与なしでもT1/T2は区別できるためbは誤り、脂肪 (fat) はT1で高信号となるためcは誤り。", "src": "pp", "trap": 1}, {"id": "003-1", "t": "造影乳房MRIの適応でないもの", "q": "Contrast-enhanced breast MRI is used in the following clinical situations, EXCEPT:", "o": ["a. to examine chest wall infiltration by breast cancer", "b. to detect breast implant rupture", "c. to assess multifocality", "d. to differentiate between scar tissue and recurrent tumor"], "a": "b. to detect breast implant rupture", "c": "breast", "k": "b", "e": "インプラント破裂 (breast implant rupture) の検出には造影は不要で、シリコンの信号を強調する非造影のシリコン特異シーケンス（T2/STIR系）で評価するため、これが「EXCEPT（造影MRIを使わない）」に該当する。胸壁浸潤の評価 (a)、多発性の評価 (c)、瘢痕と再発腫瘍の鑑別 (d) はいずれも造影による血流（増強）情報が有用なため適応である。", "src": "pp"}, {"id": "003-2", "t": "腫瘍画像におけるMRIの主な役割", "q": "The main role of MRI in oncologic imaging is:", "o": ["a. recognition of lung metastases", "b. to follow-up all distant metastases", "c. overview of organ systems in short examination time", "d. assessment of local tumor staging and regional lymph nodes"], "a": "d. assessment of local tumor staging and regional lymph nodes", "c": "mri", "k": "d", "e": "MRIは優れた軟部組織コントラストにより局所腫瘍の進展度（局所ステージング, local staging）と所属リンパ節 (regional lymph nodes) の評価に最も適する。肺転移 (lung metastases) の検出はCTが優れるためaは誤り、全身の遠隔転移の追跡はPET/CTやCTの役割でありbは誤り、短時間で全身臓器を概観するのはCTの利点でcも誤り。", "src": "pp"}, {"id": "004-1", "t": "遊離腹腔内ガス（free air）の画像所見", "q": "TRUE for the imaging of free peritoneal air:", "o": ["a. it is a sign of GI tract perforation", "b. barium is contraindicated if it is visible on an abdominal radiograph", "c. it is more sensitively detected with CT than radiograph", "d. all of those are true"], "a": "d. all of those are true", "c": "abdomen", "k": "d", "e": "遊離腹腔内ガス (free peritoneal air) は消化管穿孔 (GI tract perforation) の徴候であり (a)、穿孔が示唆される場合は腹膜炎を起こすバリウムは禁忌で水溶性造影剤を用い (b)、検出感度は単純X線よりCTが高い (c)。よって全て正しく、dが正解。", "src": "pp"}, {"id": "004-2", "t": "臨床放射線撮影で正しいもの", "q": "True for clinical radiography:", "o": ["a. 1 view is sufficient in bone fractures in most cases", "b. heart contour is magnified in AP chest film", "c. skull x-ray is mandatory in significant head trauma", "d. chest radiograph is always inspiratory"], "a": "b. heart contour is magnified in AP chest film", "c": "xray", "k": "b", "e": "AP（前後方向）撮影では心臓がフィルム/検出器から遠い前胸部にあるため、拡大投影されて心陰影 (heart contour) が大きく写る。骨折は最低2方向が原則でaは誤り、重症頭部外傷ではX線でなくCTが標準で頭蓋単純X線は必須ではないためcは誤り、胸部X線は通常吸気時だが臥位・呼気撮影もあり「always」は誤りでdも不適切。", "src": "pp"}, {"id": "005-1", "t": "動的CT/MRIの動脈相の用途", "q": "Arterial phase of dynamic CT/MRI is used for the visualization of:", "o": ["a. biliary dilatation", "b. hypervascular liver tumors, e.g. HCC", "c. hypovascular liver tumors, e.g. colon adenocarcinoma metastases", "d. the pelvicalyceal system"], "a": "b. hypervascular liver tumors, e.g. HCC", "c": "abdomen", "k": "b", "e": "動脈相 (arterial phase) は動脈血流による増強を捉える時相で、多血性（hypervascular）腫瘍である肝細胞癌 (HCC) は動脈相で強く濃染するため最もよく描出される。乏血性 (hypovascular) の大腸癌肝転移は門脈相で低吸収域として目立つためcは誤り、胆管拡張 (biliary dilatation) や腎盂腎杯系 (pelvicalyceal system) の評価は動脈相を要さないためa・dも誤り。", "src": "pp", "trap": 1}, {"id": "005-2", "t": "急性虚血性脳卒中のCT/MRI所見でないもの", "q": "Radiological sign of acute ischemic stroke on CT/MRI, EXCEPT:", "o": ["a. hyperdense media sign", "b. diffusion restriction on DW-MRI", "c. abnormal hypodensity in brain tissue", "d. abnormal hypointensity on FLAIR"], "a": "d. abnormal hypointensity on FLAIR", "c": "neuro", "k": "d", "e": "急性虚血では細胞性浮腫により病変はFLAIRで高信号 (hyperintensity) を示すため、「FLAIRで低信号 (hypointensity)」は誤りでこれがEXCEPTに該当する。高吸収中大脳動脈サイン (a)、DWIの拡散制限 (b)、脳実質の低吸収 (c) はいずれも急性虚血の正しい所見である。", "src": "pp", "trap": 1}, {"id": "006-1", "t": "胸部X線が適さないもの", "q": "Chest X-ray is NOT suitable for:", "o": ["a. the role of initial imaging modality in nearly all patients with thoracic disease", "b. checking the position of the tracheal tube", "c. recognition of small amount of pleural fluid (less than 100 ml)", "d. checking the position of a central venous line"], "a": "c. recognition of small amount of pleural fluid (less than 100 ml)", "c": "chest", "k": "c", "e": "立位正面胸部X線で胸水を検出するには通常200ml以上必要で、100ml未満の少量胸水 (small pleural fluid) はX線では描出困難（超音波やCTが必要）であるため、これがNOT suitableに該当する。胸部疾患の初期検査 (a)、気管チューブ位置確認 (b)、中心静脈ライン位置確認 (d) は胸部X線の適切な用途である。", "src": "pp", "trap": 1}, {"id": "006-2", "t": "放射線科の造影剤に関する正しい記述", "q": "TRUE statement for contrast agents in radiology:", "o": ["a. a type of contrast agents is eliminated by the lungs", "b. iv. gadolinium increases density of the examined organ/region", "c. it serves to increase spatial resolution", "d. GFR assessment is mandatory before contrast agent administration of any type"], "a": "c. it serves to increase spatial resolution", "c": "safety", "k": "c", "e": "（注：このページの赤マークは c に付されている。）超音波造影剤であるマイクロバブルは呼気（肺）を介して排出されるため、本来は a が医学的に正しい記述である。造影剤は組織間のコントラスト（信号差）を高めるもので空間分解能 (spatial resolution) 自体を上げる装置ではないため c は厳密には誤りだが、設問の正解マークは c に付されている。ガドリニウムはMR信号を変えるがCT的な「density」を上げるわけではなくbは不適切、超音波造影剤などGFR評価が不要な造影剤もあり「any type」としたdも誤り。**マークに従いcを正解とするが、医学的にはaが妥当であり要確認。**", "src": "pp"}, {"id": "007-1", "t": "大腿動脈狭窄に対する血管内治療のCTアンギオに対する利点", "q": "A patient has short section, significant superficial femoral artery stenosis confirmed by ultrasound. What is the advantage of the interventional procedure against the CT-angiography?", "o": ["a. contrast material allergy does not occur", "b. there is no ionizing radiation", "c. provides diagnosis and therapy under one roof", "d. does nor require preparation"], "a": "c. provides diagnosis and therapy under one roof", "c": "cardiovascular", "k": "c", "e": "インターベンション（血管内治療）の最大の利点は、診断（血管造影）と治療（バルーン拡張・ステント留置）を同一手技・同一機会で行える点 (diagnosis and therapy under one roof) である。血管内治療でもヨード造影剤と電離放射線を使用するためa・bは誤り、抗凝固や穿刺部準備など事前準備も必要でdも誤り。", "src": "pp"}, {"id": "007-2", "t": "エアブロンコグラムを呈さない病態", "q": "Aerobronchogram is characteristic in the following conditions, EXCEPT:", "o": ["a. bronchioloalveolar carcinoma", "b. alveolar pulmonary edema", "c. viral pneumonia", "d. IRDS"], "a": "c. viral pneumonia", "c": "chest", "k": "c", "e": "エアブロンコグラム (air bronchogram) は肺胞腔が液体・細胞・腫瘍で充満し、含気のある気管支が浮き彫りになる所見で、肺胞性病変で典型的である。細気管支肺胞上皮癌 (a)、肺胞性肺水腫 (b)、新生児呼吸窮迫症候群IRDS (d) は肺胞充満を伴うため呈する。ウイルス性肺炎 (viral pneumonia) は主に間質性パターンで肺胞充満が乏しく、エアブロンコグラムは典型的でないためEXCEPTに該当する。", "src": "pp"}, {"id": "008-1", "t": "筋骨格（MSK）外傷画像で正しいもの", "q": "TRUE for MSK trauma imaging:", "o": ["a. signs of stress fracture appear earlier on radiograph than on bone scintigraphy", "b. at least 3-view radiograph is mandatory in acute fracture", "c. MRI study is indicated if injury of the CNS suspected", "d. study of choice is US in menisceal and cruciate ligament injury of the knee"], "a": "c. MRI study is indicated if injury of the CNS suspected", "c": "msk", "k": "c", "e": "脊髄など中枢神経 (CNS) 損傷が疑われる場合、軟部・神経組織の評価に優れるMRIが適応となる。疲労骨折 (stress fracture) は骨シンチの方がX線より早期に陽性化するためaは誤り、急性骨折は通常2方向で足り「3方向必須」は誤りでbも誤り、膝半月板・十字靱帯損傷の第一選択はMRIであり超音波 (US) ではないためdも誤り。", "src": "pp"}, {"id": "008-2", "t": "電離放射線を使わない画像検査の組合せ", "q": "Which of the following imaging methods does not use ionizing radiation?", "o": ["a. CT and MRI", "b. mammography and ultrasound", "c. irrigoscopy and ultrasound", "d. ultrasound and MRI"], "a": "d. ultrasound and MRI", "c": "physics", "k": "d", "e": "超音波 (ultrasound) は音波、MRIは磁場と電波を用いるため、いずれも電離放射線 (ionizing radiation) を使わない。CT・マンモグラフィ・注腸造影 (irrigoscopy) はいずれもX線を用いるため、これらを含むa・b・cは誤り。", "src": "pp"}, {"id": "009-1", "t": "皮質骨の画像所見で誤っているもの", "q": "FALSE for radiological appearance of cortical bone:", "o": ["a. radiopaque structures on chest x-ray", "b. has acoustic shadowing on ultrasonography", "c. black („signal void\") on MRI sequences", "d. its CT density is generally 100-300 HU"], "a": "d. its CT density is generally 100-300 HU", "c": "msk", "k": "d", "e": "緻密な皮質骨 (cortical bone) のCT値は通常おおむね1000 HU前後と非常に高く、100–300 HUは骨としては低すぎるため、この記述が誤り（FALSE）である。皮質骨はX線で高吸収（radiopaque, a）、超音波で後方音響陰影 (acoustic shadowing, b) を生じ、MRIではプロトンが少なく無信号（signal void, 黒, c）となるため、これらは正しい。", "src": "pp"}, {"id": "009-2", "t": "胸部X線で「白い肺（white lung）」を呈さない病態", "q": "„White lung\" can be recognized on a chest x-ray in the following conditions, EXCEPT:", "o": ["a. pulmonectomy", "b. pneumothorax", "c. atelectasia", "d. pneumonia"], "a": "b. pneumothorax", "c": "chest", "k": "b", "e": "「白い肺 (white lung)」は含気消失・濃度上昇による白色化で、肺切除後の患側 (a)、無気肺 (atelectasis, c)、肺炎の浸潤影 (pneumonia, d) で見られる。気胸 (pneumothorax) は胸腔に空気が貯留し肺野が黒く（透過性亢進）写るため白くならず、EXCEPTに該当する。", "src": "pp"}, {"id": "010-1", "t": "一般にFDG集積が高くない疾患", "q": "In general, which of these diseases does NOT have high FDG-uptake?", "o": ["a. Low-grade prostate cancer", "b. Pneumonia", "c. Invasive ductal breast cancer", "d. Colon adenocarcinoma"], "a": "a. Low-grade prostate cancer", "c": "nuclear", "k": "a", "e": "低悪性度の前立腺癌 (low-grade prostate cancer) は糖代謝が低くFDG集積が乏しいため、評価にはPSMA-PETなどが用いられる。これがNOT high FDG-uptakeに該当する。肺炎 (b) は炎症で、浸潤性乳管癌 (c) や大腸腺癌 (d) は代謝の高い悪性腫瘍でいずれもFDG集積が高い。", "src": "pp"}, {"id": "010-2", "t": "CEUS（造影超音波）の適応でないもの", "q": "What is NOT an indication for CEUS examination (contrast-enhanced ultrasonography)?", "o": ["a. tubal patency examination in infertility program", "b. circumscribed liver mass characterization", "c. gallstone search", "d. vesico-ureteral reflux"], "a": "c. gallstone search", "c": "us", "k": "c", "e": "胆石 (gallstone) の検索は通常のBモード超音波で十分（強い音響陰影で容易に検出）であり、造影 (CEUS) は不要なためNOT indicationに該当する。卵管疎通性検査 (a)、限局性肝腫瘤の血流性状評価 (b)、膀胱尿管逆流の評価 (d) はマイクロバブル造影が有用な適応である。", "src": "pp"}, {"id": "011-1", "t": "空間分解能が増大する順に並べる（マーク準拠）", "q": "Order the following modalities according to increasing spatial resolution:", "o": ["a. DSA < US < MRI < CT", "b. bone scintigraphy < MRI < DSA < mammography", "c. US < fluoroscopy < MRI < CT", "d. chest x-ray < fluoroscopy < US < MRI"], "a": "b. bone scintigraphy < MRI < DSA < mammography", "c": "physics", "k": "b", "e": "（このページは赤マークが b に付されている。）空間分解能は核医学（骨シンチ）が最も低く、マンモグラフィ（およびDSA）など微小石灰化を描出するX線系が最も高い。bは「骨シンチ < MRI < DSA < マンモグラフィ」と分解能が単調増加しており、定性的に妥当な並びである。他の選択肢は順序が逆転している箇所を含むため誤り。", "src": "pp", "trap": 1}, {"id": "011-2", "t": "触知可能乳房腫瘤（22歳女性）の検査順序", "q": "22 year-old woman with palpable breast lump and negative family anamnesis. Which one is the correct order of radiological examinations?", "o": ["a. MR is the modality of choice, becuse screening of young patients must be performed by MRI", "b. CT is the only imaging study necessary to perform, because it provides staging of the tumor in one step", "c. US as an initial study, followed by mammography and/or MRI if necessary", "d. mammography as an initial study, followed by US and/or MRI if necessary"], "a": "c. US as an initial study, followed by mammography and/or MRI if necessary", "c": "breast", "k": "c", "e": "若年女性は乳腺密度が高くマンモグラフィの感度が低いため、まず超音波 (US) を第一選択とし、必要に応じてマンモグラフィやMRIを追加するのが適切。MRIはスクリーニング第一選択ではないためaは誤り、乳腺の初期評価にCTは用いずbも誤り、若年では初検査をマンモグラフィにするのは不適でdも誤り。", "src": "pp", "trap": 1}, {"id": "012-1", "t": "MR検査が可能な最も若い年齢（マーク準拠）", "q": "The youngest age at which an MR study can be performed:", "o": ["a. At the age of 2, by which the white matter is myelinated completely.", "b. It is necessary to wait until the age of 4-5, when the patient is able to co-operate.", "c. It can be performed even in the first days after birth.", "d. Prenatal MR study can be performed if developmental disorder is suspected."], "a": "b. It is necessary to wait until the age of 4-5, when the patient is able to co-operate.（マーク準拠）", "c": "mri", "k": "b", "e": "このページでは赤マークが b に付されているが、医学的にはMRIは電離放射線を用いず安全で、新生児・乳児（出生後早期, c）にも、さらに鎮静下や胎児MRIとして出生前 (d) にも施行可能である。協力できる4–5歳まで待つ必要はなく、b は本来誤りである。**マーク（b）と医学的妥当性（cやd）が矛盾するため要確認。** 設問のマークに従いbを記載する。", "src": "pp"}, {"id": "012-2", "t": "甲状腺シンチグラフィの適応でないもの", "q": "Which of these following is NOT an indication for thyroid scintigraphy?", "o": ["a. Detection of ectopic thyroid tissue", "b. Differential diagnosis of hypothyroidism", "c. Differential diagnosis of hyperthyroidism", "d. Detection of cold nodules"], "a": "b. Differential diagnosis of hypothyroidism", "c": "nuclear", "k": "b", "e": "甲状腺シンチグラフィは放射性ヨードやテクネチウムの取り込みを評価する検査で、機能亢進（hyperthyroidism）の原因鑑別、異所性甲状腺 (ectopic thyroid)、冷結節 (cold nodules) の検出に有用である。一方、機能低下症 (hypothyroidism) では取り込みが全般に低下し有用な情報が得にくく、診断はTSH等の血液検査が中心となるため、NOT indicationに該当する。", "src": "pp", "trap": 1}, {"id": "013-1", "t": "腹部の拡散強調MRI（DWI-ADC）が重要な対象", "q": "In abdominal imaging, diffusion-weighted (DWI-ADC) MRI is important in the detection of:", "o": ["a. colon cancer", "b. prostate cancer", "c. both, because the increase in cellularity inhibits the free movement of water molecules", "d. neither, because diffusion-weighted imaging is useful only in the detection of ischemia"], "a": "c. both, because the increase in cellularity inhibits the free movement of water molecules", "c": "mri", "k": "c", "e": "悪性腫瘍は細胞密度（cellularity）が高く水分子の自由拡散が制限される（拡散制限）ため、大腸癌・前立腺癌のいずれもDWIで高信号・低ADCとして検出できる。DWIは脳虚血だけでなく腫瘍検出にも広く用いられるためdは誤り、両者に有用なのでa・bだけに限定するのも不適切。", "src": "pp"}, {"id": "013-2", "t": "急性虫垂炎の画像所見で正しいもの", "q": "True for imaging of acute appendicitis:", "o": ["a. appendix is thickened (more than 6 mm in diameter) with enhanced Doppler-signal", "b. iv. contrast administration is unnecessary to diagnose periappendicular abscess", "c. CT is always necessary", "d. ultrasonography is very sensitive method in obese patients"], "a": "a. appendix is thickened (more than 6 mm in diameter) with enhanced Doppler-signal", "c": "abdomen", "k": "a", "e": "急性虫垂炎では虫垂が腫大（外径6mm超）し、炎症性充血によりカラードプラで血流シグナルが増強する。膿瘍 (abscess) の評価には造影が有用なためbは誤り、超音波で診断可能なら必ずしもCTは要らずcも誤り、肥満患者では超音波の描出能が低下するためdも誤り。", "src": "pp"}, {"id": "014-1", "t": "A-PとP-A胸部写真に関する誤った記述", "q": "Choose the FALSE statement regarding to A-P and P-A chest films!", "o": ["a. diaphragm is generally in lower position on a P-A film in comparison to an A-P film", "b. both films are inspiratory in most of the cases", "c. pleural fluid can be recognized in the lateral sinuses on both films", "d. magnification of the heart is greater on an A-P film in comparison to a P-A film"], "a": "c. pleural fluid can be recognized in the lateral sinuses on both films", "c": "chest", "k": "c", "e": "側肋骨横隔膜角（lateral sinus/costophrenic angle）の胸水は立位正面（P-A・A-P）で評価できるが、A-P像は多くが臥位で撮影され液体が背側に広がって肋横隔膜角の鈍化が現れにくいため、「両方の写真で側方洞に胸水を認識できる」とする記述は誤り（FALSE）である。P-A像で横隔膜がやや低い (a)、通常吸気撮影 (b)、A-P像で心拡大が強い (d) は正しい。", "src": "pp"}, {"id": "014-2", "t": "モダリティと造影剤の組合せで誤っているもの", "q": "Which radiological modality-contrast agent pair is WRONG?", "o": ["a. dynamic MRI – gadolinium", "b. contrast-enhanced ultrasonography – microbubbles", "c. swallow exam – barium", "d. HRCT – iodine-based contrast"], "a": "d. HRCT – iodine-based contrast", "c": "safety", "k": "d", "e": "HRCT（高分解能CT）は肺の微細構造評価が目的で、原則として造影剤を使わない非造影検査であるため、「HRCT–ヨード造影剤」の組合せは誤り (WRONG)。動的MRI–ガドリニウム (a)、造影超音波–マイクロバブル (b)、嚥下造影–バリウム (c) はいずれも正しい組合せである。", "src": "pp"}, {"id": "015-1", "t": "単純CTで負のCT値（HU）を示す構造", "q": "Structure with negative density value (HU) on noncontrast CT:", "o": ["a. liver tumor", "b. kidney stone", "c. lipoma", "d. aneurysm clip"], "a": "c. lipoma", "c": "ct", "k": "c", "e": "脂肪は水（0 HU）より低い負のCT値（おおむね −50〜−100 HU）を示すため、脂肪腫 (lipoma) が負のHUを呈する。肝腫瘍 (a) は概ね軟部組織レベルの正値、腎結石 (b) や金属の動脈瘤クリップ (d) は高い正値を示すため誤り。", "src": "pp"}, {"id": "015-2", "t": "頸動脈検査に用いるプローブ", "q": "Which transducer is generally used for carotid artery examination?", "o": ["a. 7-12 MHz convex", "b. 3-5 MHz convex", "c. 3-5 MHz linear", "d. 7-12 MHz linear"], "a": "d. 7-12 MHz linear", "c": "us", "k": "d", "e": "頸動脈は体表に近い浅在血管のため、高周波（高分解能・浅部用）のリニアプローブが適し、7–12 MHz linear が標準である。3–5 MHzは深部用で分解能が劣り、コンベックスは腹部など深部・広視野向けであるため、a・b・cは不適切。", "src": "pp", "trap": 1}, {"id": "016-1", "t": "乳房悪性を示唆する超音波所見", "q": "During ultrasound examination, the following finding suggests a potential malignancy in the breast", "o": ["a. calcifications due to fat necrosis", "b. encapsulated fluid collection", "c. hypoechoic, irregular structure with lobulated contour", "d. microscopic calcifications"], "a": "c. hypoechoic, irregular structure with lobulated contour", "c": "breast", "k": "c", "e": "低エコーで境界不整・分葉状輪郭をもつ腫瘤 (hypoechoic, irregular, lobulated) は悪性を示唆する典型的超音波所見である。脂肪壊死による石灰化 (a) や被包化された液体貯留（嚢胞, b）は良性所見で、微小石灰化 (d) はマンモグラフィの所見であり超音波では検出されにくいため誤り。", "src": "pp"}, {"id": "016-2", "t": "充実性と嚢胞性の乳房腫瘤を鑑別できるモダリティ", "q": "Which imaging modality is capable to differentiate between solid and cystic breast masses?", "o": ["a. ultrasonography", "b. galactography", "c. mammography", "d. PET-CT"], "a": "a. ultrasonography", "c": "breast", "k": "a", "e": "超音波 (ultrasonography) は内部エコーや後方エコー増強の有無により、充実性 (solid) と嚢胞性 (cystic) の腫瘤を容易に鑑別できる。乳管造影 (galactography) は乳管内病変用、マンモグラフィ (mammography) は石灰化・腫瘤の濃度評価が主で嚢胞/充実の鑑別は不得手、PET-CTは代謝評価で性状鑑別には不適なため誤り。", "src": "pp"}, {"id": "016-3", "t": "静注CT造影剤投与に影響しない（EXCEPT）事項", "q": "The following conditions can affect the administration of iv. CT contrast media, EXCEPT FOR:", "o": ["a. Coughing, epiphora, sense of palpation and appearence of urticaria on chest and back following the administration of a certain type and concentration of iv. contrast media.", "b. Latest eGFR 28 ml/ min/ 1.73 m2", "c. „Iodine allergy\" indicated on the referral – rash appearing after using antiseptic agent on skin.", "d. Diabetes, chronic kidney disease patients who are not on dialysis, intake of Metformin containing drugs on the day of examination"], "a": "c. „Iodine allergy\" indicated on the referral – rash appearing after using antiseptic agent on skin.", "c": "safety", "k": "c", "e": "消毒薬（ヨード系外用剤）による皮膚発疹は接触性反応であり、静注ヨード造影剤に対する真のアレルギーではないため、造影剤投与の判断に本来影響しない（EXCEPT）。過去の造影剤による蕁麻疹等の反応 (a)、eGFR 28という腎機能低下 (b)、メトホルミン内服 (d, 乳酸アシドーシス回避のため休薬を要する) はいずれも投与方針に影響する。", "src": "pp"}, {"id": "016-4", "t": "単純CTが適切な対象", "q": "Noncontrast CT is appropriate for:", "o": ["a. Staging of abdominal region in oncologic patients", "b. Assessment of kidney stones", "c. Follow up of pulmonary embolism", "d. Assessment of focal liver lesion of unknown dignity"], "a": "b. Assessment of kidney stones", "c": "ct", "k": "b", "e": "尿路結石 (kidney stones) は高吸収で単純CT（造影なし）でも明瞭に描出でき、評価には非造影CTが標準である。腫瘍ステージング (a)、肺塞栓のフォロー (c, CT肺動脈造影が必要)、性状不明の肝病変の鑑別 (d) はいずれも造影を要するため誤り。（注：このページでは選択者がbを選び誤判定アイコンが付くが、医学的にはbが正解。）", "src": "pp"}, {"id": "016-5", "t": "壁内血腫（IMH）に関して正しいもの", "q": "TRUE regarding intramural hematoma (IMH):", "o": ["a. IMH is a type of acute aortic syndrome", "b. in suspicion of IMH non-contrast phase has to be performed as well", "c. both are correct", "d. both are false"], "a": "c. both are correct", "c": "cardiovascular", "k": "c", "e": "大動脈壁内血腫 (intramural hematoma, IMH) は大動脈解離・穿通性潰瘍とともに急性大動脈症候群 (acute aortic syndrome) の一つである (a)。新鮮血腫は単純（非造影）相で三日月状の高吸収域として描出されるため、評価には非造影相も必要 (b)。両者とも正しいのでcが正解。", "src": "pp"}, {"id": "016-7", "t": "陰性の腹部X線で除外できるもの", "q": "Negative abdominal X-ray rules out the following:", "o": ["a. Ileus", "b. Tumor", "c. Perforation of luminal organ.", "d. None of the others"], "a": "d. None of the others", "c": "abdomen", "k": "d", "e": "腹部単純X線は感度が低く、正常（陰性）であってもイレウス・腫瘍・管腔臓器穿孔のいずれも完全には除外できない。早期や少量の所見は写らないため、「除外できるものはない (None of the others)」が正解。よってa・b・cは誤り。", "src": "pp"}, {"id": "016-8", "t": "腹部・骨盤超音波の受診準備（誤った答えを選ぶ）", "q": "How should the patient arrive for abdominal and pelvic ultrasound? Please mark the wrong answer.", "o": ["a. with kidney function results not older than one week", "b. with full bladder", "c. after at least 4 hours of fasting", "d. with previous ultrasound reports"], "a": "a. with kidney function results not older than one week", "c": "us", "k": "a", "e": "腹部・骨盤超音波は電離放射線も造影剤も使わないため、腎機能（GFR）結果は不要であり、「1週間以内の腎機能結果を持参」は誤った要件（wrong answer）に該当する。骨盤評価のための膀胱充満 (b)、ガス低減のための4時間以上絶食 (c)、比較のための過去レポート持参 (d) は適切な準備である。", "src": "pp"}, {"id": "017-1", "t": "多発外傷ケアにおけるMRIの役割", "q": "What is the role of MRI in the polytrauma care algorithm?", "o": ["a. A cranial MRI scan is performed in each case.", "b. Detection of neurologic abnormalities, possible discoligamentous lesions and exclusion of intraspinal hematoma which cannot be otherwise explained by CT.", "c. The first step in the diagnostic algorithm: whole body MRI", "d. Plays no role at all, CT and US are enough."], "a": "b. Detection of neurologic abnormalities, possible discoligamentous lesions and exclusion of intraspinal hematoma which cannot be otherwise explained by CT.", "c": "mri", "k": "b", "e": "多発外傷の初期評価はwhole-body CTが標準で、MRIは二次的に、CTでは評価困難な神経学的異常・椎間板靱帯損傷 (discoligamentous lesion)・脊柱管内血腫の検出/除外に用いる。全例で頭部MRIを行うわけではなく (a)、第一段階は全身CTでMRIではないため (c)、また脊髄損傷評価などで役割があるため (d) は誤り。", "src": "pp"}, {"id": "017-2", "t": "AP（前後）撮影の特徴", "q": "Characteristics of the AP view:", "o": ["a. Small amounts of pleural fluid is hard to notice on an AP chest X-ray", "b. All of the above.", "c. The cardiac silhouette is larger than on a PA view", "d. AP view is obtained for a supine chest radiograph"], "a": "b. All of the above.", "c": "xray", "k": "b", "e": "AP撮影は臥位で行われることが多く (d)、心臓が検出器から遠いため心陰影が拡大し (c)、臥位では胸水が背側に広がって少量胸水が分かりにくい (a)。よって記載すべて正しく、b (All of the above) が正解。", "src": "pp"}, {"id": "017-3", "t": "胆管系インターベンションの適応でないもの", "q": "Which is NOT an indication for bileduct interventional radiological procedure?", "o": ["a. cholangitis", "b. bile duct stenosis caused by malignant tumor", "c. bilestone", "d. portal hypertension"], "a": "d. portal hypertension", "c": "cardiovascular", "k": "d", "e": "門脈圧亢進症 (portal hypertension) は胆管そのものの病態ではなく、TIPSなど血管系IVRの対象であって胆管インターベンション（胆道ドレナージ・ステント）の適応ではない。胆管炎 (a)、悪性腫瘍による胆管狭窄 (b)、胆管結石 (c) は胆道ドレナージ等の適応である。", "src": "pp"}, {"id": "017-4", "t": "超音波で音響陰影（acoustic shadowing）を呈するもの", "q": "Acoustic shadowing on US is seen in case of:", "o": ["a. liver abscess", "b. hyperechoic kidney tumor", "c. gallstone", "d. liver cyst"], "a": "c. gallstone", "c": "us", "k": "c", "e": "胆石 (gallstone) は超音波を強く反射・減衰させるため、後方に音響陰影 (acoustic shadowing) を伴う高エコー構造として描出される。肝膿瘍 (a) や肝嚢胞 (d) は液体成分で後方エコー増強を示し、高エコー腎腫瘍 (b) も通常は陰影を伴わないため誤り。", "src": "pp"}, {"id": "017-6", "t": "CTにおけるくも膜下出血の典型像", "q": "Whats is the typical appearance of a subarachnoid hemorrhage on CT?", "o": ["a. hyperdense / in basal cisterns, most commonly around the circle of Willis", "b. hypodense / in basal cisterns, most commonly around the circle of Willis", "c. hypodense / amorphous, within the brain.", "d. hyperdense / amorphous, within the brain."], "a": "a. hyperdense / in basal cisterns, most commonly around the circle of Willis", "c": "neuro", "k": "a", "e": "急性くも膜下出血 (subarachnoid hemorrhage) は新鮮血液が脳底槽（basal cisterns）やWillis動脈輪周囲のくも膜下腔に高吸収（hyperdense）として広がるのが典型像である。出血は低吸収ではないためb・cは誤り、脳実質内の塊状（amorphous）病変は脳内出血の所見でdも誤り。", "src": "pp", "trap": 1}, {"id": "017-8", "t": "腎機能低下・D-dimer陽性・血行動態不安定例での診断戦略", "q": "Chest pain, dyspnea, impaired renal function (GFR = 38 ml/min/1,73m2) and D-dimer positivity in the laboratory, S1Q3 on ECG. The patient is hemodynamically unstable. Does the renal impairment change the diagnostic strategy?", "o": ["a. Yes, prophylactic intravenous hydration should be perfomed first to avoid contrast-induced acute kidney injury, then the pulmonary CT angiography may be performed.", "b. No, in this case chest X-ray should be performed first, and pulmonary CT angiography should only be considered upon a positive chest X-ray", "c. Yes, because of the severe renal impairment only a non-contrast chest CT should be performed.", "d. No, acute pulmonary CT angiography must be performed because of the life-threatening emergency, the consequential contrast-induced acute kidney injury is of secondary concern"], "a": "d. No, acute pulmonary CT angiography must be performed because of the life-threatening emergency, the consequential contrast-induced acute kidney injury is of secondary concern", "c": "safety", "k": "d", "e": "血行動態不安定で肺塞栓 (S1Q3, D-dimer陽性) が強く疑われる致死的緊急では、確定診断・救命のための肺動脈CT造影 (CT pulmonary angiography) を直ちに行うべきで、造影剤腎症のリスクは二次的問題である。水分負荷で診断を遅らせる (a)、非造影CTのみ (c, 肺塞栓は確定できない)、X線結果を待つ (b) は緊急性に反するため誤り。", "src": "pp", "trap": 1}, {"id": "017-9", "t": "食道穿孔疑い時の造影剤投与で正しいもの", "q": "In the suspicion of esophageal perforation which of the following statements is correct regarding contrast media application:", "o": ["a. Barium contrast materials are not contraindicated", "b. both type of contrast material could be used", "c. both type of contrast material are contraindicated", "d. water-soluble contrast material should be used"], "a": "d. water-soluble contrast material should be used", "c": "safety", "k": "d", "e": "食道穿孔が疑われる場合、バリウムが縦隔へ漏出すると重篤な縦隔炎・肉芽腫を起こすため禁忌で、漏出しても吸収される水溶性造影剤 (water-soluble contrast) を用いる。よってバリウム可とするa・bは誤り、両方禁忌とするcも誤り。", "src": "pp", "trap": 1}, {"id": "017-10", "t": "動的腎シンチグラフィに関する正しい記述", "q": "Which of the following statements is TRUE about dynamic renal scintigraphy?", "o": ["a. The secretion of the kidneys can be compared with each other", "b. Can be used for the diagnosis of renal tumours", "c. The parameters of urinary drainage (and possible obstruction) can be determined", "d. The functional performance of renal parenchyma can be determined"], "a": "判別不能（要確認）", "c": "nuclear", "k": "", "e": "動的腎シンチグラフィ (dynamic renal scintigraphy) は左右腎の分腎機能比較 (a)、尿路ドレナージ・閉塞の評価 (c)、腎実質の機能評価 (d) のいずれにも有用で、a・c・dはすべて正しい記述である。腎腫瘍の診断 (b) はCT/MRIの役割であり誤り。設問が単一選択だとすると最も中心的なのは尿路ドレナージ/閉塞評価(c)だが、本montageページでは正解マークが明確に判別できないため要確認。", "src": "pp", "chk": 1}, {"id": "017-11", "t": "腫瘍画像におけるMRIの主な役割（再掲バリアント）", "q": "The main role of MRI in oncologic imaging is", "o": ["a. local tumor staging", "b. overview of organ systems and local tumor staging in a short examination time", "c. making large field of view (FOV) images, since image resolution is not affected by the FOV", "d. imaging the same regions as with CT scan for better documentation"], "a": "a. local tumor staging", "c": "mri", "k": "a", "e": "MRIは高い軟部組織コントラストにより局所腫瘍のステージング (local tumor staging) を主目的とする。短時間で全身臓器を概観するのはCTの利点でbは誤り、広範囲FOVや高速性はCTの強みでcも誤り、CTと同部位を撮るのは「記録のため」ではなく適応に基づくためdも誤り。", "src": "pp"}, {"id": "018-1", "t": "CT/MRIにおける出血の年齢判定", "q": "Choose the correct statement:", "o": ["a. Fresh hemorrhage in CT is hypo-dense", "b. Chronic subdural hematoma in CT is hyper-dense", "c. MR is capable to determine the approximate age of hemorrhage", "d. MR is not useful in identifying hemorrhage"], "a": "c. MR is capable to determine the approximate age of hemorrhage", "c": "neuro", "k": "c", "e": "MRIは血腫内のヘモグロビン分解産物（oxy→deoxy→met→hemosiderin）の信号変化を捉え、出血の経時的（おおよその）年齢を推定できる。新鮮出血はCTで高吸収（hyperdense）でありaは誤り、慢性硬膜下血腫は低吸収（hypodense）化するためbは誤り、MRは出血同定に有用でdも誤り。", "src": "pp"}, {"id": "018-2", "t": "腸重積の注腸整復の絶対禁忌", "q": "Which of the following is an absolute contraindication for enema reduction of an intussusception?", "o": ["a. Small amount of free fluid on ultrasonography", "b. Signs of perforation (pneumoperitonium, peritonitis)", "c. Small bowel obstruction", "d. Iodine allergy"], "a": "b. Signs of perforation (pneumoperitonium, peritonitis)", "c": "abdomen", "k": "b", "e": "穿孔の徴候（気腹, pneumoperitoneum・腹膜炎）は注腸整復の絶対禁忌で、整復による圧で穿孔が悪化し腹腔内汚染を招くため外科手術が必要。少量の遊離液 (a) は相対的所見、小腸閉塞 (c) は禁忌ではなく、ヨードアレルギー (d) は造影剤選択（空気や生食）で回避できるため絶対禁忌ではない。", "src": "pp"}, {"id": "018-3", "t": "T1/T2強調像の信号に関する正しい記述", "q": "Choose the correct statement:", "o": ["a. On T1 weighted images white matter has a higher signal intensity than gray matter", "b. On T1 weighted images white matter has a lower signal intensity than gray matter", "c. On T2 weighted images CSF has intermediate signal", "d. On T2 weighted images bones have the highest signal density"], "a": "a. On T1 weighted images white matter has a higher signal intensity than gray matter", "c": "mri", "k": "a", "e": "白質はミエリン（脂質）が豊富なためT1強調像で灰白質より高信号となる（T2強調像ではこの関係が逆転）。よってbは誤り。CSFはT2強調像で高信号であり中等度ではないためcは誤り、骨は信号に乏しくT2でも最高信号にはならずdも誤り。", "src": "pp", "trap": 1}, {"id": "018-4", "t": "脊椎損傷の分類モデル", "q": "The vertebral column injuries are classified according to the \"model\" below:", "o": ["a. David 3 column theory", "b. Denis spinal canal theory", "c. Davis spinal canal theory", "d. Denis 3 column theory"], "a": "d. Denis 3 column theory", "c": "msk", "k": "d", "e": "脊椎損傷の安定性は Denis の3カラム理論 (Denis three-column theory)（前柱・中柱・後柱）で分類され、中柱の損傷が不安定性の鍵となる。提唱者は Denis であり David/Davis は誤り、「spinal canal theory」という名称も誤りであるため、a・b・cは不適切。", "src": "pp", "trap": 1}, {"id": "019-1", "t": "悪性骨腫瘍に典型的でない所見", "q": "What is not typical for a malignant bone tumor?", "o": ["a. Ill-defined", "b. Periosteal reaction", "c. Destructions", "d. Well circumscribed"], "a": "d. Well circumscribed", "c": "msk", "k": "d", "e": "境界明瞭（well circumscribed）な辺縁は緩徐な発育を示す良性病変の特徴であり、悪性骨腫瘍には典型的でない。悪性骨腫瘍は境界不明瞭 (ill-defined, a)、骨膜反応 (periosteal reaction, b)、骨破壊 (destruction, c) を呈するため、これらは典型所見である。", "src": "pp"}, {"id": "019-2", "t": "腎嚢胞性病変を5段階に分類する分類", "q": "The …………… classification system divides renal cystic masses into five categories based on characteristics on contrast – enhanced CT:", "o": ["a. Bi-Rads", "b. Ren-Rads", "c. Li-Rads", "d. Bosniak"], "a": "d. Bosniak", "c": "gu", "k": "d", "e": "腎嚢胞性病変は造影CT所見（隔壁・壁肥厚・石灰化・増強の有無など）に基づき Bosniak分類 (Bosniak classification) でI〜IV（IIFを含む）に層別化され、悪性リスクと処置方針を決める。BI-RADSは乳房 (a)、LI-RADSは肝臓 (c) の分類で、Ren-Rads (b) は存在しないため誤り。", "src": "pp", "trap": 1}, {"id": "019-3", "t": "MRスペクトロスコピーが有用な癌", "q": "MR spectroscopy is a useful method in the diagnosis of….", "o": ["a. Renal cell cancer", "b. Ovarian cancer", "c. Testicular cancer", "d. Prostate cancer"], "a": "d. Prostate cancer", "c": "gu", "k": "d", "e": "MRスペクトロスコピー (MR spectroscopy) はコリン・クレアチン・クエン酸塩などの代謝物比を測定し、前立腺癌 (prostate cancer) では癌部でクエン酸塩低下・コリン上昇を示すため診断・局在評価に有用である。腎細胞癌・卵巣癌・精巣癌では一般的な診断手段ではないため、a・b・cは誤り。", "src": "pp"}, {"id": "019-4", "t": "舌骨上頸部の中央（脂肪性）コンパートメント", "q": "Which is the central (….fatty) compartment of the supra hyoid neck?", "o": ["a. Anterior cervical space", "b. Pharyngeal mucosal space", "c. Masticator space", "d. Parapharyngeal space"], "a": "d. Parapharyngeal space", "c": "neuro", "k": "d", "e": "傍咽頭間隙 (parapharyngeal space) は舌骨上頸部の中心に位置する脂肪に富む間隙で、周囲の病変による偏位パターンが病変局在の指標となる。前頸間隙 (a)、咽頭粘膜間隙 (b)、咀嚼筋間隙 (c) は傍咽頭間隙を取り囲む別個の間隙であり、中央の脂肪性コンパートメントではないため誤り。", "src": "pp", "trap": 1}, {"id": "020-1", "t": "頸動脈疾患の一次戦略", "q": "What is the primary strategy in extra-cranial carotid disease?", "o": ["a. Primary examination is DSA which is complemented by CTA or MRA, Ultrasound is only for kids.", "b. Primary examination is duplex ultrasound for screening and follow up; problem solving advanced imaging for selected cases is CTA or MRA; catheter angiography (DSA) is mainly for therapeutic interventions", "c. Ultrasound guided puncture of the CCA and then direct angiography of the affect side", "d. Primary examination is CTA; MRA is only for Iodine-sensitive patients; DSA for all patients preceding surgery and duplex ultrasound for post-surgical complications"], "a": "b. Primary examination is duplex ultrasound for screening and follow up; problem solving advanced imaging for selected cases is CTA or MRA; catheter angiography (DSA) is mainly for therapeutic interventions", "c": "cardiovascular", "k": "b", "e": "頭蓋外頸動脈疾患 (extra-cranial carotid disease) では、まず非侵襲的で被曝のない二重超音波 (duplex ultrasound) をスクリーニングと経過観察に用いるのが原則。問題解決が必要な症例にCTA/MRAを追加し、カテーテル血管造影 (DSA) は侵襲的かつ被曝を伴うため主に治療的介入に限定する。aやdはDSAやCTAを一次検査とする点で侵襲性・被曝の観点から不適切。", "src": "pp"}, {"id": "020-2", "t": "新生児の腸閉塞（イレウス）", "q": "In case of ileus in a new born:", "o": ["a. We can make the diagnosis based only on abdominal X-Ray", "b. Meconium ileus is caused by impacted thick meconium in children suffering from cystic fibrosis (CF)", "c. Hirschsprung's disease never causes ileus in a newborn", "d. Ileum atresia never occurs with non-used colon, because it is a disease if the small bowel, not the colon"], "a": "b. Meconium ileus is caused by impacted thick meconium in children suffering from cystic fibrosis (CF)", "c": "abdomen", "k": "b", "e": "胎便性イレウス (meconium ileus) は嚢胞性線維症 (cystic fibrosis, CF) の児で、粘稠な胎便が腸管に詰まることで生じる典型的な病態。aは単純X線のみでは確定診断できないため誤り。cはヒルシュスプルング病 (Hirschsprung's disease) が新生児イレウスの代表的原因であるため誤り、dは回腸閉鎖で未使用結腸 (microcolon) を伴うため誤り。", "src": "pp"}, {"id": "020-3", "t": "右側胸水貯留時の縦隔の偏位", "q": "In a case of moderate amount of right sided pleural fluid collection the mediastinum complex will move:", "o": ["a. Moderately to the right side", "b. Stay in position", "c. Moderately to the left side", "d. Extensively to the left side"], "a": "c. Moderately to the left side", "c": "chest", "k": "c", "e": "胸水 (pleural fluid) は占拠性病変として患側の圧を高めるため、縦隔 (mediastinum) は健側（反対側）へ押される。右側の中等量貯留なら左へ中等度に偏位する。無気肺 (atelectasis) のような牽引性病変では患側へ偏位するが、ここは貯留なので逆方向。量が中等度のためdの「著明に」は過剰。", "src": "pp", "trap": 1}, {"id": "020-4", "t": "縦隔・後腹膜リンパ節の画像診断", "q": "For the mediastinal and retroperitoneal lymph nodes the most acceptable imagining is:", "o": ["a. US", "b. CT", "c. Scintigraphy", "d. Chest X-Ray (2 views)"], "a": "b. CT", "c": "ct", "k": "b", "e": "縦隔・後腹膜は超音波が届きにくい深部であり、CTが横断断層像でリンパ節の大きさ・個数・形態を最もよく評価できる。US(a)はガスや骨に遮られ深部評価が困難、シンチグラフィ(c)は形態評価に乏しく、胸部X線(d)は重なりで小リンパ節を描出できない。", "src": "pp"}, {"id": "021-1", "t": "急性肺塞栓症の画像診断", "q": "Acute pulmonary embolism", "o": ["a. Negative chest radiography and lower extremity venous ultrasound can rule out confidently", "b. Pulmonary angiography (DSA) is the best modality time assess the vascular and this is the only modality which is feasible in patients with dyspnea", "c. CTA provides only indirect evidence in PE which MRA can visualize even the smallest branches (the only problem is the restricted availability)", "d. CTA can directly prove the presence of emboli and additionally other possible causes of chest symptoms are often disclosed"], "a": "d. CTA can directly prove the presence of emboli and additionally other possible causes of chest symptoms are often disclosed", "c": "chest", "k": "d", "e": "急性肺塞栓症 (acute pulmonary embolism, PE) ではCT肺血管造影 (CTA) が第一選択で、肺動脈内の塞栓を直接描出でき、同時に他の胸部症状の原因も評価できる。aは陰性所見でも確実な除外はできず、bはDSAが侵襲的で第一選択ではなく、cはCTAが間接所見しか示せないという記述が誤り。", "src": "pp"}, {"id": "021-2", "t": "慢性副鼻腔炎で評価すべき複合体", "q": "How do you call the complex that should be evaluated in case of chronic sinusitis?", "o": ["a. Osteomeatal complex", "b. Ostiomeatal complex", "c. Ethmodial complex", "d. Nasomeatal complex"], "a": "b. Ostiomeatal complex", "c": "neuro", "k": "b", "e": "慢性副鼻腔炎 (chronic sinusitis) では、前篩骨洞・上顎洞・前頭洞の共通排泄路である骨口部複合体 (ostiomeatal complex, OMC) の評価が重要で、その閉塞が副鼻腔炎の鍵となる。aの \"Osteo-\" は綴り違いで正しくは \"Ostio-\"（口部=ostium に由来）。c・dはこの解剖用語として正しくない。", "src": "pp", "trap": 1}, {"id": "021-3", "t": "頭頸部癌の神経周囲進展の評価法", "q": "What is the method of choice in case of a head and neck cancer in order to evaluate the perineural tumor spread?", "o": ["a. fMRI", "b. CT", "c. Scintigraphy", "d. MRI"], "a": "d. MRI", "c": "neuro", "k": "d", "e": "神経周囲進展 (perineural tumor spread) は軟部組織・神経の評価が必要で、軟部コントラストに優れる造影MRIが第一選択。神経の肥厚・造影効果や神経孔の拡大を鋭敏に捉える。CT(b)は骨評価には良いが神経そのものの評価は劣り、fMRI(a)は脳機能評価用、シンチ(c)は形態評価に不向き。", "src": "pp", "trap": 1}, {"id": "021-4", "t": "血管造影で必須でない器具（FALSE を選ぶ）", "q": "These devices are mandatory during angiography. Mark the FALSE answer:", "o": ["a. Balloon catheter", "b. 4F catheter", "c. Seldinger needle", "d. Guide wire"], "a": "a. Balloon catheter", "c": "cardiovascular", "k": "a", "e": "血管造影 (angiography) の基本手技にはセルジンガー針 (Seldinger needle) での穿刺、ガイドワイヤー (guide wire)、診断用カテーテル（4Fカテーテル）が必須。バルーンカテーテル (balloon catheter) は血管拡張など治療的処置で用いる器具であり、診断的血管造影では必須ではない（=FALSE）。", "src": "pp"}, {"id": "021-5", "t": "腹部単純X線で透過性（非不透過）の腎結石", "q": "Which type of renal stone is radio translucent (non-opaque) on abdominal plain radiography", "o": ["a. Urine Acid", "b. Struvite", "c. Calcium phosphate", "d. Calcium oxalate"], "a": "a. Urine Acid (Uric acid)", "c": "gu", "k": "a", "e": "尿酸結石 (uric acid stone) はカルシウムを含まないため腹部単純X線でX線透過性 (radiolucent) で写らない。ストルバイト(b)、リン酸カルシウム(c)、シュウ酸カルシウム(d)はいずれもカルシウムを含み、X線不透過 (radiopaque) で描出される。", "src": "pp", "trap": 1}, {"id": "022-1", "t": "間質性陰影の特徴", "q": "Interstitial shadows are:", "o": ["a. Patchy", "b. Of vascular origin", "c. Web-like", "d. Common CT terminology for mesenteric fat"], "a": "a. Patchy", "c": "chest", "k": "a", "e": "肺の間質性陰影 (interstitial shadows) は網状・斑状 (patchy) に分布するのが特徴。bの「血管由来」は肺胞性・血管性陰影の説明、dは腸間膜脂肪のCT用語であり間質陰影とは無関係。なお網目状という意味では web-like も近いが、本設問では patchy が選択されている。", "src": "pp"}, {"id": "022-2", "t": "デュプレックス超音波の定義", "q": "Duplex ultrasonography:", "o": ["a. Combination of two transducers to see blood vessels both in superficial and deep locations", "b. Simultaneous Doppler analysis of bilateral limbs by two sonographers", "c. 2D ultrasound examination, then Doppler analysis by \"pencil\" probe", "d. Simultaneous 2D ultrasound with Doppler sampling from the vessels specified on the 2D image"], "a": "d. Simultaneous 2D ultrasound with Doppler sampling from the vessels specified on the 2D image", "c": "us", "k": "d", "e": "デュプレックス超音波 (duplex ultrasonography) は、Bモードの2D断層像と、その画像上で指定した血管からのドプラ (Doppler) 計測を同時に行う手法。形態と血流情報を組み合わせる点が要点。a・b・cはトランスデューサーや術者を2つ用いる、あるいは別々に行うという誤った記述。", "src": "pp"}, {"id": "022-3", "t": "FAST 検査で確認するもの", "q": "For what does a radiologist look for when performing a FAST – exam?", "o": ["a. Free abdominal fluid", "b. Gall bladder inflammation", "c. Kidney stones", "d. Cysts"], "a": "a. Free abdominal fluid", "c": "abdomen", "k": "a", "e": "FAST (Focused Assessment with Sonography for Trauma) は外傷時に腹腔内・心嚢の遊離液体（多くは出血）を迅速に検出する超音波検査。胆嚢炎(b)、腎結石(c)、嚢胞(d)は対象ではない。", "src": "pp"}, {"id": "022-4", "t": "腸重積の超音波所見", "q": "Ultrasound signs of intussusception", "o": ["a. Target sign", "b. Whirlpool sign", "c. Pseudo-kidney", "d. Comet sign"], "a": "a. Target sign", "c": "abdomen", "k": "a", "e": "腸重積 (intussusception) は腸管が入れ子状に重なるため、横断面で同心円状のターゲット（標的）サイン (target sign / doughnut sign) を呈する。渦巻きサイン(b)は腸捻転 (volvulus)、コメットサイン(d)は胆嚢腺筋腫症などの所見。偽腎徴候 (pseudo-kidney) は縦断像で見られることもあるが、本設問では target sign が選択されている。", "src": "pp", "trap": 1}, {"id": "022-5", "t": "超急性期脳梗塞に関する正しい記述", "q": "Choose the correct statement regarding hyper acute cerebral infarcts:", "o": ["a. Hyper dense media sign is always visible", "b. Hyper dense media sign is visible in 25-50% of the cases", "c. Hyper dense media sign is never visible", "d. Hyper dense media sign is visible in 10-15% of the cases"], "a": "b. Hyper dense media sign is visible in 25-50% of the cases", "c": "neuro", "k": "b", "e": "超急性期脳梗塞の単純CTで見られる高吸収中大脳動脈サイン (hyperdense media/MCA sign) は塞栓の直接所見だが、全例ではなくおよそ25–50%の症例で認められる。a「常に」、c「決して見えない」は誤りで、出現頻度として b が正しい。", "src": "pp", "trap": 1}, {"id": "023-1", "t": "有症状の骨腫瘍で最初に行うモダリティ", "q": "What is the first modality joined in symptomatic bone tumors?", "o": ["a. PET-CT", "b. Scintigraphy", "c. Conventional X-Ray", "d. CT"], "a": "c. Conventional X-Ray", "c": "msk", "k": "c", "e": "有症状の骨腫瘍 (bone tumor) ではまず単純X線 (conventional X-Ray) を行い、病変の局在・骨破壊パターン・骨膜反応・良悪性の手がかりを評価するのが原則。PET-CT(a)やシンチ(b)、CT(d)はその後の精査・病期診断に用いる。", "src": "pp"}, {"id": "023-2", "t": "表在性軟部組織US用のトランスデューサ", "q": "The following transducer is used generally for superficial soft tissue US examination:", "o": ["a. 7.5 – 10 MHz convex", "b. 6-9 MHz phased array", "c. 3.5 – 5 MHz convex", "d. 7.5 – 10 MHz linear"], "a": "d. 7.5 – 10 MHz linear", "c": "us", "k": "d", "e": "表在性の軟部組織は高周波（7.5–10 MHz）のリニア型プローブ (linear transducer) を用いると高い空間分解能で描出できる。高周波は浅部の分解能に優れる一方深達度は低いが、表在には最適。コンベックス型(a,c)は深部腹部、フェーズドアレイ(b)は心臓など狭い窓に用いる。", "src": "pp", "trap": 1}, {"id": "023-3", "t": "多発外傷患者で最速に頭部・胸部・腹部を評価する方法", "q": "In case of a poly traumatic patients which is the fastest imagining method to get useful information about cranial, chest and abdominal condition?", "o": ["a. Skull, chest and abdominal X-Ray", "b. Carotid and abdominal ultrasound examination", "c. Non contrast and contrast enchanted multi-detector CT examination", "d. PET-CT"], "a": "c. Non contrast and contrast enchanted multi-detector CT examination", "c": "ct", "k": "c", "e": "多発外傷 (polytrauma) では多列検出器CT (multi-detector CT, MDCT) による全身（頭・胸・腹）の単純＋造影撮影が短時間で広範な損傷情報を一括取得でき、第一選択。X線(a)やUS(b)は情報量が限られ、PET-CT(d)は外傷急性期には不適。", "src": "pp"}, {"id": "023-4", "t": "小腸イレウスを起こしうる病態（FALSE を選ぶ）", "q": "The following pathological condition can generate small bowel ileus (choose the FALSE answer)", "o": ["a. Crohn's Disease", "b. Coecum tumor", "c. Strangulated hernia", "d. Thrombosis of the splenic vein"], "a": "d. Thrombosis of the splenic vein", "c": "abdomen", "k": "d", "e": "脾静脈血栓症 (thrombosis of the splenic vein) は小腸閉塞（イレウス）の原因とはならない（=FALSE）。クローン病(a)の狭窄、盲腸腫瘍(b)、絞扼性ヘルニア(c)はいずれも機械的または炎症性に小腸イレウスを起こしうる。", "src": "pp"}, {"id": "023-5", "t": "神経放射線学におけるMR", "q": "In neuroradiology:", "o": ["a. MR has superior ability in the imaging of cranial bones", "b. MR images lack bone artifacts", "c. MR has the ability to distinguish calcifications", "d. MR cannot visualize white matter lesions"], "a": "b. MR images lack bone artifacts", "c": "mri", "k": "b", "e": "MRIは骨からのビームハードニング等のアーチファクトが少なく、後頭蓋窩や脳幹を骨に妨げられずに描出できる。aは骨描出はCTが優れるため誤り、cは石灰化の検出・同定はCTが得意でMRは苦手、dは白質病変こそMRが最も得意とするため誤り。", "src": "pp"}, {"id": "024-1", "t": "脂肪を含むことが多い腎病変", "q": "Which renal lesion typically contains fat?", "o": ["a. Renal cell carcinoma", "b. Renal cortical infarct", "c. Angiomyolipoma", "d. Parapelvic Cyst"], "a": "c. Angiomyolipoma", "c": "gu", "k": "c", "e": "血管筋脂肪腫 (angiomyolipoma, AML) は血管・平滑筋・脂肪からなる良性腫瘍で、内部に脂肪成分を含むことが特徴的（CTで脂肪濃度、USで高エコー）。腎細胞癌(a)は通常脂肪を含まず、皮質梗塞(b)・腎盂傍嚢胞(d)も脂肪は含まない。", "src": "pp"}, {"id": "024-2", "t": "機能的画像法でないもの（その1）", "q": "Which of the following modalities is NOT a functional imaging method?", "o": ["a. Scintigraphy", "b. PET", "c. Mammography", "d. SPECT"], "a": "c. Mammography", "c": "nuclear", "k": "c", "e": "マンモグラフィ (mammography) は乳房の形態を写す形態的画像法であり、機能的画像法ではない。シンチグラフィ(a)、PET(b)、SPECT(d)はいずれも放射性医薬品の集積で組織の代謝・機能を評価する機能的画像法 (functional imaging)。", "src": "pp", "trap": 1}, {"id": "024-3", "t": "急性膵炎の合併症を最も効率よく検出する方法", "q": "If suspicion of acute pancreatitis, which one of the following imaging methods is capable of detecting the complications most efficiently?", "o": ["a. Abdominal plain film", "b. Abdominal US", "c. CT native and contrast enhanced", "d. Barium meal"], "a": "c. CT native and contrast enhanced", "c": "abdomen", "k": "c", "e": "急性膵炎 (acute pancreatitis) の合併症（壊死、膿瘍、仮性嚢胞、出血など）の評価には単純＋造影CTが最適で、造影により膵壊死の範囲や周囲の反応性変化を最もよく描出できる。単純X線(a)やバリウム造影(d)は不適、US(b)はガスで膵が見えにくく合併症評価には劣る。", "src": "pp"}, {"id": "024-4", "t": "電離放射線を使わないモダリティ", "q": "Which modality does not use ionizing radiation", "o": ["a. Contrast enhanced US", "b. PET", "c. Fluoroscopy", "d. DSA"], "a": "a. Contrast enhanced US", "c": "physics", "k": "a", "e": "造影超音波 (contrast enhanced US) は音波（超音波）とマイクロバブル造影剤を用いるため電離放射線を使わない。PET(b)は陽電子放出核種、透視(c)・DSA(d)はX線を使用するため電離放射線を伴う。", "src": "pp"}, {"id": "024-5", "t": "微量の遊離腹腔内ガスを確実に描出する方法", "q": "Very small amount of free abdominal air can be reliably depicted with the following imagining method:", "o": ["a. Abdominal X-Ray", "b. Isotope study", "c. Ultrasound", "d. CT"], "a": "d. CT", "c": "abdomen", "k": "d", "e": "ごく少量の遊離腹腔内ガス (free abdominal air) はCTが最も鋭敏に検出でき、消化管穿孔の診断に有用。立位腹部X線(a)では少量だと見逃しやすく、US(c)はガスの評価が苦手、アイソトープ検査(b)はガス検出には用いない。", "src": "pp"}, {"id": "025-1", "t": "拍動性後頭部痛で来院した30歳女性の最初の画像検査", "q": "A young 30 years old female was admitted for the emergency department with a string \"beating like\" occipital headache. What is the first imaging method I this case?", "o": ["a. MR", "b. Skull X-Ray (2 view)", "c. Native CT of the brain", "d. Color duplex carotid ultrasound"], "a": "c. Native CT of the brain", "c": "neuro", "k": "c", "e": "突然の激しい頭痛ではくも膜下出血 (subarachnoid hemorrhage) を疑い、急性期出血の検出に優れ迅速な頭部単純CT (native CT) を第一選択とする。MR(a)は急性出血の検出が劣り時間もかかる、頭蓋単純X線(b)は脳実質を評価できず、頸動脈US(d)は適応外。", "src": "pp"}, {"id": "025-2", "t": "CTでの硬膜外血腫の形状", "q": "Epidural hematoma appears on CT examination usually with:", "o": ["a. Amorf contours", "b. Ring shaped", "c. Lens shape", "d. Crescent shape"], "a": "c. Lens shape", "c": "neuro", "k": "c", "e": "硬膜外血腫 (epidural hematoma) は頭蓋骨と硬膜の間に溜まり、縫合線を越えないため凸レンズ状（biconvex / lens shape）を呈する。三日月状 (crescent shape) は硬膜下血腫 (subdural hematoma) の特徴であり区別が重要。", "src": "pp", "trap": 1}, {"id": "025-3", "t": "縦隔リンパ節の最も適切な画像法", "q": "For the mediastinal lymph nodes the most acceptable imaging method is:", "o": ["a. Ultrasound", "b. CT examination", "c. Scintigraphy", "d. Chest X-Ray (two views)"], "a": "b. CT examination", "c": "chest", "k": "b", "e": "縦隔 (mediastinum) は深部かつ空気・骨に囲まれUSが届きにくいため、横断断層で大きさ・形態を評価できるCTが最適。シンチ(c)は形態評価に乏しく、胸部X線(d)は重なりにより小リンパ節を描出できない。", "src": "pp"}, {"id": "025-4", "t": "成人腹部US用のトランスデューサ", "q": "The following transducer is used for adult's abdominal US examination:", "o": ["a. 7.5 – 10 MHz convex", "b. 6 – 9 MHz phased array", "c. 3.5 – 5 MHz convex", "d. 7.5 - 10 MHz linear"], "a": "c. 3.5 – 5 MHz convex", "c": "us", "k": "c", "e": "成人の腹部は深部臓器を観察するため、深達度に優れる低めの周波数（3.5–5 MHz）のコンベックス型プローブ (convex transducer) を用いる。高周波リニア(d)は表在用、フェーズドアレイ(b)は心臓用。", "src": "pp", "trap": 1}, {"id": "025-5", "t": "虫垂炎を描出できる方法（FALSE を選ぶ）", "q": "Appendicitis can be visualized with the following imaging methods (there is only one false statement, find the FALSE statement):", "o": ["a. With native and contrast enhanced CT examination", "b. With ultrasound examination", "c. With P-A abdominal X-Ray examination", "d. With US and abdominal CT examination"], "a": "c. With P-A abdominal X-Ray examination", "c": "abdomen", "k": "c", "e": "虫垂炎 (appendicitis) は単純腹部X線（P-A）では通常直接描出できない（=FALSE）。診断にはUS（特に小児・若年）やCT（単純＋造影）が有用で、a・b・dは正しい記述。", "src": "pp", "trap": 1}, {"id": "026-1", "t": "肺膿瘍の胸部X線所見", "q": "Pulmonary abscess usually appears on the chest X-Ray with:", "o": ["a. Lower transparency crescent shape", "b. Lower transparency ring shape with inner level fluid", "c. Lower transparency lens shape", "d. Lower transparency wedge shape"], "a": "b. Lower transparency ring shape with inner level fluid", "c": "chest", "k": "b", "e": "肺膿瘍 (pulmonary abscess) は内部が壊死・空洞化し、胸部X線で厚い壁のリング状陰影と内部の鏡面像（air-fluid level）を呈する。楔状(d)は肺梗塞、レンズ状(c)・三日月状(a)は本病態の典型像ではない。", "src": "pp", "trap": 1}, {"id": "026-2", "t": "腋窩・鎖骨上リンパ節腫大時の最初の画像法", "q": "In case of enlarged axillary and supraclavicular lymph nodes the first imaging method is:", "o": ["a. CT examination", "b. MR examination", "c. US examination", "d. Scintigraphy"], "a": "c. US examination", "c": "us", "k": "c", "e": "腋窩・鎖骨上のリンパ節 (axillary and supraclavicular lymph nodes) は表在性のため、被曝なく高分解能で評価できる超音波 (US) が第一選択。リンパ節の大きさ・形態・血流を評価でき、US下生検も可能。CT(a)/MR(b)は深部や病期診断、シンチ(d)は形態評価に劣る。", "src": "pp", "trap": 1}, {"id": "026-3", "t": "CTのハウンスフィールド値で0に固定される物質", "q": "During the CT examinations the Houndsfield scale the density of the ……. is fixed to zero:", "o": ["a. Fresh blood", "b. Water", "c. Fat", "d. Bone"], "a": "b. Water", "c": "ct", "k": "b", "e": "ハウンスフィールドスケール (Hounsfield scale, HU) は水を0 HU、空気を−1000 HUと定義する。水(b)が基準点。脂肪(c)は約−100 HUで負、骨(d)や新鮮血(a)は正の高値を示す。", "src": "pp"}, {"id": "026-4", "t": "造影CT前の補液が重要となるGFR値", "q": "Before contrast enhanced CT examination the hydration of the patient is important when the patient's GFR is:", "o": ["a. >60 ml/min", "b. >70 ml/min", "c. <60 ml/min", "d. <70 ml/min"], "a": "c. <60 ml/min", "c": "safety", "k": "c", "e": "腎機能が低下しGFRが60 ml/min未満になると造影剤腎症 (contrast-induced nephropathy) のリスクが高まるため、ヨード造影剤投与前後の補液（水分負荷）が重要となる。GFRが保たれている a・b は補液の必要性が高くない。", "src": "pp", "trap": 1}, {"id": "026-5", "t": "甲状腺腫瘤の生検ガイド法", "q": "Which guidance technique is mainly useful for the biopsy of thyroid masses?", "o": ["a. US guided biopsy", "b. X-Ray guided biopsy", "c. CT guided biopsy", "d. MR guided biopsy"], "a": "a. US guided biopsy", "c": "us", "k": "a", "e": "甲状腺 (thyroid) は表在臓器で、超音波がリアルタイムに針先と病変を描出できるため、超音波ガイド下生検 (US guided biopsy) が標準。被曝もなく安全・正確。CT(c)/MR(d)は深部用で、X線(b)は軟部の標的描出に不向き。", "src": "pp", "trap": 1}, {"id": "027-1", "t": "単純腎嚢胞の内部性状", "q": "In case of a simple renal cyst (with 25mm diameter, without irregular wall and without separation), how could we characterize the inner content of the cyst?", "o": ["a. Hypoechoic", "b. Anechoic", "c. Hyperechoic", "d. Hyper dense"], "a": "b. Anechoic", "c": "gu", "k": "b", "e": "単純腎嚢胞 (simple renal cyst) は均一な漿液で満たされ、超音波では内部が無エコー (anechoic) で後方エコー増強を伴う。低エコー (hypoechoic)(a) ではなく完全な無エコーが典型。高エコー(c)や高吸収(d)は内部に充実成分・出血を示唆し単純嚢胞ではない。", "src": "pp", "trap": 1}, {"id": "027-2", "t": "縦隔拡大の原因病態（FALSE を選ぶ）", "q": "In case of widening of the mediastinum what pathological process could be the cause of this alteration (pick the FALSE answer)", "o": ["a. Lymphoma", "b. Aneurysm of the descending aorta", "c. Calcified pleural callus", "d. Hilar pulmonary neplasia"], "a": "c. Calcified pleural callus", "c": "chest", "k": "c", "e": "石灰化した胸膜肥厚（calcified pleural callus）は胸膜の所見であり、縦隔陰影の拡大 (widening of the mediastinum) の原因とはならない（=FALSE）。リンパ腫(a)、下行大動脈瘤(b)、肺門腫瘍(d)はいずれも縦隔を拡大させうる。", "src": "pp"}, {"id": "027-3", "t": "狭窄性結腸癌の検出法（FALSE を選ぶ）", "q": "Which method is used for the detection of stenotic colon cancer (pick the FALSE answer)", "o": ["a. Barium enema", "b. Angiography", "c. Abdominal native and contrast enhanced CT", "d. Colonoscopy"], "a": "b. Angiography", "c": "abdomen", "k": "b", "e": "血管造影 (angiography) は狭窄性結腸癌 (stenotic colon cancer) の検出には用いない（=FALSE）。注腸造影(a)、単純＋造影CT(c)、大腸内視鏡(d)はいずれも腸管腔・壁・狭窄を直接評価でき検出に有用。", "src": "pp"}, {"id": "027-4", "t": "胆嚢内の石灰化結石の描出法（FALSE を選ぶ）", "q": "How could we demonstrate a calcified stone in the gallbladder with 30cm diameter (pick the FALSE answer)", "o": ["a. With angiography", "b. With abdominal US examination", "c. With native abdominal CT examination", "d. With P-A abdominal X-Ray examination"], "a": "a. With angiography", "c": "abdomen", "k": "a", "e": "血管造影 (angiography) は血管を描出する検査であり、胆嚢結石の描出には使わない（=FALSE）。腹部US(b)が第一選択で音響陰影を伴う高エコーとして、単純CT(c)や腹部X線(d)では石灰化結石を不透過像として描出できる。", "src": "pp", "trap": 1}, {"id": "027-5", "t": "腹腔内の吸引物（腹水）を示す画像法（FALSE を選ぶ）", "q": "Which imaging technique is useful to demonstrate aspires in the abdominal cavity (pick the FALSE answer)", "o": ["a. Abdominal Ultrasound", "b. Abdominal CT examination", "c. Abdominal CT and US examination", "d. Scintigraphy"], "a": "d. Scintigraphy", "c": "abdomen", "k": "d", "e": "腹腔内の貯留液（腹水, ascites）の描出にはシンチグラフィ (scintigraphy) は用いない（=FALSE）。US(a)は液体貯留に鋭敏で、CT(b)やCT＋US(c)も腹水を明瞭に描出できる。", "src": "pp", "trap": 1}, {"id": "028-1", "t": "腎尿管結石の局在診断に最適な方法", "q": "In case of suspected nephro – ureterolithiasis the best method for the localization of the stone is:", "o": ["a. Abdominal ultrasound examination", "b. Intravenous urography", "c. Low-dose CT", "d. PET-CT"], "a": "c. Low-dose CT", "c": "gu", "k": "c", "e": "尿路結石 (nephro-ureterolithiasis) の局在診断には低線量CT (low-dose CT) が最も鋭敏で、被曝を抑えつつ結石の位置・大きさ・水腎症を正確に評価できる。US(a)は尿管中部の結石が見にくく、IVU(b)は造影剤が必要、PET-CT(d)は適応外。", "src": "pp"}, {"id": "028-3", "t": "X線で画像を作る組織との相互作用（FALSE を選ぶ）", "q": "Which interaction with the tissue is responsible for making the picture? (Pick false answer, in X-Ray)", "o": ["a. Compton effect", "b. Photo effect", "c. Phontodisintergration", "d. Piazo electric effect"], "a": "d. Piazo electric effect", "c": "physics", "k": "d", "e": "圧電効果 (piezoelectric effect) は超音波探触子で音波を発生・受信する現象であり、X線画像形成とは無関係（=FALSE）。X線では光電効果 (photoelectric effect) とコンプトン効果 (Compton effect) が組織との主な相互作用で画像コントラストを生む。", "src": "pp", "trap": 1}, {"id": "028-4", "t": "腎嚢胞と嚢胞性腎腫瘍の鑑別ゴールドスタンダード", "q": "Gold standard for differentiation between kidney cyst and cystic kidney tumor is:", "o": ["a. Contrast CT", "b. Contrast MR", "c. US or CT guided biopsy", "d. Angiography (DSA)"], "a": "a. Contrast CT", "c": "gu", "k": "a", "e": "単純腎嚢胞と嚢胞性腎腫瘍 (cystic kidney tumor) の鑑別は、造影CT (contrast CT) で隔壁や壁・結節の造影効果（増強）を評価するのがゴールドスタンダード（Bosniak分類）。造影効果があれば腫瘍を示唆。生検(c)は腫瘍播種のリスクから第一選択でなく、DSA(d)は鑑別に不向き。", "src": "pp", "trap": 1}, {"id": "028-5", "t": "18F-FDG について", "q": "The 18F-FDG:", "o": ["a. Is tumor specific", "b. Gives information about he glucose uptake if tumor cells", "c. Is useful for tumor therapy", "d. Emits only characteristic XR"], "a": "b. Gives information about the glucose uptake of tumor cells", "c": "nuclear", "k": "b", "e": "18F-FDGはグルコース類似体で、糖代謝の亢進した腫瘍細胞の糖取り込み (glucose uptake) を反映してPETで集積する。aは炎症などでも集積するため腫瘍特異的ではなく、cは診断用で治療用ではない、dはFDGが陽電子（positron）を放出する核種であり特性X線のみを出すわけではない。", "src": "pp"}, {"id": "029-1", "t": "頭蓋骨の骨構造評価に用いるモダリティ", "q": "Which modality do you use in the assessment of bony structures of the skull?", "o": ["a. US", "b. CT", "c. Native XR 2 directions", "d. MRI"], "a": "b. CT", "c": "neuro", "k": "b", "e": "頭蓋骨 (skull) の骨構造評価には、骨の詳細を高分解能で3次元的に描出できるCTが最適。US(a)は骨内部を評価できず、単純X線2方向(c)は重なりで詳細評価が困難、MRI(d)は骨皮質の評価が苦手。", "src": "pp"}, {"id": "029-2", "t": "造影剤に関する正しい記述", "q": "Which statement regarding contrast is true?", "o": ["a. The risk of contrast induced kidney failure is higher if there is preexisting kidney problems", "b. With a GFR <60 ml/min/1.73^2, the drinking of iodine contrast is relatively contraindicated", "c. With a serum creatinine > 1 mg/dl, the IV administration of iodine contrasts is contraindicated", "d. With an emergency examination you should not use contrast since we do not have have anamnesis"], "a": "a. The risk of contrast induced kidney failure is higher if there is preexisting kidney problems", "c": "safety", "k": "a", "e": "造影剤腎症 (contrast-induced nephropathy) のリスクは既存の腎障害があると高くなるため、aが正しい。bは経口造影は腎排泄が少なく相対禁忌の根拠が不適切、cの血清クレアチニン>1 mg/dlのみでは禁忌とは言えず、dは緊急時でも病歴がない一事で一律に造影を避けるのは誤り。", "src": "pp"}, {"id": "029-3", "t": "MRI について", "q": "The MRI is:", "o": ["a. Prohibited during pregnancy", "b. Possible with grande splints in the soft tissue", "c. Is not possible with orthopedic metal-prosthesis", "d. Is not possible for people with pacemakers"], "a": "b. Possible with grande splints in the soft tissue", "c": "safety", "k": "b", "e": "軟部組織内の大きな金属片（非磁性体の固定材など）があってもMRIは実施可能な場合があり、bが正しい。aは妊娠中でも禁忌ではなく必要に応じ施行可能、cは整形外科用金属プロステーシスの多くはMRI対応で禁忌とは限らない。dは旧来のペースメーカー (pacemaker) は禁忌だが、本設問では b が正解として選ばれている。", "src": "pp"}, {"id": "029-4", "t": "T1での黄色骨髄の信号", "q": "The yellow bone marrow in T1 has:", "o": ["a. High signal intensity", "b. Middle signal intensity", "c. Low signal intensity", "d. No signal"], "a": "a. High signal intensity", "c": "mri", "k": "a", "e": "黄色骨髄 (yellow bone marrow) は脂肪に富むため、T1強調像で高信号 (high signal intensity) を示す。脂肪はT1で短いT1緩和時間により明るく描出される。赤色骨髄や水成分はより低信号となる。", "src": "pp", "trap": 1}, {"id": "029-5", "t": "胸部X線で明るく（透過性亢進して）見えるもの（FALSE を選ぶ）", "q": "A brightening is seen with (pick the FALSE answer)", "o": ["a. Pleural fluid", "b. Pneumothorax, lung emphysema", "c. Lung edema", "d. Pneumonia"], "a": "b. Pneumothorax, lung emphysema", "c": "chest", "k": "b", "e": "設問は「FALSE（誤りの選択肢）を選べ」だが、本スライドではbがマークされている。実際には気胸・肺気腫 (pneumothorax, lung emphysema) は空気が多く透過性亢進＝明るく（黒く）見える病態であり、胸水(a)・肺水腫(c)・肺炎(d)は陰影で白く（透過性低下）見える。したがって「明るく見える＝brightening」を示すのは b であり、設問のFALSE指定との関係に注意（マークは b）。", "src": "pp"}, {"id": "030-1", "t": "虫垂炎が描出できない方法", "q": "Appendicitis is not visible with:", "o": ["a. Middle native CT", "b. Sonography", "c. P-A (X-Ray)", "d. Contrast CT"], "a": "c. P-A abdominal X-Ray", "c": "abdomen", "k": "c", "e": "虫垂炎 (appendicitis) は単純腹部X線（P-A）では通常描出できない。診断には超音波(b)、単純CT(a)、造影CT(d)が有用で、壁肥厚や周囲の炎症を評価できる。", "src": "pp"}, {"id": "030-2", "t": "急性膵炎でCTが有用な理由", "q": "Why is CT helpful in acute pancreatitis", "o": ["a. Cheap", "b. Available everywhere", "c. No contrast needed", "d. Helps with morphological assessment and the reactive changes surrounding it"], "a": "d. Helps with morphological assessment and the reactive changes surrounding it", "c": "abdomen", "k": "d", "e": "急性膵炎 (acute pancreatitis) でCTが有用なのは、膵の形態評価と周囲の反応性変化（浸出液・脂肪織炎・壊死など）を明瞭に描出し重症度・合併症を評価できるため。a「安価」やb「どこでも使える」は理由として不正確、cは重症度評価にはむしろ造影が必要。", "src": "pp"}, {"id": "030-3", "t": "診断核医学で用いられる放射線", "q": "In diagnostic nuclear medicine:", "o": ["a. Only gamma radiation is used", "b. Only beta radiation is used", "c. Only positron emission is used", "d. Gamma and positron emission is used"], "a": "d. Gamma and positron emission is used", "c": "nuclear", "k": "d", "e": "診断核医学 (nuclear medicine) では、SPECT/シンチでガンマ線 (gamma) を、PETで陽電子放出 (positron emission) を利用する。両者が用いられるためdが正しい。aやcは一方のみとしている点で不十分、ベータ線(b)は主に治療に用いられる。", "src": "pp", "trap": 1}, {"id": "030-4", "t": "−70HUの組織の主成分", "q": "Main compliant of tissue with -70HU", "o": ["a. Fat", "b. Bone", "c. Water", "d. Air"], "a": "a. Fat", "c": "ct", "k": "a", "e": "脂肪 (fat) はCT値が約−50〜−100 HUの負の値を示すため、−70 HUは脂肪に相当する。水(c)は0 HU、骨(b)は数百〜千以上の高値、空気(d)は約−1000 HU。", "src": "pp"}, {"id": "030-5", "t": "シェーディング（陰影）が見られる病態", "q": "We see shading with:", "o": ["a. Pneumonia, atelectasis", "b. Edema", "c. Lung emphysema, pneumothorax", "d. Pleural fluid in standing patient"], "a": "b. Edema", "c": "chest", "k": "b", "e": "びまん性に淡く広がる陰影（シェーディング, shading / veiling）は肺水腫 (edema) のように液体がびまん性に分布する病態で見られる。肺炎・無気肺(a)は浸潤影、気胸・肺気腫(c)は透過性亢進、立位の胸水(d)は鏡面像を伴う限局陰影で、いずれもびまん性のシェーディングとは異なる。", "src": "pp"}, {"id": "031-1", "t": "USで腎癌を疑った後の次の画像法", "q": "When the US suspects kidney carcinoma, the next imaging technique is:", "o": ["a. PET-CT", "b. DSA", "c. Multiphase CT", "d. Contrast US"], "a": "c. Multiphase CT", "c": "gu", "k": "c", "e": "超音波で腎癌 (kidney carcinoma) が疑われた場合、多時相造影CT (multiphase CT)（皮髄相・腎実質相・排泄相）で腫瘍の造影パターン・進展・病期を評価するのが次のステップ。PET-CT(a)やDSA(b)は第一の精査ではなく、造影US(d)は補助的。", "src": "pp"}, {"id": "031-2", "t": "肺塞栓疑い時の第一選択", "q": "What is the first choice when there is a suspicion of PE:", "o": ["a. CT Angio", "b. CT MRI", "c. DSA", "d. DXA"], "a": "a. CT Angio", "c": "chest", "k": "a", "e": "肺塞栓症 (pulmonary embolism, PE) を疑った場合、CT肺血管造影 (CT angiography) が第一選択で、肺動脈内の塞栓を直接描出できる。DSA(c)は侵襲的で第一選択でなく、DXA(d)は骨密度測定で無関係。", "src": "pp"}, {"id": "031-3", "t": "甲状腺結節疑い時の最初の画像法", "q": "First imaging method when suspecting thyroid nodules:", "o": ["a. Hals – CT", "b. US", "c. Thyroid scintigraphy", "d. Thyroid PET-CT"], "a": "b. US", "c": "nuclear", "k": "b", "e": "甲状腺結節 (thyroid nodules) は表在臓器のため、被曝なく高分解能で結節の大きさ・性状・血流・悪性所見を評価できる超音波 (US) が第一選択。CT(a)・シンチ(c)・PET-CT(d)はその後の機能評価や精査に用いる。", "src": "pp"}, {"id": "031-4", "t": "骨腫瘍のゴールドスタンダード画像（X線後）", "q": "Gold standard imaging for bone tumor (after X-Ray)", "o": ["a. Bone scintigraphy", "b. HRCT", "c. PET-CT", "d. MRI"], "a": "d. MRI", "c": "msk", "k": "d", "e": "単純X線の次に骨腫瘍 (bone tumor) の局所進展（骨髄内伸展・軟部腫瘤・関節/神経血管への浸潤）を評価するゴールドスタンダードはMRIで、軟部コントラストに優れる。設問ではc(PET-CT)に黄色、d(MRI)に青色の二重マークがあるが、骨腫瘍の局所評価のゴールドスタンダードとしてはMRIが正解。シンチ(a)は全身の骨転移検索、HRCT(b)は骨皮質の詳細評価向け。", "src": "pp"}, {"id": "031-5", "t": "精巣癌の検出法", "q": "Which method is used for the detection of testicular cancer?", "o": ["a. PET-CT", "b. Angiography", "c. CT", "d. US"], "a": "d. US", "c": "gu", "k": "d", "e": "精巣 (testis) は表在臓器であり、精巣癌 (testicular cancer) の検出には高分解能超音波 (US) が第一選択で、腫瘤の有無・性状・血流を評価できる。CT(c)/PET-CT(a)は病期診断に用い、血管造影(b)は適応外。", "src": "pp"}, {"id": "032-1", "t": "「病的骨折」とされる骨折", "q": "Which of the following t=fracture type is considered as a \"pathological fracture\"?", "o": ["a. Fatigue fracture of athletes", "b. Fracture of bones weakened by a tumor, inflammation or cyst", "c. All type of vertebral fractures", "d. Fractures die to osteoporosis"], "a": "b. Fracture of bones weakened by a tumor, inflammation or cyst", "c": "msk", "k": "b", "e": "病的骨折 (pathological fracture) は、腫瘍・炎症・嚢胞などで骨が脆弱化した部位に、通常では折れない軽微な外力で生じる骨折を指す。疲労骨折(a)は健常骨への反復負荷、骨粗鬆症性骨折(d)は別カテゴリーで、cの「すべての椎体骨折」は誤り。", "src": "pp"}, {"id": "032-3", "t": "頭頸部のMRIが不適切な適応（FALSE を選ぶ）", "q": "Which of the following indications is inadequate planning an MRI in head an neck region?", "o": ["a. Evaluation of perineural tumor spread", "b. Bony skull base evaluation in suspicion of bony fracture owning to an injury", "c. Cartilage infiltration of the larynx", "d. Probing soft tissue involvement of supra hyoid compartments", "e. Post-therapeutic differentiation between recidive tumor and scar tissue"], "a": "b. Bony skull base evaluation in suspicion of bony fracture owning to an injury", "c": "neuro", "k": "b", "e": "外傷による頭蓋底骨折 (bony skull base fracture) の評価はCTが適切で、MRIは骨皮質の評価が苦手なため不適切な適応（=正しくない指示）。一方、神経周囲進展(a)、喉頭軟骨浸潤(c)、軟部組織進展(d)、治療後の腫瘍再発と瘢痕の鑑別(e)はいずれもMRIが得意とする軟部評価で適切。", "src": "pp"}, {"id": "032-4", "t": "通常（コンベンショナル）胸部X線の撮影技術", "q": "Which X-Ray technique is applied by a conventional chest X-Ray?", "o": ["a. Hard-beam technique (25-35 keV)", "b. Soft- beam technique (25-35 keV)", "c. Hard-beam technique (120-140 keV)", "d. Soft-beam technique (120-140 keV)"], "a": "c. Hard-beam technique (120-140 keV)", "c": "xray", "k": "c", "e": "通常の胸部X線は高電圧（120–140 kVp）のハードビーム (hard-beam) 技術を用い、肋骨の重なりを抑えつつ肺野のコントラストを得る。低keV（soft-beam, a/b/d）はマンモグラフィなど軟部組織の撮影に適し、胸部には不適。", "src": "pp", "trap": 1}, {"id": "032-5", "t": "腎細胞癌診断のゴールドスタンダード", "q": "Gold stand method for the diagnosis of renal cell cancer:", "o": ["a. HRCT", "b. Trans abdominal US", "c. Unenhanced abdominal CT examination", "d. IV urography", "e. Contrast enhanced multiphasic abdominal CT examination"], "a": "e. Contrast enhanced multiphasic abdominal CT examination", "c": "gu", "k": "e", "e": "腎細胞癌 (renal cell carcinoma) 診断のゴールドスタンダードは多時相造影腹部CT (contrast enhanced multiphasic CT) で、腫瘍の増強パターン・進展・静脈浸潤・転移を評価できる。単純CT(c)やUS(b)はスクリーニング向け、IVU(d)は尿路系評価に限られる。", "src": "pp", "trap": 1}, {"id": "033-1", "t": "抗菌薬で改善しない肺浸潤影で疑うもの", "q": "If a pulmonary infiltrate does not resolve over time despite treatment with anti microbial agents, think of…..", "o": ["a. Broncho-alveolar subtype of lung cancer", "b. Supraglottic cancer of larynx", "c. Boeck sarcoidosis", "d. Presence of mycoplasma or klebsiella", "e. Pleural adhesion"], "a": "a. Broncho-alveolar subtype of lung cancer", "c": "chest", "k": "a", "e": "抗菌薬治療にもかかわらず消退しない持続性の肺浸潤影では、肺炎様に広がる細気管支肺胞型肺癌（broncho-alveolar carcinoma、現・浸潤性粘液性腺癌）を疑う。マイコプラズマやクレブシエラ(d)は抗菌薬に反応する感染症で、cやe・bは典型的な持続浸潤影の鑑別として本設問では選ばれていない。", "src": "pp"}, {"id": "033-2", "t": "脳卒中の治療方針決定で主に重視する所見", "q": "Incase of a stroke, treatment strategy is primarily based on the following findings:", "o": ["a. Localization of the lesion (infra – or supra tentorial)", "b. Unilateral or bilateral lesion", "c. Presence of edema", "d. Presence of hemorrhage"], "a": "d. Presence of hemorrhage", "c": "neuro", "k": "d", "e": "脳卒中 (stroke) の治療方針はまず出血 (hemorrhage) の有無で決まる。出血があれば血栓溶解・抗凝固は禁忌となり管理が大きく変わるため、単純CTでの出血の除外が最優先。病変の局在(a)や浮腫(c)も重要だが、治療戦略を一次的に左右するのは出血の有無。", "src": "pp", "trap": 1}, {"id": "033-3", "t": "超音波の適用に最も正しい相関", "q": "Which correlation is the most correct to the application of ultrasonography?", "o": ["a. High frequency probe — deep penetration— low spatial resolution", "b. High frequency probe — poor penetration — good spatial resolution", "c. Low frequency probe — deep penetration — good spatial resolution", "d. Low frequency prob — poor penetration — good spatial resolution"], "a": "b. High frequency probe — poor penetration — good spatial resolution", "c": "us", "k": "b", "e": "超音波は高周波ほど空間分解能が高いが減衰が大きく深達度（penetration）は低い。逆に低周波は深部まで届くが分解能は低下する。したがって「高周波＝深達度低・分解能良」のbが正しい。a・c・dは周波数と深達度/分解能の対応が誤っている。", "src": "pp", "trap": 1}, {"id": "033-4", "t": "頭頸部を区画に分ける構造", "q": "The head and neck compartments are separated into parts on the basic of the following structure:", "o": ["a. Epiglottis", "b. Hyoid bone", "c. Cricoid cartilage", "d. Uvula", "e. Hard palate"], "a": "b. Hyoid bone", "c": "neuro", "k": "b", "e": "頭頸部は舌骨 (hyoid bone) を基準に舌骨上 (suprahyoid) と舌骨下 (infrahyoid) の区画に分けられる。これが解剖学的・画像的な区分の境界となる。喉頭蓋(a)・輪状軟骨(c)・口蓋垂(d)・硬口蓋(e)はこの主要区分の基準ではない。", "src": "pp"}, {"id": "034-1", "t": "成人で超音波を第一画像法として使える臓器", "q": "In case of which organ can you apply ultrasonography as the first imaging modality for adults?", "o": ["a. Lung", "b. Colon", "c. Spine", "d. Liver", "e. Brain"], "a": "d. Liver", "c": "abdomen", "k": "d", "e": "肝臓 (liver) は超音波がよく届く充実臓器で、成人でもUSを第一画像法として用い、嚢胞・腫瘤・脂肪肝・胆道評価などに有用。肺(a)や腸(b)はガスで、脊椎(c)や成人の脳(e)は骨で遮られ、USの第一選択には不向き。", "src": "pp"}, {"id": "034-2", "t": "二重造影腸管検査でFALSEの記述", "q": "Which statement is FALSE on double contrast bowel examination?", "o": ["a. Smear muscles with barium containing contrast agent", "b. Distend the lumen with fad, which is a positive contrast media, because of f=decreasing transparency", "c. Relax bowel walls with smooth muscle relaxant", "d. Depiction: luminal contour, mucosal relief"], "a": "b. Distend the lumen with fad, which is a positive contrast media, because of f=decreasing transparency", "c": "abdomen", "k": "b", "e": "二重造影 (double contrast) では、陽性造影剤のバリウムで粘膜を被覆し、空気（陰性造影剤＝透過性を高める）で腸管を拡張する。bは「空気（gas）」を「陽性造影剤で透過性を下げる」と誤って記述しているため誤り（=FALSE）。a・c・dは二重造影の正しい手技・目的。", "src": "pp"}, {"id": "034-3", "t": "立位腹部X線でのGI穿孔の特徴的徴候", "q": "Pathognomic sign of GI tract perforation in an erect plain abdominal radiograph:", "o": ["a. Oral contrast material depicted in the duodenum", "b. Colon cut-off sign", "c. Broad air fluid level in the transverse colon", "d. Crescent translucency under the dome of the hemodiaphragm"], "a": "d. Crescent translucency under the dome of the hemodiaphragm", "c": "abdomen", "k": "d", "e": "消化管穿孔 (GI tract perforation) では立位腹部X線で横隔膜下に三日月状の遊離ガス (free air, crescent translucency under the diaphragm) が見られ、これが特徴的所見。colon cut-off sign(b)は膵炎、横行結腸の鏡面像(c)は閉塞などを示唆し、穿孔の特異徴候ではない。", "src": "pp"}, {"id": "034-4", "t": "4–5か月新生児の股関節形成不全スクリーニング法", "q": "Which imaging method is applied for the screening of hip dysplasia for neonates between 4-5 months of age?", "o": ["a. X-Ray", "b. Ultrasonography (< 4 months)", "c. MRI", "d. None of the above"], "a": "a. X-Ray", "c": "msk", "k": "a", "e": "生後4–5か月になると大腿骨頭の骨化が進み、超音波 (US) は4か月未満で有用だが、それ以降は骨化のため評価が難しくなる。このため4–5か月では単純X線 (X-Ray) でのスクリーニングが用いられる。MRI(c)は通常スクリーニングには用いない。", "src": "pp"}, {"id": "034-5", "t": "造影CT前に補液が不要なGFR値", "q": "In case of the following GFR value the patient DOES NOT need hydration prior to an IV contrast enhanced CT examination:", "o": ["a. <30 ml/min/1.73m^2", "b. >40 ml/min/1.73m^2", "c. <60 ml/min/1.73m^2", "d. >60 ml/min/1.73m^2"], "a": "d. >60 ml/min/1.73m^2", "c": "safety", "k": "d", "e": "GFRが60 ml/min/1.73m²を超え腎機能が保たれていれば、造影剤腎症のリスクが低く、造影前の補液（水分負荷）は不要。60未満（a, c）では補液が推奨される。前出の問題（026-4）と整合する基準。", "src": "pp", "trap": 1}, {"id": "035-1", "t": "多列/マルチスライスCTについて誤りの記述", "q": "Which comment is not true regarding the multidector/multislice CT?", "o": ["a. Parallel rows of detectors", "b. During one rotation 4,16,32… slices are measure", "c. Fractional (discontinuous) date collection = loss of information", "d. During one inspiration only, the whole body is scanned", "e. Reconstructions are made in any preferable plane"], "a": "b. During one rotation 4,16,32… slices are measure", "c": "ct", "k": "b", "e": "本スライドではbがマークされている。マルチスライスCTは平行に並んだ複数列の検出器(a)を持ち、ヘリカルスキャンで連続的にデータを収集し、任意断面で再構成できる(e)点が特徴。なお実際には1回転で複数スライスを同時取得するため b の数値記述自体は概ね正しく、「誤り」を選ぶ設問として注意が必要（マークは b）。", "src": "pp"}, {"id": "035-2", "t": "硬膜外出血に特徴的な形状", "q": "Which shape is generally characteristic in case of epidural bleeding…", "o": ["a. Crescent", "b. Amorph", "c. Lentiform", "d. Not detectable"], "a": "c. Lentiform", "c": "neuro", "k": "c", "e": "硬膜外血腫 (epidural hematoma) は頭蓋骨と硬膜の間に溜まり、縫合線を越えないため両凸のレンズ状（lentiform / biconvex）を呈する。三日月状 (crescent)(a) は硬膜下血腫 (subdural hematoma) の特徴。", "src": "pp", "trap": 1}, {"id": "035-4", "t": "注腸（バリウムエネマ）前に強く推奨される検査", "q": "Which investigation is strongly recommended before doing a barium enema?", "o": ["a. Pelvic US", "b. Cytoscopy", "c. Rectoscopy", "d. Urography"], "a": "c. Rectoscopy", "c": "abdomen", "k": "c", "e": "注腸造影 (barium enema) の前には直腸鏡 (rectoscopy) で直腸下部を直接観察し、内視鏡では見えにくい遠位直腸の病変確認や安全性評価を行うことが推奨される。膀胱鏡(b)や尿路造影(d)は尿路系の検査で関係がなく、骨盤US(a)は前処置として必須ではない。", "src": "pp", "trap": 1}, {"id": "035-5", "t": "鈍的腹部外傷で脊椎に圧迫され損傷しやすい臓器", "q": "Which organ would you full in the sentence – The ……… body is the most common portion of this organ to be injured in blunt trauma because it is compressed against the spine in blunt traumatic injuries to the abdomen.", "o": ["a. Liver", "b. Pancreas", "c. Heart", "d. Lungs"], "a": "b. Pancreas", "c": "abdomen", "k": "b", "e": "膵 (pancreas) は後腹膜で脊椎の前にあり、鈍的腹部外傷で脊椎に圧迫されて膵体部 (body) が最も損傷を受けやすい。肝(a)も外傷を受けやすいが「脊椎に圧迫される体部」という記述には膵が当てはまる。心(c)・肺(d)は腹部臓器ではない。", "src": "pp"}, {"id": "036-1", "t": "腹部CT評価に最適なウィンドウ設定", "q": "To evaluate an abdominal CT, the optimal window setting is ….. on the Houndsfield scale", "o": ["a. WL = 600 HU, WW = 1600 HU", "b. WL = 300 HU, WW = 600 HU", "c. WL = 400 HU, WW = 500 HU", "d. WL = 200 HU, WW = 100 HU"], "a": "a. WL = 600 HU, WW = 1600 HU", "c": "ct", "k": "a", "e": "本スライドの解答は a（Answer: A と明記）。腹部CTでは軟部組織のコントラストを得つつ広い濃度域をカバーする設定が用いられる。なお一般的な腹部（軟部）ウィンドウは WL 約40–60 HU・WW 約350–400 HU だが、本問では選択肢のうち a がマークされている（出題上の指定に従う）。", "src": "pp", "trap": 1}, {"id": "036-2", "t": "CTのハウンスフィールド値で0に固定される物質（再出題）", "q": "During CT examination in the Houndsfield scale the density of….is fixed to zero.", "o": ["a. Fresh blood", "b. Water", "c. Fat", "d. Bone"], "a": "b. Water", "c": "ct", "k": "b", "e": "ハウンスフィールドスケールは水を0 HUに固定して定義する（Answer: B）。空気は−1000 HU。脂肪(c)は負、骨(d)・新鮮血(a)は正の値を示す。", "src": "pp"}, {"id": "03
